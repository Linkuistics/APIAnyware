tasks:
- id: fix-swift-extension-method-misattribution-in-methods-extractor
  title: Fix Swift extension method misattribution in methods extractor
  category: analysis
  status: not_started
  dependencies: []
  description: |
    **Priority:** medium

    **Promoted from:** Session 47 hand-off â€” ScriptingBridge subagent discovery during LLM annotation.

    **Problem:** During LLM annotation, the ScriptingBridge subagent flagged that `SBElementArray.mapAnnotations(_:)` and `SBElementArray.mapFeatures(_:)` do not exist in ScriptingBridge headers â€” they are `CreateMLComponents.Sequence` extension methods that were incorrectly attributed to `SBElementArray` in `analysis/ir/llm-summaries/ScriptingBridge.methods.json`. The subagent skipped them rather than emitting incorrect annotations, but the underlying extractor bug remains.

    **Root cause hypothesis:** Swift extensions defined on a type from framework A, but declared in framework B's `.swiftinterface`, are being attributed to the base type's framework (A) rather than the declaring framework (B). The `Sequence` protocol extension in `CreateMLComponents` defines `mapAnnotations(_:)` and `mapFeatures(_:)` â€” these got pulled into `SBElementArray`'s method list because `SBElementArray` conforms to `Sequence`.

    **What to investigate:**
    1. Inspect `analysis/ir/llm-summaries/ScriptingBridge.methods.json` â€” confirm `mapAnnotations(_:)` and `mapFeatures(_:)` are listed there.
    2. Inspect `analysis/ir/llm-summaries/CreateMLComponents.methods.json` â€” confirm the selectors appear there correctly.
    3. Identify which extractor stage produces the per-framework `.methods.json` files and where conformance-inherited extensions are resolved.
    4. Determine whether other frameworks are affected: look for selector names in framework X's `.methods.json` that do not appear in that framework's headers or `.swiftinterface`.

    **Scope:** Fix the extractor so Swift protocol extension methods are attributed to the framework declaring the extension, not the framework of the conforming type. Re-extract affected frameworks. Re-run LLM annotation for any framework whose method list changes.

    **Acceptance criteria:**
    - `SBElementArray.mapAnnotations(_:)` and `SBElementArray.mapFeatures(_:)` absent from `ScriptingBridge.methods.json`.
    - Audit confirms no other obvious misattributions (or documents them if found).
    - Re-extracted frameworks pass `llm-validate` and `enrich` with 0 violations.

    **Dependencies:** none (standalone extractor fix; does not block other pipeline stages)
