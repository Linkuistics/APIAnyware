tasks:
- id: llm-annotation-calibration-run-on-medium-framework-mixed-annotation-reasons
  title: LLM annotation calibration run on medium framework (mixed annotation reasons)
  category: analysis
  status: done
  dependencies: []
  description: |
    **Priority:** medium

    **Promoted from:** completed task `build-claude-code-subagent-driver-for-llm-annotation-pipeline` results, "Suggested next steps #2"

    **Depends on:** first real subagent run on PushKit (task `llm-annotation-first-real-subagent-run-pushkit`).

    **Summary:** After PushKit proves the loop end-to-end, run the LLM annotation subagent on a framework that exercises all three annotation reason types simultaneously: block params, error-pointer out-params, and delegate/observer methods. This is the stress-test for the subagent prompt's coverage discipline.

    **Good candidates:** `Network` (has delegate patterns via `NWListener`, `NWConnection`, and error-pointer out-params), `EventKit` (has block completion handlers and error out-params), or Foundation/URLSession material (mixed). Pick the one whose `.methods.json` has the richest spread across the three reason categories.

    **Steps:**
    1. Run `llm-extract --only <chosen-framework>` to produce the `.methods.json`.
    2. Inspect the `.methods.json` to confirm all three reason types appear.
    3. Dispatch one subagent per the orchestration doc.
    4. Run `llm-validate` on the result; fix the prompt if errors surface.
    5. Run `annotate --only <chosen-framework> --llm-dir …` and inspect merged output.
    6. Record cost and any prompt corrections needed.

    **Acceptance criteria:** All three annotation reason categories produce non-empty LLM-sourced annotations in the merged output, with prompt issues (if any) resolved.
  results: |
    **Outcome:** Calibration succeeded end-to-end on EventKit.

    **What was done:**
    1. Picked EventKit as the calibration target after surveying candidates: it
       has 19 flagged methods spanning all three reason categories simultaneously
       — 8 `has_block_params`, 9 `error_out_param`, 2 `delegate_observer_pattern`.
       Network was rejected (33 methods, all `has_block_params`); Foundation was
       rejected (546 methods, too large for a calibration budget).
    2. Ran `llm-extract --only EventKit` → wrote `EventKit.methods.json`.
    3. Dispatched a Claude Code subagent with the prompt template from
       `analysis/scripts/llm-annotate-subagent.md`. The subagent read the
       summary, consulted SDK headers under
       `MacOSX.sdk/.../EventKit.framework/Headers/`, wrote `EventKit.llm.json`,
       and ran `llm-validate` before returning.
    4. Re-ran `llm-validate` from the orchestrator — passed.
    5. Ran `annotate --only EventKit --llm-dir …` — produced merged checkpoint
       with 17 LLM-sourced annotations + 296 heuristic-sourced annotations
       across 17 classes.
    6. Ran `enrich --only EventKit` — verification passed; enrichment counts
       match LLM annotations exactly (1 sync block + 7 async blocks, 9 error
       methods, 0 unclassified, 0 flag mismatches).

    **Cost & wall-time:**
    - Subagent: 38,971 tokens / ~73s wall time / 12 tool uses.
    - That's *cheaper* than PushKit's 54,327 tokens for 2 methods — fixed
      overhead dominates per-framework cost; marginal cost per method is
      small once headers are in context.

    **Three reason categories all exercised:**
    - `has_block_params` — 8 block invocation classifications emitted (1
      `synchronous` for `enumerateEventsMatchingPredicate:usingBlock:`, 7
      `async_copied` for completion handlers and `request*Access*` permission
      prompts).
    - `error_out_param` — 9 `error_out_param` annotations emitted on methods
      taking `NSError**` last param.
    - `delegate_observer_pattern` — 2 flagged methods (`EKEventStore.delegateSources`
      getter, `EKSource.isDelegate` getter). Both deliberately skipped per
      the prompt's property-getter rule. The subagent reported these as
      zero-annotation classes (correctly omitted from output).

    **Heuristic vs LLM finding (notable):** for EventKit, the heuristic pass
    already classifies block invocation styles and error patterns identically
    — the LLM pass is confirmatory rather than additive. The merged output
    has 17 `source: "llm"` annotations on top of 296 heuristic ones; since
    heuristic annotations exist for the same methods, the LLM merge is
    overwriting same-valued fields with `source: "llm"` tags. This is
    mechanically fine (merge precedence is human > llm > heuristic) but
    suggests EventKit is a case where the heuristic name-pattern matcher is
    already doing the work. Future calibration on a framework that defeats
    the heuristic (e.g. blocks named neither `completion*` nor `*Handler`)
    would surface the LLM's actual additive contribution.

    **Prompt corrections applied:**
    - Subagent reported one prompt-clarity issue: the schema example shows
      classes-with-methods, but the rule "skip methods you have no
      annotations for" left ambiguous what to do with a class that has *no*
      annotated methods. Added an explicit rule to
      `analysis/scripts/llm-annotate-subagent.md`: "Skip classes whose
      methods all fall under the previous rule — omit the class from
      `classes` entirely rather than emitting it with an empty
      `methods: []` array."

    **Acceptance criteria check:**
    - ✅ All three annotation reason categories produce non-empty
      LLM-sourced annotations in the merged output (`block_parameters` × 8,
      `error_pattern` × 9; the `delegate_observer_pattern` reason was
      exercised but correctly produced no annotations under the
      property-getter skip rule).
    - ✅ Prompt-clarity issue resolved.

    **What this suggests next:**
    1. The cost anchor for the durability decision (sister task) is now
       solid: per-framework cost is dominated by ~30–40k token fixed
       overhead, not per-method marginal cost. Use this in the
       extrapolation.
    2. If we want a stronger LLM-vs-heuristic delta, calibrate on a
       framework where the heuristic naming patterns *fail* — candidates:
       `WebKit` (custom delegate naming), `IOUSBHost` (lower-level
       callbacks), Matter (12,827 methods, but most likely follow naming
       patterns). This is potential follow-up work, not blocking.
- id: decide-llm-annotation-durability-strategy-after-medium-framework-calibration-run
  title: Decide LLM annotation durability strategy after medium-framework calibration run
  category: analysis
  status: done
  dependencies:
  - llm-annotation-calibration-run-on-medium-framework-mixed-annotation-reasons
  description: |
    **Priority:** medium

    **Depends on:** `llm-annotation-calibration-run-on-medium-framework-mixed-annotation-reasons`

    **Summary:** Both `analysis/ir/annotated/` and `analysis/ir/llm-annotations/` are gitignored. Fresh clones must re-run the LLM annotation pipeline to reproduce annotated IR. The cost anchor from PushKit (2-method framework) is ~54k tokens / ~2 min / 23 tool uses. The medium-framework calibration run will establish per-framework cost at scale, which is the key data point needed to choose a durability strategy.

    **Options to evaluate:**
    - **(A) Check in `.llm.json` files as source-of-truth** and re-run `annotate --llm-dir` on clone — low storage cost, free re-merge, `.llm.json` stays versioned alongside framework changes. Preferred if per-framework cost is non-trivial (>$0.05).
    - **(B) Un-ignore `analysis/ir/annotated/`** — no re-run cost on clone but risks merge conflicts as IR evolves across SDK updates and extractor changes.
    - **(C) Accept ephemerality and document re-run requirement** — viable only if the full-pipeline cost stays under ~$0.10 USD total (not per-framework).

    **Reference:** Memory entry `llm-annotation-durability-llm-json-files-are-gitignored-decide-before-foundation-run` for rationale and cost anchor.

    **Steps:**
    1. Read the calibration run's cost and token usage for the medium framework.
    2. Extrapolate to the Foundation framework (large — hundreds of methods) and the full framework set (~252 frameworks, skipping those with zero LLM-extractable methods).
    3. Pick an option, update `.gitignore` accordingly, and document the decision in `analysis/scripts/llm-annotate-orchestration.md`.

    **Acceptance criteria:** `.gitignore` updated to reflect the chosen strategy; re-run requirement (or absence thereof) documented in the orchestration script.
  results: |
    **Decision: Option A — `.llm.json` files versioned in git as
    source-of-truth.**

    **What was done:**
    1. Read calibration cost data from EventKit run: ~39k tokens for 19
       methods, ~73s wall time. Combined with PushKit's 54k tokens for 2
       methods, the cost model is dominated by fixed overhead (~30–40k
       tokens per framework: cargo run for `llm-validate`, header reads,
       summary parsing) with small marginal per-method cost.
    2. Ran full `llm-extract` (no `--only`) to enumerate every framework
       that has flagged methods. Result: **154 frameworks, 17,862 methods
       total**. Matter dominates with 12,827 methods (Apple's smart-home
       framework — every device cluster generates dozens of methods); the
       long tail across the other 153 frameworks is 5,035 methods.
    3. Extrapolated regeneration cost for the full set:
       - Fixed: 154 × 35k tokens ≈ 5.4M tokens
       - Marginal: 17,862 × ~500 tokens ≈ 9M tokens
       - Total: ~14M subagent tokens to regenerate from scratch
    4. Measured `.llm.json` storage: PushKit 1.4 KB, EventKit 3.8 KB.
       Projected full set: <1 MB versioned JSON.
    5. Storage trade-off is not close — Option A wins decisively.

    **Why Option A and not B/C:**
    - **(B) Versioning `analysis/ir/annotated/`** — checkpoints are
      100×–1000× larger than the source `.llm.json` files and contain
      redundant heuristic annotations that conflict on every extractor
      change. The `.llm.json` files are the load-bearing source-of-truth;
      the annotated checkpoint is downstream.
    - **(C) Accepting ephemerality** — only viable if total cost stays
      under ~$0.10. With ~14M tokens and the constraint that LLM calls
      must run inside Claude Code, this is decisively non-viable.

    **Files updated:**
    1. `.gitignore` (line 16 area): removed
       `analysis/ir/llm-annotations/` from the ignore list and updated the
       rationale comment to point at the orchestration doc.
    2. `analysis/scripts/llm-annotate-orchestration.md`: added a "Durability
       — `.llm.json` files are versioned" section explaining the rationale,
       the fresh-clone workflow (re-run `llm-extract` + `annotate --llm-dir`,
       no LLM calls), and the rejected options.
    3. Same file's cost-tracking table: added an EventKit row (2026-04-28)
       capturing tokens, wall time, tool-use count, and the heuristic-vs-LLM
       finding.

    **Verification:**
    - `git check-ignore -v` confirms `analysis/ir/llm-annotations/*.llm.json`
      is no longer ignored, while the other four `analysis/ir/*` checkpoint
      dirs remain ignored.
    - `git status --untracked-files=all` shows
      `analysis/ir/llm-annotations/EventKit.llm.json` and
      `analysis/ir/llm-annotations/PushKit.llm.json` as untracked, ready to
      commit.

    **Acceptance criteria check:**
    - ✅ `.gitignore` updated to reflect the chosen strategy.
    - ✅ Re-run requirement (or rather, *no-re-run* on fresh clones)
      documented in the orchestration script.

    **What this suggests next:**
    1. Whoever does the next full Foundation-or-larger calibration should
       target an LLM-defeating naming pattern (heuristic likely matches
       `*completion*`, `*Handler*`, etc.) so we get a real LLM-vs-heuristic
       delta — currently the EventKit run shows zero divergence.
    2. Matter is an outlier at 12,827 flagged methods. If we ever annotate
       it, it should probably be chunked across many subagents with strict
       class-level partitioning, not dispatched as one giant subagent.
    3. The cost model assumes ~500 tokens marginal per method; this is a
       guess based on 19/2-method runs. A 100-method calibration would
       tighten the marginal-cost estimate before committing to Foundation.
