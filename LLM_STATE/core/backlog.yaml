tasks:
- id: run-llm-annotation-pass-on-coredata-or-avfoundation
  title: Run LLM annotation pass on CoreData (or AVFoundation)
  category: analysis
  status: not_started
  dependencies: []
  description: |
    **Priority:** high

    **Promoted from:** AppKit LLM annotation pass results (session 43) — "What this suggests next" items 2–3.

    **Problem:** The next high-value framework for LLM annotation should be selected based on the refined signal from three completed runs (WebKit, Foundation, AppKit). Block-invocation re-classification is now the consistent per-framework LLM win — heuristics cannot distinguish stored vs. async vs. synchronous block invocations without reading header comments and attribute annotations. Threading annotation is lower-yield on most frameworks because heuristics now propagate class-level `NS_SWIFT_UI_ACTOR` markers.

    **Framework candidates and rationale:**
    - **CoreData** — rich delegation and observer surface (`NSFetchedResultsController` delegate, NSManagedObjectContext did-change notifications, batch-request handlers). Ownership patterns are complex (retained coordinator delegates, weak persistent-store-coordinator delegates). Error-out-param surface is large (`NSError **` on every save/fetch/execute). Expected block surface: moderate (batch-delete/update `NSBatchDeleteResult` handlers, `NSManagedObjectContext.perform:` / `performBlockAndWait:` completion blocks — these are `async_copied` and `stored` respectively). **Recommended first choice.**
    - **AVFoundation** — very large completion-handler and stored-observer surface (asset loading callbacks, capture session KVO, audio route change handlers, player item notifications). Block lifecycle has the highest stored-handler density of any Apple framework. Threading surface is large (main-thread UI delegates, audio-thread callbacks).

    **Settled design decisions:**
    - Follow the same subagent dispatch pattern as Foundation and AppKit: `llm-extract --only <Framework>`, wipe existing annotated checkpoint, heuristic-only baseline, dispatch single `llm-annotate-subagent.md` subagent, re-annotate with `--llm-dir`, enrich, verify.
    - Budget: 35k + N × 250 tokens/method. Confirm method count before dispatch; >500 methods may need chunking per the subagent guide.
    - Document per-field deltas (threading, ownership, block invocation breakdown: sync/async/stored) in the runs table.
    - **Use stored-block count delta as the primary success metric.** A `stored` count of 0 in the heuristic baseline → non-zero post-merge is the headline win for Racket binding correctness.

    **Preconditions:**
    - `analysis/ir/llm-annotations/AppKit.llm.json` committed and present (done in session 43).
    - No blocking merge issues (empirically validated on AppKit).

    **Acceptance criteria:**
    - `llm-validate` passes on framework output.
    - `enrich --only <Framework>` verification passes.
    - LLM-vs-heuristic delta documented (especially stored-block count delta).
    - Runs table in `analysis/scripts/llm-annotate-orchestration.md` updated.

    **Dependencies:** none
