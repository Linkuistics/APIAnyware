tasks:
- id: re-run-llm-annotation-for-16-frameworks-with-stale-llm-json-after-foreign-module-extractor-fix
  title: Re-run LLM annotation for 16 frameworks with stale .llm.json after foreign-module extractor fix
  category: analysis
  status: not_started
  dependencies: []
  description: |
    **Problem:** The foreign-module type-decl filter fix (`is_foreign_module_type_decl()` in
    `collection/crates/extract-swift/src/declaration_mapping.rs`) removed ~20+ stale (class, selector)
    pairs from `.methods.json` summaries across 16 frameworks. The versioned `.llm.json` files in
    `analysis/ir/llm-annotations/` were generated against the pre-fix summaries and now reference
    selectors that no longer exist. `llm-validate` correctly flags all 16 with errors.

    **Affected frameworks (16):**
    AppIntents, AppKit, Cinematic, CloudKit, DiscRecordingUI, Foundation, GroupActivities, IOBluetooth,
    OSLog, Photos, QuickLookUI, RealityFoundation, RealityKit, SecurityInterface, SharedWithYou, SwiftUI

    **Steps:**
    1. Re-run `llm-extract` to regenerate `.methods.json` summaries for all 16 frameworks.
    2. Dispatch LLM annotation subagents for each framework per
       `analysis/scripts/llm-annotate-subagent.md`. Use up to 25-way fan-out (calibrated safe).
    3. Each subagent must run `llm-validate` before returning — exit 0 required.
    4. Run `annotate --llm-dir analysis/ir/llm-annotations/` and `enrich` for all 16 frameworks.
    5. Confirm `llm-validate` exits 0 for all 16 frameworks; commit updated `.llm.json` files.

    **Fallback:** The jq mechanical cleanup approach (drop selector entries not in the updated summary)
    was prototyped and produces semantically correct output, but causes significant whitespace churn
    because `.llm.json` files use a custom inline-object format that jq expands differently. Use as
    fallback only if subagent cost is prohibitive.

    **Reference:** Promoted from `fix-swift-extension-method-misattribution-in-methods-extractor`
    Results section "Follow-up: stale `.llm.json` annotations". Original filter fix is at
    `collection/crates/extract-swift/src/declaration_mapping.rs` lines 30–44 and 168–196.

    **Dependencies:** None — `.methods.json` regeneration is the first step.
