tasks:
- id: run-llm-annotation-on-remaining-non-matter-frameworks-47-medium-14-medium-large
  title: Run LLM annotation on remaining non-Matter frameworks (47 medium + 14 medium-large)
  category: analysis
  status: not_started
  dependencies: []
  description: |
    **Priority:** high

    **Promoted from:** run-llm-annotation-passes-on-remaining-medium-priority-frameworks-batch results — "What this suggests next" items 1 and 3.

    **Problem:** After the first 25-framework batch (all small, ≤2 flagged methods, ~105s wall-clock), two cohorts remain before Matter:

    - **47 medium frameworks** with 3–5 flagged methods each. Estimated ~50k–60k tokens each at observed ~250 tok/method rate (~2.5M tokens total). Candidate list available via `jq` on `analysis/ir/llm-summaries/`.
    - **14 medium-large frameworks** with 68–228 flagged methods each: _AppIntents_SwiftUI (68), OpenDirectory (71), SpriteKit (73), SceneKit (93), HealthKit (98), AppIntents (105), RealityFoundation (105), IOUSBHost (115), AVFAudio (130), Combine (161), CloudKit (184), GameKit (186), Vision (195), NetworkExtension (228). Total estimated ~1.9M–2.2M tokens at 35k + N × 250.

    **Settled design decisions:**
    - Same orchestration pattern as prior batches: `llm-extract --only <framework>`, wipe prior checkpoint, heuristic-only baseline, dispatch `llm-annotate-subagent.md` subagent, re-annotate with `--llm-dir`, enrich, verify.
    - 25-way fan-out is empirically safe (warnings=0 first-try, negligible orchestrator overhead).
    - Budget: 35k + N × 250 tokens/method for naming-compliant frameworks; 35k + N × 534 for naming-pattern-defeating (heavy Swift class decorations).
    - Confirm method counts per framework via `jq '.method_count' analysis/ir/llm-summaries/<Framework>.methods.json` before dispatch.
    - Dispatch cohorts in parallel; can split medium (47) and medium-large (14) into sub-batches if total context is unwieldy.
    - Primary metric: `stored_block` reclassification count (heuristics emit 0 stored; LLM delta is the additive value).

    **Acceptance criteria:**
    - All 47 medium + 14 medium-large frameworks in `analysis/ir/llm-summaries/` annotated with `.llm.json` committed.
    - `llm-validate` passes on each output with `warnings=0` (or divergences documented in orchestration table).
    - `enrich --only <Framework>` verification passes for each framework.
    - Orchestration table in `analysis/scripts/llm-annotate-orchestration.md` updated with per-framework rows.
    - Only Matter-scale frameworks (12,827 methods) and any discovered naming-pattern-defeating outliers remain unannotated after this task completes.

    **Dependencies:** none (established tooling; prior batches already committed)
- id: design-and-execute-chunked-llm-annotation-strategy-for-matter-framework
  title: Design and execute chunked LLM annotation strategy for Matter framework
  category: analysis
  status: not_started
  dependencies: []
  description: |
    **Priority:** medium

    **Promoted from:** run-llm-annotation-passes-on-remaining-medium-priority-frameworks-batch results — "What this suggests next" item 2.

    **Problem:** Matter is a single framework with 12,827 flagged methods — roughly 26 average-frameworks-worth of methods in one `.methods.json`. At the standard 35k + N × 250 tok/method model, this projects to ~3.2M tokens for a single subagent pass — far beyond the single-subagent budget. The standard orchestration pattern (one subagent per framework) does not scale to this size.

    **Options to evaluate:**
    1. **Chunked subagent by class**: split `Matter.methods.json` into class-sized slices; dispatch one subagent per class (or per N classes). The orchestrator merges `.llm.json` fragments. Requires a split/merge utility or manual per-class prompt construction.
    2. **Batched prompt by class group**: single subagent that receives 10–20 classes per invocation in a streaming loop, each returning a partial annotation set. More orchestration complexity, but avoids per-class subagent overhead.
    3. **Heuristic-only + LLM for high-signal classes only**: run heuristics across all 12,827 methods, then LLM-annotate only classes with >5 heuristic-zero blocks or known stored-block patterns (e.g. delegate setters, completion handlers with matching naming defeats). Reduces LLM token spend by 60–80% at the cost of missing stored-block reclassifications in middle-tier classes.

    **Design call needed:**
    - Inspect Matter's class distribution (`jq '[.classes[] | {name, methods: (.methods | length)}] | sort_by(-.methods)' analysis/ir/llm-summaries/Matter.methods.json`) to determine how many classes have >10 flagged methods.
    - Pick chunking strategy based on class count and per-class token estimates.
    - If chunked subagent, implement or script the merge step before dispatching.

    **Acceptance criteria:**
    - A concrete chunking/batching strategy documented in `analysis/scripts/llm-annotate-orchestration.md`.
    - At minimum a pilot run on the top-10 highest-method-count Matter classes to validate the chosen approach.
    - Full Matter annotation with committed `.llm.json` and `llm-validate warnings=0`.
    - `enrich --only Matter` verification passes.

    **Dependencies:** none (though proceeding after the remaining non-Matter batch is complete makes sense operationally)
