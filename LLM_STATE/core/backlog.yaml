tasks:
- id: re-run-annotate-enrich-workspace-wide-to-materialise-mainactor-and-copy-block-setter-heuristic-improvements
  title: Re-run annotate + enrich workspace-wide to materialise MainActor and copy-block-setter heuristic improvements
  category: analysis
  status: not_started
  dependencies: []
  description: |
    Re-run `cargo run -p apianyware-macos-analyze -- annotate --llm-dir analysis/ir/llm-annotations/` workspace-wide, then `enrich`, to materialise the MainActor-propagation and copy-block-setter `stored` heuristic improvements added in the prior cycle.

    **Why needed now:** `analysis/ir/annotated/*.json` was generated before `ir::Class.swift_attributes` and `ir::Property.is_copy` landed in the IR and before heuristics began propagating them. The currently-checked-in annotated output therefore reflects the old heuristic layer. The new annotations will show up as `source: heuristic`; LLM-sourced entries win on conflict, so the merge is information-preserving.

    **Expected effects:**
    - Frameworks with `@MainActor`/`@_Concurrency.MainActor` classes (AppKit ~273, DiscRecordingUI ~33, RealityFoundation ~50, SecurityInterface ~41, QuickLookUI ~7, plus any other frameworks) pick up heuristic-sourced `main_thread_only` threading constraints.
    - Frameworks with `@property (copy)` block setters gain heuristic-sourced `stored` block lifecycle annotations.

    **Steps:**
    1. `cargo run -p apianyware-macos-analyze -- annotate --llm-dir analysis/ir/llm-annotations/`
    2. `cargo run -p apianyware-macos-analyze -- enrich`
    3. Spot-check: verify AppKit `NSWindowController`/`NSViewController` methods now carry `source: heuristic` for `main_thread_only`, and a `@property (copy)` block setter (e.g. `NSOperation.completionBlock` setter) carries `stored` + `source: heuristic`.
- id: wire-check-llm-annotation-drift-sh-into-triage-phase-pre-hook
  title: Wire check-llm-annotation-drift.sh into triage-phase pre-hook
  category: analysis
  status: not_started
  dependencies: []
  description: |
    Wire `analysis/scripts/check-llm-annotation-drift.sh` into a triage-phase pre-hook so annotation staleness is caught immediately after any extraction change rather than at the next manual triage cycle.

    **What the script does:** Iterates `analysis/ir/llm-annotations/*.llm.json`, re-runs `llm-validate` against freshly-regenerated summaries, exits non-zero with a summary of failed frameworks on staleness.

    **Implementation options:**
    1. Add a `run-plan: triage` pre-hook entry in `.claude/settings.json` that calls `./analysis/scripts/check-llm-annotation-drift.sh --skip-regen` (fast path — skips re-extraction, just validates against current summaries).
    2. Alternatively, add a `make lint-annotations` Makefile target callable from any CI/pre-commit context.

    **Constraint:** The script already exists and was verified clean against 154 `.llm.json` files. This task is purely about wiring it into an automated gate, not about writing the script.

    **Why:** Extraction changes that alter the method set (e.g. the foreign-module type-decl filter, 2026-04-20, affecting 16 frameworks) leave `.llm.json` files silently stale. Without an automated gate, staleness accumulates until the next manual triage discovers it.
- id: audit-llm-annotation-budget-identify-frameworks-where-new-heuristics-eliminate-llm-need
  title: 'Audit LLM annotation budget: identify frameworks where new heuristics eliminate LLM need'
  category: analysis
  status: not_started
  dependencies:
  - re-run-annotate-enrich-workspace-wide-to-materialise-mainactor-and-copy-block-setter-heuristic-improvements
  description: |
    After the workspace-wide `annotate + enrich` pass materialises the new MainActor and copy-block-setter heuristics, audit which frameworks may no longer need LLM annotation.

    **Approach:**
    1. Re-run `llm-extract` to produce fresh `.methods.json` summaries.
    2. Check which frameworks now have empty or near-empty summaries (all methods covered by heuristics).
    3. For frameworks with empty summaries, the LLM subagent call can be skipped on future re-annotation cycles.

    **Expected candidates:**
    - Frameworks dominated by `@MainActor` classes where the primary LLM value-add was `main_thread_only` threading (e.g. DiscRecordingUI, SecurityInterface, QuickLookUI).
    - Frameworks with many `@property (copy)` block setters where the primary LLM value-add was `stored` classification.

    **Output:** An updated note in `analysis/scripts/llm-annotate-orchestration.md` listing frameworks whose LLM annotation is now redundant, plus a revised per-framework cost estimate for future full-corpus re-annotation runs.

    **Why:** Each skipped framework saves ~35k fixed dispatch tokens. Knowing the updated list before the next re-annotation cycle prevents unnecessary token spend.
- id: capture-swift-ui-actor-from-libclang-in-extract-objc-to-close-appkit-side-mainactor-gap
  title: Capture _SWIFT_UI_ACTOR from libclang in extract-objc to close AppKit-side MainActor gap
  category: analysis
  status: not_started
  dependencies: []
  description: |
    Add `_SWIFT_UI_ACTOR` macro detection in `extract-objc` so that the ObjC-header MainActor signal reaches `ir::Class.swift_attributes` and is propagated by the existing `derive_threading` heuristic.

    **Current state:** The `derive_threading` heuristic reads `ir::Class.swift_attributes` populated by `extract-swift`'s `map_class`. This captures `@MainActor`/`@_Concurrency.MainActor` from Swift API digester output. However, pure-ObjC classes annotated only with the `_SWIFT_UI_ACTOR` macro in ObjC headers do not reach `swift_attributes` from the Swift side; they currently rely on a hardcoded UI class list in the heuristic.

    **Fix location:** `collection/crates/extract-objc/src/extract_declarations.rs` — in the `extract_class` path, scan the entity's attributes or comment text for the `_SWIFT_UI_ACTOR` macro and populate `ir::Class.swift_attributes` with `"MainActor"` when found. The existing `merge::merge_class_members` set-union semantics then combine ObjC-side and Swift-side contributions correctly.

    **Blast radius:** AppKit NSView/NSWindow/NSResponder-family classes annotated with `_SWIFT_UI_ACTOR` macros in ObjC headers that currently rely on the hardcoded list. The hardcoded list remains a fallback; this is an additive improvement.

    **Why:** Closes the coverage gap for ObjC-first frameworks where the hardcoded list may not enumerate every `_SWIFT_UI_ACTOR` class, making `swift_attributes` the single authoritative source for MainActor detection.
