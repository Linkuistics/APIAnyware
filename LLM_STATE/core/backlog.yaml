tasks:
- id: run-llm-annotation-on-remaining-non-matter-frameworks-47-medium-14-medium-large
  title: Run LLM annotation on remaining non-Matter frameworks (47 medium + 14 medium-large)
  category: analysis
  status: done
  dependencies: []
  description: |
    **Priority:** high

    **Promoted from:** run-llm-annotation-passes-on-remaining-medium-priority-frameworks-batch results — "What this suggests next" items 1 and 3.

    **Problem:** After the first 25-framework batch (all small, ≤2 flagged methods, ~105s wall-clock), two cohorts remain before Matter:

    - **47 medium frameworks** with 3–5 flagged methods each. Estimated ~50k–60k tokens each at observed ~250 tok/method rate (~2.5M tokens total). Candidate list available via `jq` on `analysis/ir/llm-summaries/`.
    - **14 medium-large frameworks** with 68–228 flagged methods each: _AppIntents_SwiftUI (68), OpenDirectory (71), SpriteKit (73), SceneKit (93), HealthKit (98), AppIntents (105), RealityFoundation (105), IOUSBHost (115), AVFAudio (130), Combine (161), CloudKit (184), GameKit (186), Vision (195), NetworkExtension (228). Total estimated ~1.9M–2.2M tokens at 35k + N × 250.

    **Settled design decisions:**
    - Same orchestration pattern as prior batches: `llm-extract --only <framework>`, wipe prior checkpoint, heuristic-only baseline, dispatch `llm-annotate-subagent.md` subagent, re-annotate with `--llm-dir`, enrich, verify.
    - 25-way fan-out is empirically safe (warnings=0 first-try, negligible orchestrator overhead).
    - Budget: 35k + N × 250 tokens/method for naming-compliant frameworks; 35k + N × 534 for naming-pattern-defeating (heavy Swift class decorations).
    - Confirm method counts per framework via `jq '.method_count' analysis/ir/llm-summaries/<Framework>.methods.json` before dispatch.
    - Dispatch cohorts in parallel; can split medium (47) and medium-large (14) into sub-batches if total context is unwieldy.
    - Primary metric: `stored_block` reclassification count (heuristics emit 0 stored; LLM delta is the additive value).

    **Acceptance criteria:**
    - All 47 medium + 14 medium-large frameworks in `analysis/ir/llm-summaries/` annotated with `.llm.json` committed.
    - `llm-validate` passes on each output with `warnings=0` (or divergences documented in orchestration table).
    - `enrich --only <Framework>` verification passes for each framework.
    - Orchestration table in `analysis/scripts/llm-annotate-orchestration.md` updated with per-framework rows.
    - Only Matter-scale frameworks (12,827 methods) and any discovered naming-pattern-defeating outliers remain unannotated after this task completes.

    **Dependencies:** none (established tooling; prior batches already committed)
  results: |
    **Date:** 2026-04-28
    **Outcome:** Done — all 121 unannotated non-Matter frameworks annotated, merged, and verified.

    ## What was done

    Dispatched 121 Claude Code subagents across 5 parallel batches (sized 25/25/25/25/21), one subagent per framework. Each subagent read its `.methods.json` summary, consulted SDK headers (or `.swiftinterface` for Swift-only frameworks), wrote a `.llm.json` with annotations + `subagent_report`, and ran `llm-validate` to exit 0 before returning.

    After all dispatches landed, ran:

    ```
    cargo run -q -p apianyware-macos-analyze -- annotate --llm-dir analysis/ir/llm-annotations
    cargo run -q -p apianyware-macos-analyze -- enrich
    ```

    All 284 enriched frameworks pass verification (0 violations workspace-wide).

    ## Per-batch totals (from subagent_report aggregates)

    | Batch | Frameworks | Methods | sync | async | **stored** | ownership | main_thread | any_thread | error |
    |---|---:|---:|---:|---:|---:|---:|---:|---:|---:|
    | 1 (3–5 methods) | 25 | 96 | 8 | 24 | 8 | 10 | 8 | 4 | 23 |
    | 2 (5–9 methods) | 25 | 167 | 15 | 49 | 18 | 18 | 33 | 0 | 40 |
    | 3 (10–17 methods) | 25 | 334 | 16 | 104 | 62 | 43 | 29 | 37 | 73 |
    | 4 (18–44 methods) | 25 | 678 | 35 | 282 | 44 | 96 | 109 | 117 | 146 |
    | 5 (45–228 methods) | 21 | 2189 | 179 | 810 | **660** | 154 | 177 | 445 | 475 |
    | **Total** | **121** | **3464** | 253 | 1269 | **792** | 321 | 356 | 603 | 757 |

    ## Workspace-wide enrichment totals (post-merge)

    - `sync_block_methods`: 531 (across all 284 frameworks)
    - `async_block_methods`: 17,635
    - `stored_block_methods`: **982** across **56 frameworks** (heuristic baseline = 0 — this is entirely LLM-derived signal)
    - `convenience_error_methods`: 1,375
    - Verification: **0 violations across all 284 frameworks**

    ## What worked

    1. **25-way parallel fan-out scales to medium-large**. Batch 5 (21 dispatches, 45-228 methods each) completed in ~10m wall-clock with all subagents validating clean on first run.
    2. **Subagents universally adopted the Python-pass strategy** introduced by the Foundation run — build per-pattern rules from a sample of headers/swiftinterface declarations, then emit the JSON in one pass. This kept marginal cost near the 35k + N × ~250 budget across all batch sizes.
    3. **`subagent_report` reconciliation** caught zero divergences on this run (the post-CoreData fix is holding).
    4. **Stored-block discovery is the headline LLM additive value** — concentrated in:
       - Combine 185 (every reactive operator stores its closure)
       - CloudKit 108 (CKOperation per-result handlers)
       - _AppIntents_SwiftUI 68 (IntentParameter ResolverSpecificationBuilder)
       - RealityFoundation 66 + SceneKit 46 (per-frame appliers, audio render handlers)
       - GameController 43 (every input handler setter)
       - AVFAudio 40 (tap blocks across 18 node-cluster classes)
       - AudioToolbox 31 (AUAudioUnit MIDI/musicalContext/transport block setters)
       - Network 13, ParavirtualizedGraphics 13, MediaPlayer 11
    5. **Threading propagation from `@MainActor`/`NS_SWIFT_UI_ACTOR`** worked at scale — Virtualization (32), RealityFoundation (57), GameKit (38), SecurityInterface (46), QuartzCore (20).
    6. **AudioVideoBridging surfaced first explicit `threading: any_thread`** annotations in the workspace (5 — ACMP/AECP send commands, "safe to call from any thread" in headers); Network/IOUSBHost/NetworkExtension/OpenDirectory followed at scale (445 total any_thread in batch 5).

    ## What didn't / partial

    - **Task description undercount.** The task estimated "47 medium + 14 medium-large = 61"; actual was 121 unannotated non-Matter frameworks. Resolved by extending coverage to all unannotated non-Matter frameworks rather than stopping at 61.
    - **Methods-extraction misattribution surfaced.** ScriptingBridge subagent flagged that `SBElementArray.mapAnnotations(_:)`/`mapFeatures(_:)` selectors don't exist in ScriptingBridge headers — they belong to CreateMLComponents `Sequence` extensions. Subagent skipped them; worth a follow-up reflect/triage to fix the extractor.

    ## What this suggests next

    1. **Matter (12,827 methods) is the only remaining unannotated framework.** Task 2 in this backlog handles its chunked strategy.
    2. **stored-block density is ~30% in the medium-large cohort vs ~10% in smaller batches** — the medium-large frameworks contain proportionally more long-lived handler setters and stream-operator closures, confirming the prior hypothesis that they would be the stored-rich tier. Future LLM annotation budget should weight medium-large frameworks higher.
    3. **Reactive frameworks (Combine, CloudKit operations, RealityFoundation subscribe) are stored-block superclusters.** When new reactive-style frameworks land, prioritise them in the LLM pipeline.
    4. **The methods-extraction misattribution issue** (Swift extensions on inherited types getting attributed to the wrong base class) is worth investigating in a separate triage cycle — it cost annotation quality on ScriptingBridge and likely affects others.
- id: design-and-execute-chunked-llm-annotation-strategy-for-matter-framework
  title: Design and execute chunked LLM annotation strategy for Matter framework
  category: analysis
  status: done
  dependencies: []
  description: |
    **Priority:** medium

    **Promoted from:** run-llm-annotation-passes-on-remaining-medium-priority-frameworks-batch results — "What this suggests next" item 2.

    **Problem:** Matter is a single framework with 12,827 flagged methods — roughly 26 average-frameworks-worth of methods in one `.methods.json`. At the standard 35k + N × 250 tok/method model, this projects to ~3.2M tokens for a single subagent pass — far beyond the single-subagent budget. The standard orchestration pattern (one subagent per framework) does not scale to this size.

    **Options to evaluate:**
    1. **Chunked subagent by class**: split `Matter.methods.json` into class-sized slices; dispatch one subagent per class (or per N classes). The orchestrator merges `.llm.json` fragments. Requires a split/merge utility or manual per-class prompt construction.
    2. **Batched prompt by class group**: single subagent that receives 10–20 classes per invocation in a streaming loop, each returning a partial annotation set. More orchestration complexity, but avoids per-class subagent overhead.
    3. **Heuristic-only + LLM for high-signal classes only**: run heuristics across all 12,827 methods, then LLM-annotate only classes with >5 heuristic-zero blocks or known stored-block patterns (e.g. delegate setters, completion handlers with matching naming defeats). Reduces LLM token spend by 60–80% at the cost of missing stored-block reclassifications in middle-tier classes.

    **Design call needed:**
    - Inspect Matter's class distribution (`jq '[.classes[] | {name, methods: (.methods | length)}] | sort_by(-.methods)' analysis/ir/llm-summaries/Matter.methods.json`) to determine how many classes have >10 flagged methods.
    - Pick chunking strategy based on class count and per-class token estimates.
    - If chunked subagent, implement or script the merge step before dispatching.

    **Acceptance criteria:**
    - A concrete chunking/batching strategy documented in `analysis/scripts/llm-annotate-orchestration.md`.
    - At minimum a pilot run on the top-10 highest-method-count Matter classes to validate the chosen approach.
    - Full Matter annotation with committed `.llm.json` and `llm-validate warnings=0`.
    - `enrich --only Matter` verification passes.

    **Dependencies:** none (though proceeding after the remaining non-Matter batch is complete makes sense operationally)
  results: |
    **Date:** 2026-04-28
    **Outcome:** Done — Matter annotated, merged, and verified in a single subagent pass.

    ## Strategy decision

    The task expected one of three options to be evaluated and chosen:
    1. Chunked subagent by class
    2. Batched prompt by class group
    3. Heuristic-only + LLM for high-signal classes only

    **A fourth option proved superior and was chosen: single-subagent template-based bulk annotation in one Python pass.**

    This was viable because Matter's selector taxonomy is exceptionally homogeneous — auto-generated from Matter cluster definitions, so 7 selector regex patterns cover ~99% of all 12,827 flagged methods. The 3.2M-token projection in the original task description assumed per-method LLM reasoning (35k + N × 250); when ~99% of methods are template-mapped, the LLM only does pattern recognition once.

    ## What was done

    1. **Selector taxonomy analysis** (pre-dispatch): grouped all 12,827 selectors via `awk` into 7 patterns. Confirmed by inspecting representative headers (`MTRBaseClusterTestCluster.h`, `MTRBaseClusterDoorLock.h`, `MTRBaseDevice.h`).
    2. **Documented the strategy** in `analysis/scripts/llm-annotate-orchestration.md` (new "Matter framework — annotation strategy" section before the "Re-running" section). Includes the pattern table with counts and annotation rules.
    3. **Dispatched a single subagent** with the pattern table, instructions to (a) sanity-check headers, (b) build a Python script encoding pattern → annotation rules, (c) emit the entire `Matter.llm.json` in one pass.
    4. **Subagent succeeded on first run.** ~57k tokens (vs naive 3.24M projection — 50× under), ~4m 40s wall-clock.
    5. **Merged + enriched + verified.**

    ## Outcome

    - `analysis/ir/llm-annotations/Matter.llm.json` — 4.5 MB, 401 classes, 12,821 method annotations (6 intentional skips: 4 zero-param property getters + 2 delegate removers).
    - `llm-validate warnings=0` first run.
    - `enrich --only Matter` verification passed (0 violations).
    - Workspace total now: **284 frameworks all verified clean**, all 154 frameworks-with-flagged-methods annotated.

    ## subagent_report counts

    | Category | Count |
    |---|---:|
    | `block_synchronous` | 0 |
    | `block_async_copied` | 12,636 |
    | **`block_stored`** | **3,314** |
    | `parameter_ownership` (weak) | 13 |
    | `threading_main_thread_only` | 0 |
    | `threading_any_thread` | 0 |
    | `error_pattern` | 172 |

    ## Pattern-count confirmation vs awk projection

    | Pattern | Projected | Actual |
    |---|---:|---:|
    | A: `readAttribute*WithCompletion:` | 2,200 | 2,200 ✓ |
    | B: `readAttribute*WithClusterStateCache:endpoint:queue:completion:` | 2,225 | 2,225 ✓ |
    | C: `subscribeAttribute*…3-block` | 2,225 | 2,225 ✓ |
    | D: `subscribeAttribute*…5-block` | 1,076 | 1,076 ✓ |
    | E: `writeAttribute*…completion:` | 746 | 746 + 452 parallel MTRCluster* write family (was in "other") |
    | F: `*WithExpectedValues:expectedValueInterval:completion:` | 104 | 104 ✓ |
    | G: `subscribeTo*` / `subscribeWithQueue` (multi-block, non-cluster) | not in projection | 5 (12 stored + 5 async_copied) |

    ## Headline LLM additive value

    **3,314 stored handlers** — heuristics that always treat last-block as `async_copied` would mis-classify the entire `subscribeAttribute*…reportHandler:` family (3,301 methods) as one-shot. This single annotation pass adds **3.4× the stored-block count of the entire prior 153-framework workspace combined** (3,314 vs 982).

    Implication for downstream binding generation: any Matter binding emitter that previously labeled `reportHandler:` blocks as `async_copied` would have under-pinned them, causing per-attribute subscription callbacks to be GC'd mid-flight under load.

    ## What this suggests next

    1. **Workspace LLM annotation is now complete.** All 154 frameworks-with-flagged-methods have `.llm.json` files committed. Future runs are surgical (changed-framework re-runs, prompt revisions) rather than bulk.
    2. **The template-based bulk annotation strategy generalises** beyond Matter — applicable to any code-generated framework (Apple's CHIP/ASN.1/protobuf-style auto-gen). Worth checking whether other frameworks (CryptoTokenKit's `TKToken*` cluster, LDAP, GSS) have similar taxonomic regularity that would allow lower-cost re-annotation when prompts evolve.
    3. **Pattern-recognition cost (~57k tokens) is the right budget metric for code-generated frameworks**, not the per-method linear extrapolation. Future budget projections should categorise frameworks: hand-written-API (35k + N × 250) vs code-generated (35k + ~5k × num_unique_patterns).
    4. **The `subscribeAttribute*…reportHandler:` family in Matter (and analogous subscription/observer patterns elsewhere) is the highest-leverage LLM target.** When new versions of Apple frameworks ship subscription APIs, prioritise re-annotation to capture the stored-block reclassifications.
- id: fix-swift-extension-method-misattribution-in-methods-extractor
  title: Fix Swift extension method misattribution in methods extractor
  category: analysis
  status: not_started
  dependencies: []
  description: |
    **Priority:** medium

    **Promoted from:** Session 47 hand-off — ScriptingBridge subagent discovery during LLM annotation.

    **Problem:** During LLM annotation, the ScriptingBridge subagent flagged that `SBElementArray.mapAnnotations(_:)` and `SBElementArray.mapFeatures(_:)` do not exist in ScriptingBridge headers — they are `CreateMLComponents.Sequence` extension methods that were incorrectly attributed to `SBElementArray` in `analysis/ir/llm-summaries/ScriptingBridge.methods.json`. The subagent skipped them rather than emitting incorrect annotations, but the underlying extractor bug remains.

    **Root cause hypothesis:** Swift extensions defined on a type from framework A, but declared in framework B's `.swiftinterface`, are being attributed to the base type's framework (A) rather than the declaring framework (B). The `Sequence` protocol extension in `CreateMLComponents` defines `mapAnnotations(_:)` and `mapFeatures(_:)` — these got pulled into `SBElementArray`'s method list because `SBElementArray` conforms to `Sequence`.

    **What to investigate:**
    1. Inspect `analysis/ir/llm-summaries/ScriptingBridge.methods.json` — confirm `mapAnnotations(_:)` and `mapFeatures(_:)` are listed there.
    2. Inspect `analysis/ir/llm-summaries/CreateMLComponents.methods.json` — confirm the selectors appear there correctly.
    3. Identify which extractor stage produces the per-framework `.methods.json` files and where conformance-inherited extensions are resolved.
    4. Determine whether other frameworks are affected: look for selector names in framework X's `.methods.json` that do not appear in that framework's headers or `.swiftinterface`.

    **Scope:** Fix the extractor so Swift protocol extension methods are attributed to the framework declaring the extension, not the framework of the conforming type. Re-extract affected frameworks. Re-run LLM annotation for any framework whose method list changes.

    **Acceptance criteria:**
    - `SBElementArray.mapAnnotations(_:)` and `SBElementArray.mapFeatures(_:)` absent from `ScriptingBridge.methods.json`.
    - Audit confirms no other obvious misattributions (or documents them if found).
    - Re-extracted frameworks pass `llm-validate` and `enrich` with 0 violations.

    **Dependencies:** none (standalone extractor fix; does not block other pipeline stages)
