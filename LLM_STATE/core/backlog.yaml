tasks:
- id: run-llm-annotation-pass-on-foundation
  title: Run LLM annotation pass on Foundation
  category: analysis
  status: not_started
  dependencies: []
  description: |
    **Priority:** high

    **Promoted from:** WebKit calibration session (session 38) decision block and "What this suggests next" item 3.

    **Summary:** Run the full LLM annotation pass on Foundation â€” the largest and most important framework for downstream Racket binding generation. Budget is confirmed acceptable (~326k tokens = 35k fixed + 546 Ã— 534).

    **Why Foundation:** Foundation methods are the dominant target for both `parameter_ownership` (delegate weak/copy patterns are pervasive) and async-copy block classification. The WebKit calibration confirmed the LLM's additive value for threading-macro annotations; Foundation is mostly thread-flexible, so the dominant additive value here will be ownership and delegate-setter annotations that heuristics miss on non-standard naming.

    **Precondition (blocker):** The `parameter_ownership` merge-clobber bug must be fixed first (see task `fix-parameter-ownership-merge-clobber-in-validate-merge-annotations`). Foundation's heuristic ownership coverage is much larger than WebKit's; losing it wholesale would defeat the purpose of the LLM pass.

    **Steps:**
    1. Verify merge bug is fixed and merged.
    2. Run `llm-extract --only Foundation` to produce `.methods.json`; confirm method count ~546.
    3. Delete any existing `analysis/ir/annotated/Foundation.json` checkpoint.
    4. Run `annotate --only Foundation` (heuristic-only) and record baseline annotation counts.
    5. Dispatch one subagent per `analysis/scripts/llm-annotate-subagent.md` (Foundation-sized; expect ~326k tokens, ~10â€“15m wall time).
    6. Run `annotate --only Foundation --llm-dir â€¦` and verify via `llm-validate` and `enrich`.
    7. Record: token count, wall time, tool uses, LLM-vs-heuristic delta by field.
    8. Update `analysis/scripts/llm-annotate-orchestration.md` runs table.

    **Cost projection:** `35,000 + 546 Ã— 534 â‰ˆ 326,564 tokens`. Decision in session 38: acceptable for a one-time-per-SDK-update cost.

    **Acceptance criteria:**
    - `llm-validate` passes on Foundation output.
    - `enrich` verification passes.
    - LLM-vs-heuristic delta documented (threading, ownership, block params).
    - Runs table updated.

    **Dependencies:** fix-parameter-ownership-merge-clobber-in-validate-merge-annotations
- id: refresh-webkit-annotated-checkpoint-after-parameter-ownership-merge-fix
  title: Refresh WebKit annotated checkpoint after parameter_ownership merge fix
  category: analysis
  status: not_started
  dependencies: []
  description: |
    **Priority:** medium

    **Promoted from:** fix-parameter-ownership-merge-clobber-in-validate-merge-annotations results â€” "What this suggests next" item 2.

    **Problem:** `analysis/ir/annotated/WebKit.json` was produced by the buggy `merge_annotations` that wholesale-cloned the LLM `parameter_ownership` list, dropping heuristic entries for params the LLM didn't annotate. The checkpoint records 15 ownership annotations instead of the correct 67. Downstream enrichment (and any future Racket binding generation from WebKit) currently sees the degraded ownership data.

    **Steps:**
    1. Confirm the fix is in place (`cargo test -p apianyware-macos-annotate` â€” all 56 pass).
    2. Delete `analysis/ir/annotated/WebKit.json` to force a clean re-run.
    3. Run `annotate --only WebKit --llm-dir analysis/ir/llm-annotations/` (the versioned `.llm.json` already exists from the calibration session).
    4. Verify: `jq '[.methods[].annotations.parameter_ownership // [] | length] | add' analysis/ir/annotated/WebKit.json` should be â‰¥ 66 (target ~67).
    5. Run `enrich --only WebKit` and `llm-validate` (if applicable) to confirm downstream passes.

    **Acceptance criteria:**
    - `analysis/ir/annotated/WebKit.json` records ~67 `parameter_ownership` entries (matching the post-fix calibration figure).
    - `enrich` passes on the refreshed checkpoint.
- id: gate-annotate-checkpoint-fallback-to-avoid-re-tagging-heuristic-annotations-as-llm-source
  title: Gate annotate checkpoint fallback to avoid re-tagging heuristic annotations as LLM source
  category: analysis
  status: done
  dependencies: []
  description: |
    **Priority:** low

    **Promoted from:** fix-parameter-ownership-merge-clobber-in-validate-merge-annotations results â€” "What this suggests next" item 3.

    **Problem:** `annotate` without `--llm-dir` falls back to the prior annotated checkpoint file as a pseudo-LLM source (`analysis/crates/annotate/src/lib.rs:62-77`) and re-tags every annotation as `source = Llm`. A heuristic-only baseline run is therefore indistinguishable from an LLM-merged run in the `source` field. This makes it impossible to audit which annotations came from heuristics vs. the LLM without consulting git history.

    **Current workaround:** Delete `analysis/ir/annotated/{Framework}.json` before running `annotate` without `--llm-dir`. This is documented in the memory entry "annotate without --llm-dir re-tags prior annotations as LLM source".

    **Proposed fix:** Gate `load_existing_annotations` in `lib.rs:62-77` to only run when:
    - `llm_dir` is `None`, AND
    - The existing checkpoint actually contains `source = Llm` entries.

    Or alternatively: when falling back to the existing checkpoint without an explicit `--llm-dir`, tag re-used entries as `source = Heuristic` (their original source) rather than `source = Llm`.

    **Why lower priority:** The workaround (delete checkpoint) is simple. No correctness impact on post-merge annotation quality. Purely an observability/auditability issue.

    **Acceptance criteria:**
    - Running `annotate --only <Framework>` without `--llm-dir` on a framework that has an existing annotated checkpoint does not re-tag `source` fields as `Llm`.
    - Heuristic-only runs are distinguishable from LLM-merged runs via the `source` field alone.
  results: |
    **Status:** done

    **What was done:**
    - Renamed `load_existing_annotations` â†’ `load_existing_llm_annotations` (`analysis/crates/annotate/src/lib.rs`) so the name reflects what it now actually returns: only `source = Llm` or `HumanReviewed` entries.
    - Extracted a pure helper `retain_llm_sourced(Vec<ClassAnnotations>) -> Vec<ClassAnnotations>` that filters per-method and drops classes with no remaining methods.
    - The fallback now returns `None` when the prior checkpoint has zero LLM-sourced entries, so a heuristic-only rerun produces only `source = Heuristic` annotations (no contamination).
    - Updated the call-site comment at `lib.rs:62` to document the new gating intent.
    - Updated `analysis/scripts/regenerate-stale-pipeline.sh:17` shell comment to reference the renamed function and note that heuristic-sourced entries are filtered out.

    **Tests added** (all in `analysis/crates/annotate/src/lib.rs` `#[cfg(test)] mod tests`):
    - `retain_llm_sourced_keeps_llm_and_human_reviewed_drops_heuristic`
    - `retain_llm_sourced_drops_classes_with_only_heuristic_methods`
    - `retain_llm_sourced_returns_empty_when_no_llm_sourced_entries`
    - `retain_llm_sourced_returns_empty_for_empty_input`
    - `load_existing_llm_annotations_returns_none_when_only_heuristic_entries_present` (end-to-end via `std::env::temp_dir()`; no `tempfile` crate dep added)
    - `load_existing_llm_annotations_returns_only_llm_entries_from_mixed_checkpoint`

    **Verification:**
    - `cargo test -p apianyware-macos-annotate` â†’ **62 passed, 0 failed** (was 56 before; +6 new tests).
    - `cargo test --workspace` â†’ all crates pass.
    - `cargo clippy --workspace --all-targets -- -D warnings` â†’ clean.
    - `cargo +nightly fmt --check -p apianyware-macos-annotate` â†’ clean.

    **Acceptance criteria (from task body):**
    - âœ… Running `annotate --only <Framework>` without `--llm-dir` on a framework whose existing checkpoint has only `source = Heuristic` entries no longer re-tags them as `Llm` (the fallback returns `None`, so `merge_annotations` takes the `None` arm and emits `source = Heuristic`).
    - âœ… Heuristic-only runs are distinguishable from LLM-merged runs via the `source` field alone.

    **Why option-1 over option-2:** The task body offered "preserve original `source`" as an alternative. I chose the gating approach because (a) heuristics deterministically re-run on every method via `annotate_method_heuristic`, so prior heuristic entries from the checkpoint carry zero new information, and (b) gating is a smaller surgical change than restructuring `merge_annotations` to preserve heritage source per merged entry.

    **Cross-references that may need follow-up (left for analyse-work / reflect):**
    - `LLM_STATE/core/memory.md:212` and `LLM_STATE/core/session-log.md:151,960` still reference the old function name `load_existing_annotations()`. These are plan-state files; per the work-phase contract I left them alone.
    - The "annotate without --llm-dir re-tags prior annotations as LLM source" memory entry (referenced in the task description as the "current workaround" doc) is now obsolete â€” wiping the checkpoint before a heuristic-only rerun is no longer required. Worth pruning during memory distillation.

    **What this suggests next:**
    - The `refresh-webkit-annotated-checkpoint-after-parameter-ownership-merge-fix` task is now safer to run: even if someone forgets `--llm-dir`, the rerun won't poison provenance. (But that task still requires `--llm-dir` for the actual LLM data; the gating just removes a footgun.)
    - Consider promoting `retain_llm_sourced` to a method on `FrameworkAnnotations` (or inverting the responsibility into `merge_annotations` so it only sets `source = Llm` when given a genuinely LLM-sourced entry). Either would push the invariant deeper into the type system. Not urgent.
