tasks:
- id: run-llm-annotation-pass-on-appkit
  title: Run LLM annotation pass on AppKit
  category: analysis
  status: done
  dependencies: []
  description: |
    **Priority:** high

    **Promoted from:** Foundation LLM annotation pass results (session 41) — "What this suggests next" item 3.

    **Problem:** AppKit is the next highest-value framework for LLM annotation. The WebKit calibration showed that class-level `WK_SWIFT_UI_ACTOR` decorations produced +63 `threading: main_thread_only` annotations — heuristics have no way to read macro-based class-wide decorations. AppKit's `NS*` classes are expected to carry `_SWIFT_UI_ACTOR` / `NS_SWIFT_UI_ACTOR` class-level decorations extensively (AppKit is UI-thread-bound), so the threading-additive contribution will likely be large, justifying the annotation budget more clearly than Foundation's near-zero threading surface.

    **Settled design decisions:**
    - Follow the same subagent dispatch pattern as Foundation: `llm-extract --only AppKit`, capture heuristic-only baseline (delete existing annotated checkpoint first), dispatch one subagent per `analysis/scripts/llm-annotate-subagent.md`.
    - Budget projection: use the revised 35k + N × 250 model, where N = AppKit method count from `llm-extract` output. (Foundation calibrated this at 131k for 546 methods; 250 tokens/method replaces the 534/method WebKit figure for typical frameworks.)
    - Confirm AppKit method count before dispatch to verify subagent is within single-run feasibility (>500 methods may need chunking per the subagent guide's threshold).
    - Record: token count, wall time, tool uses, LLM-vs-heuristic delta by field (especially threading), and update runs table.

    **Preconditions:**
    - `analysis/ir/llm-annotations/` contains up-to-date Foundation.llm.json ✅ (done in session 41).
    - No blocking parameter_ownership merge issues (fix landed; empirically validated on WebKit and Foundation).

    **Acceptance criteria:**
    - `llm-validate` passes on AppKit output.
    - `enrich --only AppKit` verification passes.
    - LLM-vs-heuristic delta documented (especially threading count, expected to be large).
    - Runs table in `analysis/scripts/llm-annotate-orchestration.md` updated.

    **Dependencies:** none
  results: |
    ## What was done

    Ran the AppKit LLM annotation pass following the established subagent dispatch workflow.

    **Workflow steps:**
    1. Refreshed `analysis/ir/llm-summaries/AppKit.methods.json` via `llm-extract --only AppKit` — confirmed 524 flagged methods across 140 classes (well below the 500-method chunking threshold).
    2. Captured a heuristic-only baseline by deleting `analysis/ir/annotated/AppKit.json` and `analysis/ir/llm-annotations/AppKit.llm.json`, then running `annotate --only AppKit` (no `--llm-dir`) and `enrich --only AppKit`.
    3. Dispatched a single Claude Code subagent (general-purpose) using the prompt template from `analysis/scripts/llm-annotate-subagent.md` with `{FRAMEWORK}=AppKit`. The subagent wrote `analysis/ir/llm-annotations/AppKit.llm.json` and ran `llm-validate` before returning.
    4. Wiped `analysis/ir/annotated/AppKit.json`, re-ran `annotate --only AppKit --llm-dir analysis/ir/llm-annotations/`, then `enrich --only AppKit`.
    5. Appended a row to the runs table in `analysis/scripts/llm-annotate-orchestration.md` documenting per-field deltas.

    ## What worked

    - **Subagent cost came in 28% under projection** (119,969 tokens vs 166k projected by 35k + 524×250). The refined `~250 tokens/method` model from the Foundation calibration continues to hold; AppKit and Foundation now both sit ~30–60% under the older 534/method WebKit figure.
    - **`llm-validate` passed first run.** Subagent emitted 138 classes / 437 methods, properly skipped paired getters and unjustifiable modal-callback selectors. No retries needed.
    - **`enrich --only AppKit` verification passed** with 0 violations both before and after the LLM merge.
    - **Block-invocation re-classification was the under-celebrated win:** heuristics had 0 `stored` block annotations; the LLM identified 25 stored handlers (`setHandler:`-family setters, NSCollectionViewDiffableDataSource section/supplementary providers, NSEvent global/local monitor handlers, NSStoryboard `creator:` cache, etc.) and demoted 47 async → 22 sync + 25 stored. The enrich `stored_blocks` count went from 0 → 25, which is the headline downstream-impacting change since `stored` blocks need GC-prevention pinning that `async_copied` blocks don't.
    - **Threading additive contribution: +278** (15605 → 15883 method-level threading entries), including 8 `any_thread` overrides on documented thread-safe APIs (NSImage 10.6+, NSSpellChecker). Per-class `main_thread_classes` count went 73 → 142.
    - **`.llm.json` is the only durable artifact that needs version control** — `.gitignore` already excludes `annotated/`, `enriched/`, and `llm-summaries/`. The 131 KB AppKit.llm.json is the load-bearing source of truth.

    ## What didn't (and what surprised)

    - **Threading additive was smaller than the task description anticipated.** The task expected AppKit's class-level `_SWIFT_UI_ACTOR` decorations to drive a large heuristic-vs-LLM threading delta (the WebKit calibration showed +63 from 0 baseline). In practice, heuristics now propagate class-wide threading markers to methods, so the heuristic baseline already had 15,605 main-thread annotations. The LLM contribution shifted from "discovering threading" to "supplementing coverage on classes heuristics didn't catch + 8 `any_thread` overrides." The delta is real but smaller than projected.
    - **Ownership delta was effectively zero (+1 method).** AppKit's delegate setters overwhelmingly follow the `setDelegate:`/`setDataSource:` naming convention that heuristics already classify correctly. The LLM added a single header-verified weak init (`NSWritingToolsCoordinator initWithDelegate:` family).
    - **9 modal-completion-callback selectors were deliberately left unannotated** (e.g., `commitEditingWithDelegate:didCommitSelector:contextInfo:`, `runOperationModalForWindow:delegate:didRunSelector:contextInfo:`) because Apple headers carry no explicit retention attribute on the modal-callback target. The subagent correctly chose to leave these to heuristics rather than guess.

    ## What this suggests next

    1. **The post-Foundation-fix merge logic is empirically sound on a large framework.** AppKit at 524 methods merged cleanly with no parameter_ownership clobber regressions — the WebKit-era merge bug is definitively gone.
    2. **Block-invocation re-classification is the consistent LLM win across frameworks.** WebKit gave +63 threading, Foundation gave +9 ownership, AppKit gave +25 stored / +22 sync from async demotion. Future framework selection should weight "headers carrying NS_NOESCAPE / `@property (copy)` block setters" alongside threading attributes when picking high-yield targets.
    3. **Refined budget rule:** 35k + N × 250 tokens/method. AppKit (524 methods, 119,969 actual) and Foundation (546 methods, 131,228 actual) both validate this. The earlier 534/method WebKit figure was a small-batch artifact; large-batch runs amortize fixed costs better via per-pattern rule extraction.
    4. **Candidate next high-value frameworks** (per the prior table's threading-additive logic, now refined): UIKit-shaped AppKit-adjacent frameworks like `Quartz` (PDFKit/QuickLook), `WebKit`-coexisting frameworks already done. The next candidate is likely **CoreData** for ownership/error patterns or **AVFoundation** for block lifecycle (large surface, lots of completion handlers and stored observers). The threading prior is now empirically lower-yield than the block-invocation prior on most frameworks.
    5. **Post-M9 review priorities (from project memory) remain in scope:** testing hardening, framework ignore list, and broader LLM annotation are all touched by this run; the AppKit pass exercises the orchestration pipeline at production scale and validates the durability/cost story before continuing.
- id: run-llm-annotation-pass-on-coredata-or-avfoundation
  title: Run LLM annotation pass on CoreData (or AVFoundation)
  category: analysis
  status: not_started
  dependencies: []
  description: |
    **Priority:** high

    **Promoted from:** AppKit LLM annotation pass results (session 43) — "What this suggests next" items 2–3.

    **Problem:** The next high-value framework for LLM annotation should be selected based on the refined signal from three completed runs (WebKit, Foundation, AppKit). Block-invocation re-classification is now the consistent per-framework LLM win — heuristics cannot distinguish stored vs. async vs. synchronous block invocations without reading header comments and attribute annotations. Threading annotation is lower-yield on most frameworks because heuristics now propagate class-level `NS_SWIFT_UI_ACTOR` markers.

    **Framework candidates and rationale:**
    - **CoreData** — rich delegation and observer surface (`NSFetchedResultsController` delegate, NSManagedObjectContext did-change notifications, batch-request handlers). Ownership patterns are complex (retained coordinator delegates, weak persistent-store-coordinator delegates). Error-out-param surface is large (`NSError **` on every save/fetch/execute). Expected block surface: moderate (batch-delete/update `NSBatchDeleteResult` handlers, `NSManagedObjectContext.perform:` / `performBlockAndWait:` completion blocks — these are `async_copied` and `stored` respectively). **Recommended first choice.**
    - **AVFoundation** — very large completion-handler and stored-observer surface (asset loading callbacks, capture session KVO, audio route change handlers, player item notifications). Block lifecycle has the highest stored-handler density of any Apple framework. Threading surface is large (main-thread UI delegates, audio-thread callbacks).

    **Settled design decisions:**
    - Follow the same subagent dispatch pattern as Foundation and AppKit: `llm-extract --only <Framework>`, wipe existing annotated checkpoint, heuristic-only baseline, dispatch single `llm-annotate-subagent.md` subagent, re-annotate with `--llm-dir`, enrich, verify.
    - Budget: 35k + N × 250 tokens/method. Confirm method count before dispatch; >500 methods may need chunking per the subagent guide.
    - Document per-field deltas (threading, ownership, block invocation breakdown: sync/async/stored) in the runs table.
    - **Use stored-block count delta as the primary success metric.** A `stored` count of 0 in the heuristic baseline → non-zero post-merge is the headline win for Racket binding correctness.

    **Preconditions:**
    - `analysis/ir/llm-annotations/AppKit.llm.json` committed and present (done in session 43).
    - No blocking merge issues (empirically validated on AppKit).

    **Acceptance criteria:**
    - `llm-validate` passes on framework output.
    - `enrich --only <Framework>` verification passes.
    - LLM-vs-heuristic delta documented (especially stored-block count delta).
    - Runs table in `analysis/scripts/llm-annotate-orchestration.md` updated.

    **Dependencies:** none
