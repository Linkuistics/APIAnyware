tasks:
- id: add-llm-validate-drift-detection-guardrail-for-annotation-staleness-after-extraction-changes
  title: Add llm-validate drift detection guardrail for annotation staleness after extraction changes
  category: analysis
  status: not_started
  dependencies: []
  description: |
    **Problem:** When an extraction fix changes the method set (e.g. the foreign-module type-decl filter landed 2026-04-20, affecting 16 frameworks), stale `.llm.json` files pass `llm-validate` *until* the next manual annotation run discovers the mismatch — there is no automated gate between the fix commit and the next triage cycle.

    **Signal from cycle:** The 16-framework re-annotation cycle (completed 2026-04-28) noted: "A script that re-runs `llm-validate` on all 154 annotated frameworks would have caught this regression at the moment the foreign-module fix landed, rather than at the next manual triage."

    **Proposed guardrail:**
    Write `analysis/scripts/check-llm-annotation-drift.sh` (or a Makefile target) that:
    1. Iterates `analysis/ir/llm-annotations/*.llm.json`.
    2. For each file, runs `llm-validate --framework <name>` (or the equivalent invocation).
    3. Exits non-zero on first failure and prints a summary of failed frameworks.
    4. Can be called from `run-plan: triage` hooks or manual pre-commit verification.

    **Scope:** The validator already exists (`llm-validate` CLI); this is a thin shell loop. Should be ~20 LOC. Add a note to `analysis/scripts/llm-annotate-orchestration.md` pointing to it as a post-extraction-fix verification step.

    **Why matters:** Catches annotation staleness immediately after extraction fixes rather than at the next triage cycle, preventing silent `.llm.json` drift from accumulating across multiple extraction changes.
- id: improve-annotation-heuristics-mainactor-threading-propagation-and-block-setter-stored-signal
  title: 'Improve annotation heuristics: MainActor threading propagation and block-setter stored signal'
  category: analysis
  status: not_started
  dependencies: []
  description: |
    **Two concrete heuristic improvements identified from the 16-framework LLM re-annotation cycle (2026-04-28). Both reduce future LLM subagent token spend by covering patterns that heuristics can determine statically.**

    ## 1. Propagate `@MainActor`/`@_Concurrency.MainActor` into the threading heuristic

    **Current state:** The heuristic threading pass propagates class-level `_SWIFT_UI_ACTOR` to methods (added in a prior cycle). However, Swift-native `@MainActor` and `@_Concurrency.MainActor` Swift interface attributes are NOT yet propagated by heuristics. The 16-framework cycle found 416 `main_thread_only` annotations where LLM was supplementing the heuristic gap (AppKit: 273, DiscRecordingUI: 33, RealityFoundation: 50, SecurityInterface: 41, QuickLookUI: 7, etc.).

    **Fix:** In `analysis/crates/annotate/src/heuristics.rs`, add a pass that reads `threading` from the IR's class-level `swift_attributes` field (or equivalent) for `@MainActor`/`@_Concurrency.MainActor` and propagates `main_thread_only` to all instance methods of that class.

    **Blast radius:** ~416 methods across the 16 frameworks above, plus any other frameworks with `@MainActor` classes not yet re-annotated by LLM.

    ## 2. Recognize `@property (copy)` block setters as `stored` signal

    **Current state:** Heuristics emit 0 `stored` block lifecycle annotations. The 16-framework cycle produced 280 `stored` annotations from LLM. A significant fraction come from Combine-style `@property (copy)` block setters (e.g., `NSOperation.completionBlock`, `NSTimer` blocks, per-result handlers on CKOperation subclasses, etc.).

    **Fix:** In `analysis/crates/annotate/src/heuristics.rs`, add a rule: if a method sets a `@property (copy)` parameter that has a block type, classify the block parameter as `stored`. The ObjC IR property entries carry the `copy` attribute; cross-reference with matching setter selector names.

    **Expected yield:** Reduces `stored`-block LLM annotation need on frameworks with clear `@property (copy)` setter patterns. Won't cover all 280 `stored` cases (some require semantic reasoning about retention lifetime), but covers the mechanically-detectable subset.

    ## Priority

    Both improvements are incremental quality upgrades to the heuristic layer. Do (1) first as it is purely additive and has a larger known blast radius.
