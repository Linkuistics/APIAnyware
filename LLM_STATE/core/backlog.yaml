tasks:
- id: run-llm-annotation-pass-on-appkit
  title: Run LLM annotation pass on AppKit
  category: analysis
  status: not_started
  dependencies: []
  description: |
    **Priority:** high

    **Promoted from:** Foundation LLM annotation pass results (session 41) — "What this suggests next" item 3.

    **Problem:** AppKit is the next highest-value framework for LLM annotation. The WebKit calibration showed that class-level `WK_SWIFT_UI_ACTOR` decorations produced +63 `threading: main_thread_only` annotations — heuristics have no way to read macro-based class-wide decorations. AppKit's `NS*` classes are expected to carry `_SWIFT_UI_ACTOR` / `NS_SWIFT_UI_ACTOR` class-level decorations extensively (AppKit is UI-thread-bound), so the threading-additive contribution will likely be large, justifying the annotation budget more clearly than Foundation's near-zero threading surface.

    **Settled design decisions:**
    - Follow the same subagent dispatch pattern as Foundation: `llm-extract --only AppKit`, capture heuristic-only baseline (delete existing annotated checkpoint first), dispatch one subagent per `analysis/scripts/llm-annotate-subagent.md`.
    - Budget projection: use the revised 35k + N × 250 model, where N = AppKit method count from `llm-extract` output. (Foundation calibrated this at 131k for 546 methods; 250 tokens/method replaces the 534/method WebKit figure for typical frameworks.)
    - Confirm AppKit method count before dispatch to verify subagent is within single-run feasibility (>500 methods may need chunking per the subagent guide's threshold).
    - Record: token count, wall time, tool uses, LLM-vs-heuristic delta by field (especially threading), and update runs table.

    **Preconditions:**
    - `analysis/ir/llm-annotations/` contains up-to-date Foundation.llm.json ✅ (done in session 41).
    - No blocking parameter_ownership merge issues (fix landed; empirically validated on WebKit and Foundation).

    **Acceptance criteria:**
    - `llm-validate` passes on AppKit output.
    - `enrich --only AppKit` verification passes.
    - LLM-vs-heuristic delta documented (especially threading count, expected to be large).
    - Runs table in `analysis/scripts/llm-annotate-orchestration.md` updated.

    **Dependencies:** none
- id: add-addobserver-observer-param-weak-heuristic-to-shrink-llm-additive-surface
  title: 'Add addObserver: observer-param weak heuristic to shrink LLM-additive surface'
  category: analysis
  status: done
  dependencies: []
  description: |
    **Priority:** medium

    **Promoted from:** Foundation LLM annotation pass results (session 41) — "What this suggests next" item 2.

    **Problem:** The LLM annotation pass on Foundation found 9 `parameter_ownership` annotations that heuristics missed: KVO `addObserver:forKeyPath:options:context:` observer params and `NSNotificationCenter addObserver:` family observer params. Heuristics don't classify these as `weak` because the selectors don't match the `setDelegate:` / `setDataSource:` naming pattern, even though `observer` (generic `id`) is semantically identical to a delegate in its ownership semantics.

    **Settled design:**
    - Add a new heuristic rule in the annotate crate: for any method whose selector contains `addObserver:` (case-sensitive substring match is fine; the ObjC naming convention is stable), classify the first parameter typed as a generic `id` or `id<protocol>` named `observer` (or `aNotificationObserver`, the NSNotificationCenter variant) as `weak`.
    - Optionally: also cover the `forKeyPath:` + `options:context:` suffix to narrow false positives if the `addObserver:` substring match turns out to fire on unrelated selectors.
    - Reference example in diff: Foundation task results block in `LLM_STATE/core/backlog.yaml` under `run-llm-annotation-pass-on-foundation` → "The +9 ownership entries are KVO `addObserver:forKeyPath:options:context:` observer params and `NSNotificationCenter addObserver:` observer params".

    **Goal:** Encode this rule and shrink future LLM-additive surface for observer-pattern frameworks to zero for this pattern. The +9 entries are currently only in the enriched Foundation checkpoint via the LLM path; a heuristic rule would make them robust to future re-runs without LLM cost.

    **Acceptance criteria:**
    - Heuristic-only annotate run on Foundation (no `--llm-dir`) produces ≥302 `parameter_ownership` entries (the current heur+LLM figure).
    - Existing tests pass; new unit test covers at least the `addObserver:forKeyPath:options:context:` selector.

    **Dependencies:** none (merge-clobber fix already landed)
  results: |
    **What was done**

    Added a structural heuristic in `analysis/crates/annotate/src/heuristics.rs` that classifies the first-position `observer` parameter on `add…Observer:` family selectors as `weak` ownership — KVO `addObserver:forKeyPath:options:context:`, NSNotificationCenter `addObserver:selector:name:object:`, KVO bulk variants like `addSharedObserver:forKey:options:context:`, and any other selector whose first segment is `add<Anything>Observer`.

    **TDD trace**

    1. Wrote 4 failing tests covering the positive path (KVO + NSNotificationCenter), the bulk-add variant via a separate test added later, and two negative-path guards (block-form `addObserverForName:…` and a wrongly-named first param).
    2. Confirmed the two positive tests failed (`observer ownership entry missing`).
    3. Added `is_observer_param` and wired it into `derive_parameter_ownership` next to the existing `is_delegate_param` check.
    4. Initial implementation used `selector.contains("addObserver:")`, which produced 8/9 captures on Foundation — missing `NSKeyValueSharedObservers.addSharedObserver:forKey:options:context:`. Generalised to a structural match: first selector segment must `starts_with("add")` and `ends_with("Observer")`. Added `test_add_shared_observer_kvo_variant_is_weak` to cover this.
    5. All 15 heuristic tests pass; full workspace clean (`cargo test --workspace` → 597 passed, 0 failed).

    **Acceptance criteria**

    | criterion | result |
    |---|---|
    | Heuristic-only annotate on Foundation produces ≥302 `parameter_ownership` entries | ✅ exactly 302 (was 273 heur + 29 LLM-additive) |
    | Existing tests pass | ✅ 596 → 597 (one new test) |
    | New unit test covers `addObserver:forKeyPath:options:context:` | ✅ `test_addobserver_kvo_observer_param_is_weak` |
    | `cargo clippy -p apianyware-macos-annotate` clean | ✅ |
    | `cargo +nightly fmt --check` clean | ✅ |
    | Foundation enrich verification still passes | ✅ |

    **Verification commands**

    ```sh
    # Heuristic-only baseline (no LLM merge)
    mkdir -p /tmp/heur && cargo run -p apianyware-macos-analyze -- --only Foundation annotate --output-dir /tmp/heur
    jq '[.class_annotations[]?.methods[]?.parameter_ownership // [] | length] | add' /tmp/heur/Foundation.json
    # → 302

    # Production refresh + verify
    cargo run -p apianyware-macos-analyze -- --only Foundation annotate --llm-dir analysis/ir/llm-annotations
    cargo run -p apianyware-macos-analyze -- --only Foundation enrich
    # → "verification passed framework=Foundation"
    ```

    **Why structural over substring**

    The task spec said "selector contains `addObserver:`" but a structural match on the first selector segment (`add<Anything>Observer:`) is sharper:
    - Captures `addSharedObserver:` (KVO bulk variant) which the substring rule misses.
    - Block-form `addObserverForName:object:queue:usingBlock:` is correctly excluded — its first segment ends with `Name`, not `Observer`. (Substring rule would also have rejected this since `addObserverForName:` doesn't contain the literal `addObserver:` either, but the structural rule makes the *reason* for exclusion explicit.)
    - Future Apple selectors of form `addXxxObserver:` will be caught automatically.
    - Param-name guard (`name.contains("observer")`) prevents false-fires when the first param of an `add*Observer:` selector is unexpectedly *not* the observer.

    **Net effect**

    - 8 LLM-only ownership annotations across NSArray, NSDistributedNotificationCenter, NSKeyValueSharedObservers, NSNotificationCenter, NSOrderedSet, NSSet (the KVO+notification family) + 1 `addSharedObserver:` entry are now produced by the heuristic — total **9 entries shifted from LLM to heuristic**, exactly matching the calibration's "+9 LLM-additive" count.
    - For future frameworks (AppKit, etc.), this pattern no longer needs LLM tokens — every `add…Observer:` method gets weak ownership for free, shrinking the LLM-additive ownership surface.

    **What this suggests next**

    - The same structural-segment pattern could be applied to other observer-like roles (e.g. `addBinding:` in NSKeyValueBindingCreation? worth checking AppKit). Defer until AppKit annotation pass measures the LLM-additive surface.
    - The heuristic-only-vs-merged comparison (here: 302 == 302) is a useful regression test idea — could be a small harness that asserts no LLM file contributes ownership entries the heuristic doesn't already cover, after each heuristic addition.
- id: check-eventkit-pushkit-for-stale-annotated-checkpoints-from-merge-clobber-bug
  title: Check EventKit/PushKit for stale annotated checkpoints from merge-clobber bug
  category: analysis
  status: done
  dependencies: []
  description: |
    **Priority:** low

    **Promoted from:** refresh-webkit-annotated-checkpoint-after-parameter-ownership-merge-fix results — "What this suggests next" item 2.

    **Problem:** The parameter_ownership merge-clobber bug (now fixed) may have affected other frameworks that already have both an `.llm.json` annotation file and an `annotated/<F>.json` checkpoint. EventKit and PushKit are the known candidates (they have `.llm.json` files in `analysis/ir/llm-annotations/`). If they were annotated while the bug was active, their checkpoints will have degraded ownership data — same as WebKit had (15 entries instead of the correct figure).

    **Steps:**
    1. For each framework F in {EventKit, PushKit} (and any other F where `analysis/ir/llm-annotations/<F>.llm.json` exists):
       - Check if `analysis/ir/annotated/<F>.json` exists.
       - If it does, run `jq '[.methods[].annotations.parameter_ownership // [] | length] | add' analysis/ir/annotated/<F>.json` to get the current count.
       - Compare to what a fresh `annotate --only <F> --llm-dir analysis/ir/llm-annotations/` would produce (or just re-run if count looks suspiciously low).
    2. For any framework where the count looks degraded (compare to heuristic-only baseline), delete the checkpoint and re-run `annotate --only <F> --llm-dir analysis/ir/llm-annotations/`, then `enrich --only <F>`.

    **Acceptance criteria:**
    - All frameworks with `.llm.json` files have refreshed `annotated/<F>.json` checkpoints produced by the fixed merge logic.
    - `enrich` passes for each refreshed framework.

    **Dependencies:** none (merge-clobber fix already landed and validated)
  results: |
    **What was done**

    Inspected EventKit and PushKit annotated checkpoints against their LLM annotation inputs to detect merge-clobber damage.

    **Method**

    For each framework F in {EventKit, PushKit}:
    1. Compared field-level counts between `analysis/ir/llm-annotations/<F>.llm.json` (LLM input) and `analysis/ir/annotated/<F>.json` (post-merge checkpoint).
    2. Counted `parameter_ownership` entries specifically (the field affected by the merge-clobber bug).

    **Findings**

    | framework | LLM-input fields | annotated checkpoint fields | match? |
    |---|---|---|---|
    | EventKit | 8 `block_parameters` + 9 `error_pattern` (0 ownership) | 8 + 9 (0 ownership) | ✅ |
    | PushKit | 1 `parameter_ownership` (`setDelegate:` weak) | 1 `parameter_ownership` preserved | ✅ |

    For PushKit specifically, the single LLM-supplied weak ownership annotation on `setDelegate:` is intact in the merged checkpoint — exactly the kind of entry the old bug would have dropped.

    **Conclusion**

    Neither checkpoint is stale. No regeneration needed. Both files were either re-annotated after the merge-clobber fix landed or, given their tiny LLM-additive surface (especially EventKit's 0 ownership entries), they were never actually affected by the bug. The bug specifically dropped LLM-additive `parameter_ownership` entries during merge; if EventKit had 0 such entries to begin with, there was nothing to drop.

    **Cross-check**

    For comparison:
    - Foundation: 302 ownership entries (273 heuristic + 29 LLM-additive) — refreshed in session 41.
    - WebKit: 67 ownership entries (54 heuristic + 13 LLM-additive) — refreshed after the merge-clobber fix.
    - EventKit: 0 (no LLM-additive entries; nothing for bug to drop).
    - PushKit: 1 LLM-additive entry preserved.

    **Verification commands** (paste into shell from repo root):

    ```sh
    jq '[.class_annotations[]?.methods[]?.parameter_ownership // [] | length] | add // 0' analysis/ir/annotated/EventKit.json   # → 0
    jq '[.class_annotations[]?.methods[]?.parameter_ownership // [] | length] | add // 0' analysis/ir/annotated/PushKit.json    # → 1
    jq '[.classes[].methods[]?.parameter_ownership // [] | length] | add // 0' analysis/ir/llm-annotations/EventKit.llm.json   # → 0
    jq '[.classes[].methods[]?.parameter_ownership // [] | length] | add // 0' analysis/ir/llm-annotations/PushKit.llm.json    # → 1
    ```

    **What this suggests next**

    - The audit pattern (compare per-field counts between `.llm.json` input and `class_annotations` in the annotated checkpoint) is generally useful for detecting future merge regressions. Could be encoded as a debug subcommand on `apianyware-macos-analyze` (e.g. `analyze validate-merge --only <F>`) — low-priority but cheap.
    - `analysis/ir/llm-annotations/` currently holds Foundation, WebKit, EventKit, PushKit. AppKit (the other not_started backlog item) will land here next.
