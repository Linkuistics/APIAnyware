tasks:
- id: run-llm-annotation-pass-on-avfoundation
  title: Run LLM annotation pass on AVFoundation
  category: analysis
  status: done
  dependencies: []
  description: |
    **Priority:** high

    **Promoted from:** CoreData LLM annotation pass results (session 44) — "What this suggests next" item 1.

    **Problem:** AVFoundation is the remaining large unmapped framework and has the highest expected stored-handler density of any Apple framework. Capture session observers, audio route change handlers, player item notifications, and asset loading callbacks are all strong candidates for `stored` block invocations that heuristics would misclassify as `async_copied`.

    **Settled design decisions:**
    - Follow the same subagent dispatch pattern as Foundation, AppKit, and CoreData: `llm-extract --only AVFoundation`, wipe existing annotated checkpoint, heuristic-only baseline, dispatch single `llm-annotate-subagent.md` subagent, re-annotate with `--llm-dir`, enrich, verify.
    - Budget: 35k + N × 250 tokens/method. Confirm method count before dispatch: `jq '.method_count' analysis/ir/llm-summaries/AVFoundation.methods.json`. If >500 methods, may need chunking per the subagent guide.
    - Document per-field deltas (threading, ownership, block invocation breakdown: sync/async/stored) in the runs table.
    - **Use stored-block count delta as the primary success metric.** Hypothesis: AVFoundation should have the highest `stored` count of any framework so far, because capture session and audio-routing handlers are long-lived observers, not one-shot completions.
    - **Cross-check subagent self-reported counts against `jq` of the actual `.llm.json` file before recording in the table** (lesson from CoreData run: subagent reported `18/8/7` but file had `15/11/5`).
    - Threading: expect non-trivial threading annotations — AVFoundation has documented main-thread-only delegation callbacks (`AVCaptureVideoDataOutputSampleBufferDelegate` on a serial dispatch queue; `AVAudioPlayerDelegate` / `AVAudioRecorderDelegate` on the calling thread) plus explicit thread-safe APIs.

    **Preconditions:**
    - `analysis/ir/llm-annotations/CoreData.llm.json` committed and present (done in session 44).
    - No blocking merge issues (empirically validated across WebKit, Foundation, AppKit, CoreData).

    **Acceptance criteria:**
    - `llm-validate` passes on framework output.
    - `enrich --only AVFoundation` verification passes.
    - LLM-vs-heuristic delta documented (especially stored-block count delta, expected to be the highest of any framework so far).
    - Runs table in `analysis/scripts/llm-annotate-orchestration.md` updated.
    - Subagent self-reported counts reconciled against `jq` of the written file before table entry is finalized.

    **Dependencies:** none
  results: |
    **Done.** AVFoundation annotated (198 methods across 68 classes), enrichment verification passed, orchestration table updated with 2026-04-28 row. **First run of the new `subagent_report` reconciliation check on a real subagent — clean reconciliation (`warnings=0`) on the first write.**

    ## Run summary

    | | |
    |---|---|
    | Date | 2026-04-28 |
    | Methods flagged | 266 (across 77 classes in `.methods.json`) |
    | Methods annotated | 198 across 68 classes |
    | Methods skipped | 68 (paired getters + 9 capture-delegate setters where headers don't carry an explicit `weak` attribute, plus a handful of recording/photo-capture delegates that headers document as retained-for-duration) |
    | Subagent tokens | 93,699 (8% under the 35k + 266×250 = 101.5k projection) |
    | Wall time | ~4m 43s |
    | Tool uses | 35 |

    ## Heuristic-only baseline (post-wipe)

    Pre-existing `analysis/ir/annotated/AVFoundation.json` was wiped per the
    established orchestration-table guidance (otherwise `annotate` re-tags
    the prior checkpoint as `source = Llm`). Then `annotate --only AVFoundation`
    without `--llm-dir` produced:

    - ownership: 162
    - block-methods: 122 (0 sync + 118 async_copied + 6 stored)
    - threading: 12 main_thread_only
    - error_pattern: 58

    ## Post-merge totals (heuristic + LLM)

    After `annotate --only AVFoundation --llm-dir analysis/ir/llm-annotations`:

    - ownership: 162 (unchanged)
    - block-methods: 122 (0 sync + **103 async_copied + 21 stored**)
    - threading: 12 main_thread_only (unchanged)
    - error_pattern: 58 (unchanged)

    ## LLM additive contribution

    **Headline: +15 `stored` block reclassifications** (heuristic 6 → merged 21).
    The new `stored` entries cover:

    - `addPeriodicTimeObserverForInterval:queue:usingBlock:` and
      `addBoundaryTimeObserverForTimes:queue:usingBlock:` on AVPlayer /
      AVPlayerItemIntegratedTimeline / AVSampleBufferRenderSynchronizer
      (long-lived periodic / boundary observers).
    - `requestMediaDataWhenReadyOnQueue:usingBlock:` and
      `respondToEachPassDescriptionOnQueue:usingBlock:` (pull-style media
      data callbacks invoked repeatedly).
    - `videoCompositionWithAsset:applyingCIFiltersWithHandler:` per-frame
      applier block — and the companion variant correctly split into
      block 1 = `stored` applier + block 2 = `async_copied` one-shot
      completion.
    - `metadataItemWithPropertiesOfMetadataItem:valueLoadingHandler:`
      value-loading handler (invoked on demand when properties are read).
    - Capture slider/picker action blocks.

    Ownership: 18 LLM ownership entries all overlapped with heuristic
    coverage — net +0 in the merged file (consistent with AVFoundation
    following the standard `setDelegate:` / `setSampleBufferDelegate:queue:`
    naming heuristics already cover).

    Threading: **0 net additions.** Subagent intentionally declined to claim
    `main_thread_only` on `NS_SWIFT_UI_ACTOR`-marked classes (`AVPlayer`,
    `AVPlayerItem`, `AVSynchronizedLayer`, `AVPlayerItemTrack`) because the
    flagged async/observer methods on those classes are explicitly
    `NS_SWIFT_NONISOLATED` in headers and would contradict a blanket
    main-thread claim. This is a correctness call, not a gap.

    ## Hypothesis check (stored-block density)

    The backlog's hypothesis was that AVFoundation should have the highest
    `stored` count of any framework so far, because capture-session
    sample-buffer delegates and audio-route handlers are long-lived
    observers. Result: **21 stored**, third behind:

    - Foundation: 47 stored (timer blocks, op completion blocks,
      `setReadabilityHandler:`, XPC interruption/invalidation handlers,
      `NSPredicate predicateWithBlock:`, sort-descriptor comparators,
      item-provider register-handlers — a wide variety of stored-block
      patterns)
    - AppKit: 25 stored (`setHandler:`, NSCollectionViewDiffableDataSource
      section/supplementary providers, NSEvent global/local monitor handlers,
      …)
    - **AVFoundation: 21 stored** (time observers, pull-callbacks, per-frame
      appliers, action blocks)
    - CoreData: 11 stored
    - WebKit: 2 stored

    Hypothesis is **directionally right** — AVFoundation is in the
    high-stored cohort — but Foundation's NSPredicate / NSXPC / NSTimer
    breadth keeps it ahead. The hypothesis incorrectly assumed that
    capture-session delegates would dominate; in practice, capture-session
    sample-buffer delegates are `parameter_ownership` (delegate setters),
    not `block_parameters[].invocation: stored` — they fall under a
    different annotation field.

    ## Subagent-report reconciliation check (first live run)

    This was the first AVFoundation run after the validator gained the
    `subagent_report` reconciliation check (work item 1 of this same work
    phase). The subagent built the report from the in-memory JSON object
    it was about to write, then wrote both classes and report in one pass.
    Validator output:

    ```
    INFO  LLM annotations validated  warnings=0
    ```

    Independent `jq` cross-check confirmed all seven categories matched
    between `subagent_report` and the actual file aggregates exactly:

    ```
    reported = actual = {
      block_synchronous: 0,
      block_async_copied: 103,
      block_stored: 21,
      parameter_ownership: 18,
      threading_main_thread_only: 0,
      threading_any_thread: 0,
      error_pattern: 58
    }
    ```

    So the reconciliation check is empirically validated end-to-end on a
    real subagent run.

    ## Verification

    - `cargo run -q -p apianyware-macos-analyze -- llm-validate --methods-file
      analysis/ir/llm-summaries/AVFoundation.methods.json --llm-file
      analysis/ir/llm-annotations/AVFoundation.llm.json` → exit 0, `warnings=0`.
    - `cargo run -q -p apianyware-macos-analyze -- enrich --only AVFoundation`
      → verification passed (0 violations).
    - Enrich totals: `sync_blocks=0, async_blocks=102, stored_blocks=21,
      delegate_protocols=0, error_methods=57, iterables=0, scoped_resources=0,
      main_thread_classes=4`.

    (Note: enrich's `async_blocks=102` vs merged-checkpoint's 103 reflects
    one downstream filter the enrichment pass applies; consistent with the
    pattern seen on prior runs.)

    ## Cleanup

    - Subagent left a one-off Python helper at `scripts/avfoundation_annotate.py`
      encoding the per-selector classification rules. Removed post-run because
      the `.llm.json` is the durable artifact (per Option A in the durability
      decision recorded in `analysis/scripts/llm-annotate-orchestration.md`),
      and a top-level `scripts/` directory does not match the project layout
      (analysis tooling lives under `analysis/scripts/`).

    ## What this suggests next

    1. **The remaining ~146 frameworks with flagged methods are the next
       batch.** AVFoundation was singled out as "the remaining large
       unmapped framework" — it's now mapped. The medium-size frameworks
       that have been called out as future work (CoreLocation, MapKit,
       CoreBluetooth, AppleScriptObjC, etc.) can be dispatched in a
       parallel batch using the orchestration-table-described pattern.
       The `subagent_report` reconciliation now sits between every future
       subagent and the merged checkpoint, so any divergence will be
       surfaced immediately rather than waiting for a manual `jq` check.

    2. **The `parameter_ownership` heuristic is doing well on AVFoundation
       too.** Combined with the AppKit and Foundation observations,
       heuristics now reliably capture `setDelegate:`/`setDataSource:`-named
       weak retentions, and the LLM is mostly confirmatory rather than
       additive on ownership. The historical merge bug fix from the WebKit
       refresh holds. Future runs can budget less LLM attention on
       ownership classification and more on block-invocation
       reclassification (where the LLM continues to find genuine
       stored-vs-async distinctions heuristics miss).

    3. **AVFoundation contributes 15 high-impact codegen signals.** The
       newly-classified `stored` blocks on time observers, pull-callbacks,
       and per-frame appliers need GC-prevention pinning that
       `async_copied` blocks do not. Any Racket-OO or future-language
       binding emitter that previously labeled
       `addPeriodicTimeObserverForInterval:` callbacks as `async_copied`
       would have under-pinned them, causing intermittent observer
       disappearance under GC pressure. The Racket-OO emitter should be
       audited against the new AVFoundation annotations before any sample
       app uses an AVPlayer time observer.

    4. **Refined budget rule continues to hold.** `35k + N × 250 tokens` came
       in 8% under for AVFoundation, similar magnitude to Foundation's
       60% under and AppKit's 28% under. CoreData was the only outlier at
       22% over, attributable to its small absolute size leaving little
       room for the per-class header inspection cost to amortize. For the
       next batch of medium frameworks, the estimate remains reliable.
- id: add-subagent-report-reconciliation-check-to-llm-validate
  title: Add subagent-report reconciliation check to llm-validate
  category: analysis
  status: done
  dependencies: []
  description: |
    **Priority:** low

    **Promoted from:** CoreData LLM annotation pass results — "What this suggests next" item 4.

    **Problem:** LLM subagents self-report block lifecycle and ownership counts that can disagree with the actual `.llm.json` they wrote. The CoreData run revealed a concrete discrepancy: subagent reported `async_copied=18 / stored=8 / ownership=7` but `jq` of the file showed `15 / 11 / 5`. The discrepancy arises because counts are formed mid-generation before a final pass. Currently this is caught by a manual `jq` cross-check after each run — the practice is documented in the orchestration guide but is easy to skip.

    **Proposed solution:** Add a structured `subagent_report` field to the `.llm.json` schema (or as a sidecar) that `llm-validate` reads and compares against the actual aggregate counts from the file. If the self-reported and actual counts diverge beyond a small tolerance, `llm-validate` should emit a warning (not a hard failure, since the file content is what matters). This would have flagged the CoreData discrepancy automatically rather than relying on a post-hoc manual check.

    **Acceptance criteria:**
    - `llm-validate` outputs a reconciliation report line comparing actual vs. self-reported counts when a `subagent_report` block is present.
    - Divergence emits a named warning (not a hard failure) so the orchestration table entry can be finalized with awareness of the discrepancy.
    - `llm-annotate-subagent.md` prompt updated to instruct the subagent to include a structured self-report block in the `.llm.json` output.
    - At least one test case in the validator covers the mismatch warning path.

    **Note:** This is a quality-of-life improvement to the annotation workflow, not a correctness fix. The manual `jq` cross-check practice (documented in memory `llm-subagent-self-reports-need-jq-cross-check`) remains the fallback until this is implemented.

    **Dependencies:** none
  results: |
    **Done.** Schema + validator + CLI + subagent prompt all updated; 5 new validator tests + 3 new roundtrip tests; clippy and fmt clean; full workspace test suite passes.

    ## What landed

    **Schema** (`collection/crates/types/src/annotation.rs`):
    - New `SubagentReport` struct with seven `Option<usize>` fields:
      `block_synchronous`, `block_async_copied`, `block_stored`,
      `parameter_ownership`, `threading_main_thread_only`,
      `threading_any_thread`, `error_pattern`.
    - New optional `subagent_report` field on `FrameworkAnnotations`,
      `#[serde(default, skip_serializing_if = "Option::is_none")]` so legacy
      `.llm.json` files (PushKit, EventKit, WebKit, Foundation, AppKit,
      CoreData — the six already on disk) parse unchanged.

    **Validator** (`analysis/crates/annotate/src/llm.rs`):
    - New `ValidationWarning::SubagentReportMismatch { field, reported, actual }`
      using `&'static str` for the field name (compile-time constants —
      zero allocation per warning).
    - New `warnings: Vec<ValidationWarning>` on `ValidationReport`.
      `is_ok()` is **unchanged** (errors-only) so warnings never fail the
      validator — the file content is the source of truth.
    - Private `aggregate_actual_counts()` helper walks the annotations
      and produces the seven matching counts. Reconciliation iterates
      paired (`Option<reported>`, field-name, `actual`) and pushes a
      warning per `Some` value that disagrees. `None` fields are silently
      skipped — distinguishes "subagent didn't track this" from "tracked
      and found zero".

    **CLI** (`analysis/crates/cli/src/main.rs`):
    - `run_llm_validate` logs every warning via `tracing::warn!` and adds
      `warnings=N` to the success log line. Still exits 0 when only
      warnings are present.

    **Subagent prompt** (`analysis/scripts/llm-annotate-subagent.md`):
    - New "Self-report (recommended)" section with the JSON template and
      explicit semantics for `null` vs `Some(0)`.
    - "Report back" extended to mention the matching counts.

    ## Verification

    - New tests: 5 in validator (`validate_emits_no_warning_when_subagent_report_absent`,
      `validate_emits_no_warning_when_reported_counts_match_actual`,
      `validate_emits_warning_per_diverging_count`,
      `validate_warnings_do_not_make_report_fail`,
      `validate_skips_unset_report_fields_even_if_actual_nonzero`) +
      3 in roundtrip tests (`framework_annotations_with_subagent_report_roundtrip`,
      `framework_annotations_without_subagent_report_is_backward_compatible`,
      `subagent_report_omits_unset_fields_in_serialization`).
    - `cargo test -p apianyware-macos-annotate` → 72/72 (was 67).
    - `cargo test -p apianyware-macos-types --test annotation_roundtrip` → 12/12 (was 9).
    - `cargo test --workspace` → exit 0.
    - `cargo clippy --workspace --all-targets -- -D warnings` → clean.
    - `cargo +nightly fmt --check` → clean.

    ## End-to-end smoke test

    Reproduced the CoreData incident on the existing `.llm.json`:

    ```bash
    jq '. + {"subagent_report": {"block_async_copied": 18, "block_stored": 8, "parameter_ownership": 7}}' \
       analysis/ir/llm-annotations/CoreData.llm.json > /tmp/CoreData_with_report.json
    cargo run -q -p apianyware-macos-analyze -- llm-validate \
       --methods-file analysis/ir/llm-summaries/CoreData.methods.json \
       --llm-file /tmp/CoreData_with_report.json
    ```

    Output (exit 0):
    ```
    WARN  subagent_report.block_async_copied = 18 but file contains 15
    WARN  subagent_report.block_stored = 8 but file contains 11
    WARN  subagent_report.parameter_ownership = 7 but file contains 5
    INFO  LLM annotations validated  warnings=3
    ```

    The three lines exactly mirror the discrepancy recorded in the
    orchestration table for the 2026-04-28 CoreData run.

    ## What this suggests next

    1. **Use it on the AVFoundation pass** — the very next backlog task is
       the AVFoundation LLM run; it should be the first run to write
       `subagent_report` and exercise the live path. (Done in this same
       work phase as task 2.)

    2. **Backfilling `subagent_report` on the six existing `.llm.json` files
       is *not* required.** They are already verified by the older manual
       `jq` cross-check practice and re-running their subagents would cost
       tokens. New reports can be added opportunistically when those
       frameworks are next regenerated.

    3. **Consider promoting to error if a future incident shows a
       downstream merge silently consumed wrong data despite a warning.**
       The current design treats divergence as forensic ("the file is the
       truth") — if a warning ever turns out to predict a real merge bug,
       gate it as an error and require either a fix or an explicit override.

    4. **Tolerance is not currently supported.** All checks are strict
       equality. A `SubagentReport` that off-by-one's the count of a
       single `stored` block will warn. This matches the backlog's
       "small tolerance" suggestion being deferred until a real case
       shows tolerance is needed — strict equality is the simplest
       correct behaviour and easy to relax later.

    ## Memory implications

    - The existing manual-`jq` memory (`llm-subagent-self-reports-need-jq-cross-check`)
      remains the documented fallback for `.llm.json` files without a
      `subagent_report`. Future runs that include a report can rely on the
      validator instead.
