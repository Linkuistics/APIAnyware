tasks:
- id: emit-protocol-inherited-methods-on-class-bindings
  title: Emit protocol-inherited methods on class bindings
  category: emission
  status: done
  dependencies: []
  description: |
    **Priority:** medium

    **Surfaced by:** SceneKit Viewer sample app (racket-oo target, 2026-04-17).
    `SCNNode.runAction:` (via SCNActionable protocol) and `SCNView.setAutoEnablesDefaultLighting:`
    (via SCNSceneRenderer protocol) are absent from the generated class bindings.
    This is a distinct axis from superclass-inherited methods — the existing
    "Emit inherited methods from NSView/NSControl superclasses" entry does not cover
    protocol conformance. Workaround: module-local typed `objc_msgSend` aliases
    (app-menu.rkt pattern).

    When an ObjC class conforms to a protocol, methods declared in
    that protocol are not emitted on the class binding — only methods declared directly
    on the class or via `@interface` categories appear. Fix: after collecting a class's
    direct methods, also walk its conforming protocols (depth-first, deduplicating by
    selector name) and emit their methods if not already emitted as direct methods.
    The IR already captures protocol conformance via `protocol_names` on `ObjCInterface`;
    the emitter needs to use it. Snapshot test updates required.

    **Scope:** `emit_class.rs` in `emit-racket-oo`. Snapshot golden file updates needed
    for classes with protocol conformance.
  results: |
    ## What was done

    Implemented protocol-inherited method propagation at the **resolve (Datalog) layer**
    rather than the per-emitter layer suggested by the task scope. The reasoning:
    `Class.all_methods` is the resolve step's authoritative answer to "what methods are
    callable on instances of this class". It already flattens superclass inheritance via
    the Datalog `effective_method` rule; the symmetric protocol-conformance rule was
    simply missing. Fixing it once at resolve makes the IR truthful and means every
    current and future language emitter inherits the fix automatically.

    ### Resolve-layer changes (`analysis/crates/resolve/`)

    - **`src/program.rs`**: Enriched the `protocol_method` Datalog relation from 4 to 7
      fields, adding `is_init`, `is_deprecated`, `is_variadic` so the new propagation
      rule can populate `effective_method`'s 7-tuple shape uniformly. Added a
      `transitively_conforms_to` derived relation (reflexive transitive closure of
      `conforms_to` over `protocol_inherits`) so methods on inherited protocols also
      propagate. Added the new `effective_method` rule:
      ```
      effective_method(class, sel, is_cm, is_init, is_dep, is_var, proto) <--
          transitively_conforms_to(class, proto),
          protocol_method(proto, sel, _, is_cm, is_init, is_dep, is_var),
          !method_decl(class, sel, is_cm, _, _, _);
      ```
      Existing `satisfies_protocol_method` rule updated for the new arity.
    - **`src/fact_loader.rs`**: Push the new flags when loading both required and
      optional protocol methods.
    - **`src/checkpoint.rs`**: Added `build_protocol_method_index` keyed by
      `(protocol_name, selector, is_class_method)`. The method-resolution path in
      `build_effective_methods_for_class` now does a fallback lookup against this
      index when the class-method index misses — necessary because protocol-origin
      methods are keyed by protocol name, not class name. This preserves full
      parameter/return-type metadata from the original `Protocol` declaration
      rather than falling back to the existing minimal-stub branch.

    ### Test additions (`analysis/crates/resolve/tests/synthetic_resolution.rs`)

    6 new TDD-first tests, all initially failing then passing:

    1. `class_inherits_protocol_method_when_not_declared` — basic propagation case.
    2. `class_does_not_duplicate_protocol_method_already_declared` — class's direct
       declaration wins; no duplicate.
    3. `class_inherits_optional_protocol_methods` — optional methods propagate too.
    4. `class_inherits_methods_from_transitive_protocol_inheritance` — A inherits B,
       class conforms to A → sees both A and B's methods.
    5. `subclass_inherits_protocol_methods_from_superclass_conformance` — subclass
       sees protocol methods via the existing `inherits_from` rule (no special-case
       needed; protocol propagation puts them on the parent's `effective_method`).
    6. `cross_framework_protocol_method_inheritance` — class in Framework2 conforms
       to a protocol declared in Framework1; full param metadata preserved via the
       cross-framework lookup that was already in place.

    ### Snapshot golden updates

    23 golden files under `generation/crates/emit-racket-oo/tests/golden-{appkit,foundation}/`
    regenerated via `UPDATE_GOLDEN=1`. The diffs are additive — protocol-inherited
    methods (e.g. `nsstring-encode-with-coder` from NSCoding, `nsbutton-copy-with-zone`
    from NSCopying, NSAccessibility methods on AppKit views) now appear in the
    `provide` blocks and method-emission sections.

    ## Verification

    End-to-end pipeline regenerated (`resolve → annotate → enrich → generate`) and
    canary cases from the original task description confirmed:

    | Class | Method | Protocol origin | Status |
    |---|---|---|---|
    | `SCNNode` | `runAction:` | `SCNActionable` | ✅ emitted as `scnnode-run-action` (+3 related) |
    | `SCNView` | `setAutoenablesDefaultLighting:` | `SCNSceneRenderer` | ✅ emitted as `scnview-set-autoenables-default-lighting!` |
    | `NSString` | `encodeWithCoder:` | `NSCoding` | ✅ emitted as `nsstring-encode-with-coder` |

    - All 32 tests in resolve crate pass (was 26 before).
    - Full `cargo test --workspace` passes.
    - `cargo clippy --workspace` is clean.
    - Generated `scnnode.rkt` and `nsstring.rkt` load without error in Racket.

    ## Notes & follow-ups

    - **`emit_class.rs` was untouched.** The task description scoped the fix there,
      but the Datalog approach is strictly broader (covers every emitter) and stays
      closer to the existing architecture. The dedup-by-selector loop already in
      `effective_methods()` correctly handles the rare case where a protocol method
      appears under multiple origins (e.g. via two unrelated conformances).
    - **Enrich crate has its own independent `protocol_method` relation** that I left
      alone — its arity is unchanged and its only consumer is the existing
      `satisfies_protocol_method` analog there, which remains unaffected. If a
      future enrichment rule wants the richer protocol-method facts, it can be
      enriched at that point.
    - **Existing dedup-by-selector limitation:** when a protocol declares both a
      class method and an instance method with the same selector, the emitter's
      `effective_methods()` dedup keeps only the first. This isn't introduced by
      this change (predates it) but it's adjacent — leaving as a separate concern.
    - **TaskID for SCNNode follow-up apps**: Sample apps in the SceneKit Viewer
      family can now drop their app-local typed `objc_msgSend` aliases for
      `runAction:` and `setAutoenablesDefaultLighting:` and use the generated
      `scnnode-run-action` / `scnview-set-autoenables-default-lighting!` directly.
      This is a downstream cleanup that lives in the racket-oo plan, not core.
- id: build-claude-code-subagent-driver-for-llm-annotation-pipeline
  title: Build Claude Code subagent driver for LLM annotation pipeline
  category: analysis
  status: not_started
  dependencies: []
  description: |
    **Priority:** medium

    **Surfaced by:** post-M9 review memory and `llm-annotations-use-a-dedicated-input-directory` memory entry (2026-04-27).

    **Summary:** The LLM annotation pipeline has its collection end (`llm-extract` CLI producing `.methods.json`) and its merge end (`annotate --llm-dir` consuming `.llm.json`), but the Claude Code subagent step that converts `.methods.json` → `.llm.json` has not been built. Without it, the pipeline is broken in the middle and the annotation infrastructure produces no usable output.

    **Background:** The annotation system works as follows:
    1. `llm-extract` CLI scans collected IR and emits `.methods.json` summaries of methods with block params, error out-params, or delegate/observer patterns — these are candidates for LLM annotation.
    2. A Claude Code subagent reads `.methods.json`, reasons about each method, and writes `.llm.json` with the annotation payload.
    3. `annotate --llm-dir <dir>` reads `.llm.json` files and merges them into the annotated IR, with LLM annotations taking precedence over heuristic annotations.

    The constraint (see project memory `LLM annotation must run within Claude Code`) is that LLM calls must run inside Claude Code — not via an external API consumer — for cost control. The subagent approach (one subagent per framework, each handling one `.methods.json`) is the settled design.

    **Scope:**
    1. Define the `.llm.json` schema (or confirm it is already defined in `llm.rs`) and write a validator.
    2. Build the Claude Code subagent prompt that consumes a `.methods.json` file and produces a well-formed `.llm.json`. The prompt must handle: block-typed parameters (decide nullability / callback semantics), error-pointer out-params (should they be `throws`-style?), and delegate/observer methods.
    3. Wire a driver that fans out one subagent call per framework `.methods.json`, collects results, and writes the `.llm.json` files into the `--llm-dir`.
    4. Run end-to-end on a small framework (e.g. Foundation) and verify the merged annotated output changes relative to heuristic-only annotation.
    5. Document the runtime cost (tokens per framework, wall time) so the team can scope future full-pipeline runs.

    **Acceptance criteria:** Running the full pipeline (llm-extract → subagent driver → annotate --llm-dir) on Foundation produces a non-empty set of LLM-sourced annotations visible in `annotated/Foundation.json`.
- id: investigate-and-filter-bare-c-name-macro-usrs-leak-class-a
  title: Investigate and filter bare `c:@<name>` macro USRs (leak class A)
  category: collection
  status: not_started
  dependencies: []
  description: |
    **Priority:** low

    **Surfaced by:** racket-oo Task #7 (migration of `ffi/*.rkt` to generated bindings)

    **Symptom:** libclang sometimes exposes a macro through a naked `c:@<name>` USR
    without the `@macro@` prefix. Neither the extract-objc nor extract-swift extractor
    catches this form. Canary: `kAudioServicesDetailIntendedSpatialExperience`
    (AudioToolbox, `AudioServices.h:401`, ObjC source).

    **Suspected root cause:** libclang re-exposes certain `#define` macros as `VarDecl`
    cursors with a `c:@<name>`-form USR rather than `EntityKind::MacroDefinition` —
    possibly for macros that expand to a typed cast. The result lands in extracted IR
    as a constant but has no dylib symbol, causing `get-ffi-obj` failure at runtime.

    **Scope:** Audit extent across all frameworks before adding a filter. Confirm the
    symbol is absent from the dylib via `dyld_info -exports`. Then decide: add a
    denylist by name, add a libclang `is_definition()` / `get_linkage()` secondary
    guard, or detect via failed `get_platform_availability()` + macro expansion path.
    See memory entry "USR prefix families encode declaration origin — bare c:@<name>
    macro variant" for the USR-family context.
- id: investigate-and-filter-anonymous-enum-members-leaking-through-extract-objc-leak-class-b
  title: Investigate and filter anonymous-enum members leaking through extract-objc (leak class B)
  category: collection
  status: not_started
  dependencies: []
  description: |
    **Priority:** low

    **Surfaced by:** racket-oo triage session 2026-04-15

    **Symptom:** Anonymous-enum members with `c:@Ea@<dummy>@<member>` or
    `c:@EA@<typedef>@<member>` USRs are correctly filtered by extract-swift's
    `non_c_linkable_skip_reason` predicate, but may leak through the extract-objc
    path if libclang surfaces them as `EnumConstantDecl` children of an anonymous
    `EnumDecl`. Canary: `nw_browse_result_change_identical` (Network framework).

    **Suspected root cause:** extract-objc's `EnumDecl` arm visits all children
    regardless of whether the parent enum has a name. Anonymous enums produce
    constants with no dylib symbol — their values are inlined at use sites — so
    emitting them as `fw.constants` entries causes `get-ffi-obj` failure at runtime.

    **Scope:** Confirm whether the canary appears in Network's `collected/*.json`
    `constants` array (re-collect first). If so, add an anonymous-enum guard in
    `extract_enum` (check `entity.get_name().is_none()` or USR prefix) and record
    skipped members via `skipped_symbol_reason::anonymous_enum_member`. Audit blast
    radius across all frameworks before merging. The extract-swift filter already
    catches the same symbols from that path; the fix closes the extract-objc gap so
    both paths are symmetric.
- id: ir-annotation-for-os-object-use-objc-typed-gcd-handles
  title: IR annotation for OS_OBJECT_USE_OBJC-typed GCD handles
  category: collection
  status: not_started
  dependencies: []
  description: |
    **Priority:** low

    **Surfaced by:** racket-oo Task (libdispatch `_dispatch_main_q` and `dispatch_queue_t` usage), 2026-04-16

    **Symptom:** When SDK headers are compiled with `OS_OBJECT_USE_OBJC=1` (the macOS default), `dispatch_queue_t` and similar GCD handle types are declared as ObjC objects. The IR maps them to an `_id`-equivalent `TypeRef`. Emitters that obtain a GCD queue value via `ffi-obj-ref`/`dlsym`/pointer arithmetic get a raw pointer, not an `_id`-tagged value — an explicit cast is required before passing to any IR-typed `_id` parameter. Currently each emitter target must discover and apply this cast manually.

    **Scope:** Add an IR-level annotation (e.g. a flag on `TypeRef` or a new `TypeRefKind` variant) marking types that are "ObjC objects via OS_OBJECT macro" rather than "genuine ObjC class declarations". Emitters can then auto-generate the cast for values obtained outside the normal message-send path. Alternatively, document the cast requirement prominently in the emitter contract so future targets don't rediscover it from scratch.

    **Priority justification:** Low — only bites when a framework exposes a struct global whose declared type is OS_OBJECT-based (currently only libdispatch). The manual workaround (explicit cast at the call site) is well understood. Promote if a second framework triggers the same pattern.
- id: cf-struct-globals-from-corefoundation-absent-from-collected-ir
  title: CF struct globals from CoreFoundation absent from collected IR
  category: collection
  status: not_started
  dependencies: []
  description: |
    **Priority:** low

    **Surfaced by:** racket-oo Note Editor app (2026-04-18). Promoted from racket-oo
    backlog 2026-04-18: per the 2026-04-18 scope boundary, collection-side gaps
    belong in core.

    **Symptom:** `kCFTypeDictionaryKeyCallBacks` and `kCFTypeDictionaryValueCallBacks`
    (and similar CF struct globals) are absent from the collected IR — they are not
    emitted to the per-language `constants.rkt` (or equivalent) by any emitter.
    Current racket-oo workaround: raw `get-ffi-obj` call in app code.

    **Suspected root cause:** TBD — extractor likely skips struct-typed globals at
    some point in the visitor (or libclang surfaces them via a USR form the existing
    filters drop). The broader `TypeRefKind::Struct` emit path already exists and works
    for geometry constants like `NSZeroPoint`/`NSEdgeInsetsZero`; once these symbols
    enter the IR, downstream emitters will pick them up via the existing
    `is_struct_data_symbol` branch in the racket-oo constants emitter.

    **Scope:** Investigate why the extractor misses these CF struct globals and add
    them to the IR so per-language constants emitters can render them as
    `ffi-obj-ref` (or equivalent struct-data references). Audit blast radius across
    CoreFoundation and adjacent frameworks before merging — there may be a broader
    family of `kCF*CallBacks`-style struct globals.
