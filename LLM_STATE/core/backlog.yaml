tasks:
- id: run-llm-annotation-passes-on-remaining-medium-priority-frameworks-batch
  title: Run LLM annotation passes on remaining medium-priority frameworks (batch)
  category: analysis
  status: not_started
  dependencies: []
  description: |
    **Priority:** high

    **Promoted from:** AVFoundation LLM annotation pass results — "What this suggests next" item 1.

    **Problem:** AVFoundation was the last large framework to be LLM-annotated. The ~146 remaining frameworks that have flagged methods (in `analysis/ir/llm-summaries/`) are medium-to-small frameworks (CoreLocation, MapKit, CoreBluetooth, AppleScriptObjC, etc.) that can now be dispatched in a parallel batch using the established orchestration-table pattern. The `subagent_report` reconciliation check is now in place (landed 2026-04-28), so any count divergence will be surfaced immediately rather than requiring a manual `jq` cross-check.

    **Settled design decisions:**
    - Use the established orchestration pattern: `llm-extract --only <framework>`, wipe existing annotated checkpoint, heuristic-only baseline, dispatch `llm-annotate-subagent.md` subagent, re-annotate with `--llm-dir`, enrich, verify.
    - Subagent prompt now includes the `subagent_report` self-report template — subagents must populate it.
    - Budget: 35k + N × 250 tokens/method for naming-compliant frameworks. Confirm method count per framework via `jq '.method_count' analysis/ir/llm-summaries/<Framework>.methods.json` before dispatch.
    - For large frameworks with naming-pattern-defeating headers (e.g., frameworks with heavy `_SWIFT_UI_ACTOR`): use 35k + N × 534 tokens/method budget model.
    - Dispatch in parallel batches to amortize subagent fixed costs.
    - Primary metric: stored-block count delta (stored-block reclassification is the primary LLM value-add; heuristics emit 0 stored-block annotations).
    - Cross-check subagent self-reported counts against `jq` of the actual `.llm.json` file — `llm-validate` now reports `warnings=N` when counts diverge.

    **Preconditions:**
    - `analysis/ir/llm-annotations/AVFoundation.llm.json` committed (done 2026-04-28).
    - `subagent_report` reconciliation check in `llm-validate` (done 2026-04-28).

    **Acceptance criteria:**
    - All frameworks in `analysis/ir/llm-summaries/` that have flagged methods are annotated and their `.llm.json` files committed.
    - `llm-validate` passes on each framework output with `warnings=0` (or warnings documented in the orchestration table with explanation).
    - `enrich --only <Framework>` verification passes for each framework.
    - Runs table in `analysis/scripts/llm-annotate-orchestration.md` updated with per-framework rows.

    **Dependencies:** none
