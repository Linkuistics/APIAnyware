entries:
- id: synthetic-pseudo-framework-pattern-for-non-framework-system-headers
  title: Synthetic pseudo-framework pattern for non-.framework system headers
  body: |
    Headers outside the standard `.framework` tree (e.g. libdispatch in
    `/usr/include/dispatch/`) use a four-part pattern:
    (1) checked-in umbrella header at
    `collection/crates/extract-objc/synthetic-frameworks/<name>/<name>.h`;
    (2) `sdk.rs::synthetic_frameworks()` appends a synthetic `FrameworkInfo` to the
    framework list; (3) `is_from_framework()` branches on the synthetic name to accept
    the relevant `usr/include/<subdir>/` paths; (4) the emitter's `framework_ffi_lib_arg`
    in `shared_signatures.rs` maps the synthetic framework name to the real dylib short
    name (e.g. `"libdispatch"` → `"libSystem"`).
    Use this pattern for any future system-header extraction that lacks a `.framework`
    directory.
- id: enumdecl-forward-decl-shadow-is-definition-guard-is-required
  title: 'EnumDecl forward-decl shadow: is_definition guard is required'
  body: |
    `CF_ENUM`/`NS_ENUM` macros expand to a forward-declaration cursor followed by the
    actual definition cursor, both with the same name. Any `HashSet`-based dedup guard
    on enum names in `extract_declarations.rs` must check `entity.is_definition()` before
    inserting — inserting on the first (forward-decl) visit causes the definition to be
    skipped silently, yielding zero-value enum sections. `EnumDecl`, `StructDecl`, and
    `ObjCProtocolDecl` arms all gate on `entity.is_definition()`. `ObjCInterfaceDecl`
    does not need the guard — see "`ObjCInterfaceDecl` never sees `@class` forward
    declarations".
- id: objcinterfacedecl-never-sees-class-forward-declarations
  title: '`ObjCInterfaceDecl` never sees `@class` forward declarations'
  body: |
    `@class Foo;` forward declarations produce `ObjCClassRef` cursors, not
    `ObjCInterfaceDecl`. The `ObjCInterfaceDecl` arm in `extract_declarations.rs`
    therefore always sees only definition cursors and requires no `entity.is_definition()`
    guard.
- id: unsigned-enum-constants-require-the-u64-component
  title: Unsigned enum constants require the u64 component
  body: |
    `child.get_enum_constant_value()` returns `Option<(i64, u64)>`. For enums with a
    signed underlying type, use `.0` (i64). For unsigned underlying types
    (`CF_ENUM(uint32_t, ...)`, `CG_ENUM(uint32_t, ...)`), clang sign-extends top-bit-set
    values into the i64 component, so `.0` is wrong (e.g. 0xFFFFFFFE → `-2`).
    `extract_declarations.rs` calls `get_canonical_type()` on the enum's underlying type
    to determine signedness, takes `.1` (u64) for unsigned types, and skips constants
    exceeding `i64::MAX` with a warning. Canonical canary:
    `kCGEventTapDisabledByTimeout` emits as `4294967294` (not `-2`).
- id: typedefs-resolve-at-extraction-time
  title: Typedefs resolve at extraction time
  body: |
    ObjC typedef aliases (e.g., NSImageName) resolve to canonical types during collection. Object pointer typedefs → Id/Class, primitive typedefs → Primitive, enum/struct typedefs → Alias. Unresolved typedefs produce incorrect FFI signatures in all language targets.
- id: typenamealias-nodes-require-child-recursion
  title: TypeNameAlias nodes require child recursion
  body: |
    `TypeAlias` (type declaration) and `TypeNameAlias` (type reference in signatures) are distinct Swift API digester node kinds. C typedefs like `CFStringEncoding` appear as `TypeNameAlias` nodes whose first child is a `TypeNominal` with the resolved type. `map_swift_type()` recurses into the first child. Without recursion, framework-qualified `Primitive` names (e.g., `CoreFoundation.CFStringEncoding`) reach downstream unrecognized → `_pointer`. Childless `TypeNameAlias` nodes fall through to `Primitive`.
- id: function-pointer-typedefs-need-pointee-inspection
  title: Function pointer typedefs need pointee inspection
  body: |
    `map_typedef` must check whether a `TypeKind::Pointer` pointee is `FunctionPrototype` and extract full param/return signatures. `TypeRefKind::FunctionPointer` (in `type_ref.rs`) carries the full signature. Without this, callback typedefs like `CGEventTapCallBack` resolve to plain `Pointer`. New `TypeRefKind` variants require updating exhaustive matches in `ffi_type_mapping.rs` and all emitter crates.
- id: category-properties-need-dedup-by-name
  title: Category properties need dedup by name
  body: |
    ObjC categories can redeclare properties already on the base class. Deduplication by name (HashSet filter in `extract_declarations.rs`) prevents duplicate IR entries.
- id: enrichment-filters-by-framework-scope
  title: Enrichment filters by framework scope
  body: |
    `build_enrichment_data()` and `build_verification_report()` filter by `framework_classes`, computed in `build_enriched_framework()`. Without filtering, violations from all frameworks bleed into every report. Delegate protocol attribution filters by `framework.protocols` (declaration site), not `framework_classes` (usage site). Rule: filter by where the entity is *declared*, not where it's *used*.
- id: driverkit-and-tk-frameworks-are-ignored
  title: DriverKit and Tk frameworks are ignored
  body: |
    DriverKit requires kernel headers unavailable in user-space SDKs. Tk is a legacy X11 toolkit. Both excluded via `IGNORED_FRAMEWORKS` in `sdk.rs`, filtered in `discover_frameworks()`.
- id: cross-framework-indexes-span-all-frameworks
  title: Cross-framework indexes span all frameworks
  body: |
    `build_method_index()` and `build_property_index()` in `resolve/checkpoint.rs` receive all loaded frameworks. Otherwise cross-framework inherited methods/properties lose full metadata (params, return type, flags) and fall to minimal stubs. Any index that looks up declarations by class name must span all frameworks if inheritance crosses boundaries.
- id: stub-launcher-gives-unique-cdhash-per-app
  title: Stub launcher gives unique CDHash per app
  body: |
    macOS TCC grants permissions per-CDHash. Without per-app stubs, all apps sharing a runtime binary (e.g., `/opt/homebrew/bin/racket`) share one TCC permission set. `apianyware-macos-stub-launcher` (`generation/crates/stub-launcher/`) generates a ~50KB Swift binary per app that `execv`s into the language runtime. API: `StubConfig` → `create_app_bundle()` for full `.app` assembly, or `generate_stub_source()` + `compile_stub()` for custom workflows. Compiles via `swiftc`.
    **Ad-hoc codesigning invalidates TCC grants on every rebuild.** Each `swiftc` compilation with ad-hoc signing (`-`) produces a new CDHash, voiding any Accessibility/Screen Recording TCC grant. Fix: stable signing identity (Developer ID or self-signed cert with a fixed key). Until the `.app` bundler implements stable signing, re-grant TCC after every rebuild.
- id: prefer-synthetic-tests-over-sdk-dependent-tests
  title: Prefer synthetic tests over SDK-dependent tests
  body: |
    Tests depending on extracted SDK data (e.g., `Foundation.json`) silently skip when absent → false-green CI. Core logic tests (resolution, enrichment, emission) use synthetic in-memory data. Real-SDK tests are for integration-level extraction fidelity only.
- id: snapshot-test-framework-covers-emitter-paths
  title: Snapshot test framework covers emitter paths
  body: |
    `build_snapshot_test_framework()` from `emit/test_fixtures.rs` provides 5 classes, 2 protocols, 1 enum, 2 constants, exercising all emitter code paths. Minimal hand-built frameworks miss edge cases in end-to-end emission.
- id: ffi-mapper-normalizes-primitive-names
  title: FFI mapper normalizes primitive names
  body: |
    `Primitive` matching in `RacketFfiTypeMapper::map_type()` cannot use exact lowercase. Swift digester produces framework-qualified PascalCase (`Swift.Void`, `Swift.Bool`, `Swift.Double`); ObjC uses uppercase `BOOL`. `normalize_primitive_name()` strips framework prefix via `rsplit_once('.')` and lowercases. Applies to `map_type()` and trait methods like `is_void()`. Any new language target's FFI mapper hits the same issue.
- id: geometry-struct-mapping-uses-single-source
  title: Geometry struct mapping uses single source
  body: |
    Three code paths: `is_known_geometry_struct()` (recognition), `map_geometry_struct_alias()` (Alias kind → Racket type), `Struct` match arm. The `Struct` arm delegates to `map_geometry_struct_alias()`. Adding new geometry structs: (1) `is_known_geometry_struct()`, (2) `map_geometry_struct_alias()`, (3) `define-cstruct` in Racket runtime `type-mapping.rkt` with correct field layout. Discover missing structs by searching collected JSON for `Alias`-kind entries across Foundation, AppKit, CoreGraphics.
- id: extract-objc-filters-internal-linkage
  title: 'extract-objc filters: internal linkage'
  body: |
    `extract_constant` / `extract_function` in `extract_declarations.rs` skip declarations with `entity.get_linkage() == Some(Linkage::Internal)`. `static const` variables and `static inline` functions are inlined at use sites and emit no dylib symbol — extracting them causes runtime `get-ffi-obj` failures. Canonical examples: `NSHashTableCopyIn`, `NSHashTableStrongMemory`, `NSHashTableWeakMemory`. Macros are filtered separately — see "Macros reach IR only via swift-api-digester".
- id: extract-objc-filters-platform-unavailability
  title: 'extract-objc filters: platform unavailability'
  body: |
    Clang availability attributes (`API_UNAVAILABLE(macos)`, etc.) mark declarations absent from the macOS dylib despite having `Linkage::External` and ordinary USRs — neither the linkage filter nor any USR filter catches them. `is_unavailable_on_macos(entity)` iterates `entity.get_platform_availability()` for `platform == "macos" || "macosx"` and `unavailable: true`. Missing availability data → `false` (absence is not evidence of unavailability). Canonical canary: `kAudioServicesDetailIntendedSpatialExperience` in AudioToolbox. Removed 1,738 symbols across 56 frameworks (876 constants + 862 functions); AppKit alone: 387 constants. Verification: `dyld_info -exports <dylib>`.
- id: extract-objc-availability-filter-covers-all-declaration-kinds
  title: extract-objc availability filter covers all declaration kinds
  body: |
    `extract_class`, `extract_protocol`, `extract_method`, and `extract_property` each gate on `is_unavailable_on_macos`. Class/protocol-level hits are wholesale drops (see "Wholesale drop is the right default for unavailable parent types"). `extract_method` fires per-selector inside both direct-class and `extract_category` visits. `extract_property` fires per-property for both instance and class properties. `get_platform_availability()` is reliable at all four granularities. Blast radius: class/protocol/method — 53 frameworks, −450 classes, −151 protocols, −2,982 class methods, −414 protocol methods; property — 31 frameworks, −303 properties (AVFoundation alone −223). The filter quartet is complete; all four declaration kinds share one predicate.
- id: wholesale-drop-is-the-right-default-for-unavailable-parent-types
  title: Wholesale drop is the right default for unavailable parent types
  body: |
    Class- or protocol-level `API_UNAVAILABLE(macos)` drops the entire declaration, not just flags it. Rationale: the macOS variant of the dylib does not export the class/protocol symbols at all, so every inherited method would crash at first call with "unrecognized selector"; a flagged-but-populated IR only defers the runtime failure to language targets. Matches how iOS-family classes inside shared Foundation headers are silently absent from the macOS Foundation dylib. Applied in `extract_class` and `extract_protocol`; the same predicate fires per-selector in `extract_method` for the subtler mixed-availability case (class available, some selectors not).
- id: synthetic-libclang-tests-need-lazylock
  title: Synthetic libclang tests need LazyLock
  body: |
    `clang::Clang` is `!Send + !Sync`. Synthetic tests using libclang must cache a single instance in a `LazyLock`.
- id: shared-skipped-symbol-reason-vocabulary
  title: Shared skipped_symbol reason vocabulary
  body: |
    `apianyware_macos_types::skipped_symbol_reason` holds five `&'static str` tags used by both extractors: `internal_linkage`, `platform_unavailable_macos`, `swift_native`, `preprocessor_macro`, `anonymous_enum_member`. Format: `"<tag>: <human description>"`. Audit tooling matches via `reason.contains(tag)`. When adding a new filter, extend this module first — do not inline the reason string at the filter site. extract-objc records via `record_skip(skipped_symbols, name, kind, reason)` in `extract_declarations.rs`; method and property records qualify the name as `"{owner}.{selector|prop}"`. extract-swift records via the `non_c_linkable_skip_reason` predicate. Both feed `fw.skipped_symbols`; `merge.rs::merge_swift_into_objc` extends objc's list with swift's. Remaining 12 duplicate `(name, kind)` pairs per fresh collection are true type-based overloads with identical parameter labels (e.g., CoreML `pointwiseMin(_:_:)`×3) — resolving them requires mangled signatures (see "Swift printed_name catches label overloads not type overloads").
- id: non-c-linkable-usr-families-in-extract-swift
  title: Non-C-linkable USR families in extract-swift
  body: |
    Three USR prefix families produce no dylib symbol and are filtered by `non_c_linkable_skip_reason(node)` in `declaration_mapping.rs`:

    - `s:` — Swift-native; only callable via Swift ABI
    - `c:@macro@` — preprocessor macro cursor; no dylib symbol
    - `c:@Ea@<dummy>@<member>` / `c:@EA@<typedef>@<member>` — anonymous enum members; value inlined, no export

    Named-enum members (`c:@E@<Enum>@<Member>`) are routed through `Enum` → `EnumElement`, not this filter. The `Func` and `Var` arms of `map_abi_to_framework` call the predicate and route matches to `skipped_symbols`. Extend this predicate for new non-linkable families. The filter is conservative: missing USRs, `c:`/`c:@F@`/`So` prefixes, and non-Func/Var cursors pass through. Network's 437 `nw_*` and AudioToolbox's 58 `AudioFileComponent*` functions are untouched.
- id: symmetric-func-var-filtering-is-load-bearing
  title: Symmetric Func/Var filtering is load-bearing
  body: |
    `c:@macro@` and anonymous-enum cursors currently appear only as `Var` nodes, but the `Func` arm guard in `non_c_linkable_skip_reason` costs nothing and survives future digester releases.
- id: non-c-linkable-filter-blast-radii
  title: Non-C-linkable filter blast radii
  body: |
    - `s:` — 46 in CoreGraphics alone, dozens across other frameworks
    - `c:@macro@` — 30 across 5 frameworks (CoreText 15, AudioToolbox 5, NetworkExtension 5, Network 4, CoreSpotlight 1)
    - `c:@Ea@`/`c:@EA@` — 205 across 2 frameworks (Network 150: 7 Ea + 143 EA; AudioToolbox 55)
- id: usr-prefix-families-encode-declaration-origin
  title: USR prefix families encode declaration origin
  body: |
    USRs in `swift-api-digester` output encode the declaration's origin. The prefix family — not the `source` field — is the load-bearing discriminator:

    - `s:` — Swift-native; not `dlsym`-able
    - `c:@F@<name>` — C function; exported as `_<name>`
    - `c:@<name>` — C var / enum constant; always a VarDecl USR form
    - `c:@E@<Enum>@<Member>` — named C enum member; routed through `Enum` → `EnumElement`
    - `c:@Ea@<dummy>@<member>` — anonymous C enum member, no typedef wrapper; no dylib symbol
    - `c:@EA@<typedef>@<member>` — anonymous C enum member with typedef; no dylib symbol. Single-character case difference from `Ea` — both must be filtered together or 95% of the leak survives
    - `c:@macro@<name>` — preprocessor macro; no dylib symbol
    - `So<mangled>` — Obj-C declaration
- id: skipped-symbols-is-per-pipeline-not-global
  title: skipped_symbols is per-pipeline, not global
  body: |
    Each extractor records its own filter decisions. `merge.rs::merge_swift_into_objc` appends swift's list onto the objc framework. A symbol can appear in both `functions`/`constants` (from one extractor) and `skipped_symbols` (from the other). Canonical example: NSLog — extract-objc keeps `c:@F@NSLog`, extract-swift skips the Swift-ABI overlay (`s:10Foundation5NSLog…`); final IR carries NSLog once with ObjC metadata. `skipped_symbols` membership does not mean "absent from final IR."
- id: macros-reach-ir-only-via-swift-api-digester
  title: Macros reach IR only via swift-api-digester
  body: |
    libclang surfaces `#define` macros as `EntityKind::MacroDefinition`, never reaching extract-objc's `VarDecl`/`FunctionDecl` arms. Macros in ObjC framework headers reach collected IR only via `swift-api-digester`, re-exported as top-level `Var` nodes with `c:@macro@` USRs. The filter for macro-derived constants (e.g., CoreText `kCTVersionNumber10_*`) lives in `extract-swift/src/declaration_mapping.rs`, not extract-objc. A defensive comment at `extract_constant` points to the real filter.
- id: core-backlog-scope-shared-pipeline-tasks-only
  title: 'Core backlog scope: shared-pipeline tasks only'
  body: |
    Tasks tagged `[generation]` or `[runtime]` belong in target-specific backlogs
    (e.g., `LLM_STATE/targets/racket-oo/backlog.md`), not `LLM_STATE/core/backlog.md`.
    Scope drift accumulates silently when reactive tasks are filed in whichever plan
    is open. Periodic triage should check `[generation]`/`[runtime]` tags against
    which plan file owns them.
- id: backlog-task-descriptions-are-hypotheses
  title: Backlog task descriptions are hypotheses
  body: |
    Task root-cause framing and scope estimates are starting hypotheses. Trace symptom → actual producer → actual consumer before committing to a fix. Scope notes describe importance, not work size — check the production surface before assuming new code is needed. Seven misdirection modes:

    1. **Wrong layer** — task says "mapper", fix is in extraction
    2. **Wrong crate** — task names extract-objc, fix is in extract-swift (see "Macros reach IR only via swift-api-digester")
    3. **Wrong blast radius** — task reports few symbols, real scope spans many frameworks. Audit all frameworks.
    4. **Wrong direction for verification** — confirm via fresh evidence (re-collect, re-run), not stale checkpoints
    5. **Wrong USR-family granularity** — task names one USR prefix, leak spans multiple nearly-identical families (e.g., `Ea`+`EA` differ by one character). Grep the symptom space broadly — list all non-linkable symbols and check USRs with a loose regex before writing the filter.
    6. **Wrong temporal frame** — symptom was fixed by an earlier filter; evidence predates that filter. Detect via mtime sanity check (see "Downstream checkpoints can predate source fixes"). Sibling tasks filed against the same stale evidence may collapse into one regeneration.
    7. **Wrong work estimate** — scope notes assess importance; actual effort depends on existing infrastructure. A "scope-expanding" task may be thin test-coverage adds if the production harness already exists.
- id: measure-filter-blast-radius-before-committing
  title: Measure filter blast radius before committing
  body: |
    Triggering symptoms underpredict scope unpredictably: 30/5 frameworks (`c:@macro@`), 1,738/56 (availability), 205/2 (anonymous enum). Steps:

    1. `git stash push -- <modified source>`
    2. `cargo run -p apianyware-macos-collect` — full re-collect (~2 min, 283 frameworks), snapshot counts
    3. `git stash pop`, re-collect, diff per-framework

    Catches semantic removals (not structural proxies like `dyld_info` counts) and wrong-granularity errors mid-diagnosis. Reusable for ObjC or Swift filters.
- id: both-extractors-have-real-sdk-integration-tests
  title: Both extractors have real-SDK integration tests
  body: |
    extract-objc: Foundation, CoreGraphics, AudioToolbox. extract-swift: CoreText (`c:@macro@` canary — all 15 Vars are macros, binary pass/fail), Network (`c:@Ea@`/`c:@EA@` canary — exact-7 `nw_browse_result_change_*` catches single-character case regressions). Both CoreText and Network harnesses also assert `depends_on` / `extract_imports`: non-empty `depends_on`, presence of known parent frameworks (Foundation / Dispatch), absence of `_`-prefixed private imports. Synthetic filter tests remain the primary coverage; real-SDK tests are integration-level fidelity checks only (see "Prefer synthetic tests over SDK-dependent tests").
- id: regenerate-ir-before-using-as-evidence
  title: Regenerate IR before using as evidence
  body: |
    `collection/ir/collected/` is gitignored; file mtime is unreliable. Re-run the collector before grepping JSON to verify fixes. Applies to `collected/`, `resolved/`, `annotated/`, `enriched/`.
- id: downstream-checkpoints-can-predate-source-fixes
  title: Downstream checkpoints can predate source fixes
  body: |
    A fresh `collected/` can coexist with stale `resolved/` if analysis was not re-run after an extraction filter landed. Symptom: canary absent from `collected/*.json` but present in `resolved/*.json`. Pre-investigation check: compare checkpoint mtime to `collection/crates/extract-{swift,objc}/src/**` mtimes. If source is newer, regenerate (`cargo run -p apianyware-macos-analyze`) before forming hypotheses. Automated by `analysis/scripts/regenerate-stale-pipeline.sh`. See "Codegen freshness uses newest-input vs newest-output" for the comparison rule.
- id: workspace-lint-requires-two-escape-hatches
  title: Workspace lint requires two escape hatches
  body: |
    `cargo clippy --workspace --all-targets -- -D warnings` is the lint gate.

    1. **Ascent-generated code.** `ascent!` macro in `resolve/program.rs` and `enrich/program.rs` triggers `clone_on_copy`, `unused_unit`, `needless_lifetimes` on Copy-typed fields. Module-level `#![allow(...)]` covers it; add new lint names only for new families.
    2. **`unsafe_code` is a rustc lint, not clippy.** Workspace sets `unsafe_code = "warn"`. Rust 2024 makes `env::set_var`/`env::remove_var` unsafe, firing in tests. Use per-fn `#[allow(unsafe_code)]` with SAFETY comment; do not relax the workspace setting.
- id: codegen-freshness-uses-newest-input-vs-newest-output
  title: Codegen freshness uses newest-input vs newest-output
  body: |
    Multi-stage codegen freshness: "newest input mtime > newest output mtime", not "newest > oldest output". The oldest-output variant produces perpetual false positives from tool-managed files (e.g., `raco make` `.zo`/`.dep`) or orphaned prior-version output. Exclude tool-managed subdirectories (e.g., `*/compiled/*`) from the output scan.
- id: missing-output-dirs-are-not-staleness-signals
  title: Missing output dirs are not staleness signals
  body: |
    Freshness guardrails skip targets with no existing output directory. Stub emitters (e.g., `racket-functional`) register in the emitter registry but never produce a `generated/` directory. Treating absence as staleness creates an infinite regen loop. First-time generation is manual.
- id: swift-printed-name-catches-label-overloads-not-type-overloads
  title: Swift printed_name catches label overloads not type overloads
  body: |
    `printed_name` encodes parameter labels (e.g., `pointwiseMin(_:_:)`) but not parameter types. ObjC's `{owner}.{selector}` is stronger because selectors encode full parameter structure. True type-based overloads sharing identical `printed_name` (12 remaining per fresh collection) require mangled signatures or parameter-type lists to distinguish.
- id: wire-format-json-in-docs-and-tests-is-a-coupling-surface
  title: Wire-format JSON in docs and tests is a coupling surface
  body: |
    Design-doc examples (e.g., `docs/specs/2026-03-26-macos-workspace-design.md`) and tests asserting on `serde_json::to_string` output (e.g., `foundation_serializes_to_json`) are tightly coupled to serde annotations. Both must update in lockstep with serde `rename`/`alias`/`skip` changes.
- id: struct-globals-need-address-of-pointer-globals-need-dereference
  title: Struct globals need address-of; pointer globals need dereference
  body: |
    The IR distinguishes struct-typed globals from pointer-typed globals at the clang-AST level. Emitters must use these differently:
    - **Pointer global** (e.g. `kCFRunLoopCommonModes`): the symbol *is* the pointer — use `get-ffi-obj` (or equivalent dereference) to read the pointer value.
    - **Struct global** (e.g. `_dispatch_main_q`): the symbol *is* the struct — consumers need the symbol's **address**, not its first field. Use `ffi-obj-ref` (or equivalent address-of) to obtain the pointer to the struct.
    Using `get-ffi-obj` on a struct global dereferences the first field as if it were a pointer — wrong on all platforms. This distinction applies to every language binding emitter whenever a framework has struct-typed global constants.
- id: os-object-use-objc-makes-gcd-types-appear-as-objc-objects-in-ir
  title: OS_OBJECT_USE_OBJC makes GCD types appear as ObjC objects in IR
  body: |
    When SDK headers are compiled with `OS_OBJECT_USE_OBJC=1` (the macOS default), `dispatch_queue_t` and similar GCD types are declared as ObjC objects. The IR maps them to an `_id`-equivalent type. Emitters obtaining queue values via `dlsym`/`ffi-obj-ref`/pointer arithmetic get a raw pointer that is not automatically `_id`-tagged — an explicit cast is required before passing it to any function whose IR signature declares a GCD type as `_id`-equivalent. Every future language binding emitter faces this same cast requirement. Resolution: documentation in `generation/docs/emitter-contract.md` (see "`emitter-contract.md` documents cross-emitter IR conventions"); IR annotation deferred until more than one framework hits this pattern.
- id: make-objc-block-does-not-accept-f
  title: '`make-objc-block` does not accept `#f`'
  body: |
    `make-objc-block` in `runtime/block.rkt` stores its `proc` argument directly. Passing `#f` (a common idiom for "no completion handler") causes `(apply #f ...)` on the first block invocation — a Racket error. The fix is to normalise `#f` → `(lambda args (void))` at the top of `make-objc-block`. Until fixed, callers must pass an explicit no-op lambda. Backlog task: "Fix `make-objc-block` to treat `#f` as a no-op lambda".
- id: generator-maps-bool-bool-to-uint8-breaking-racket-boolean-logic
  title: Generator maps `bool`/`BOOL` to `_uint8`, breaking Racket boolean logic
  body: |
    The racket-oo emitter maps C `bool`/`BOOL` return types to `_uint8`. In Racket, `_uint8` decodes to an integer, and all integers (including `0`) are truthy — only `#f` is falsy. A method returning `false`/`0` is silently misidentified as true in any boolean context. The correct FFI type is `_bool`, which decodes `0` → `#f` and non-zero → `#t`. Until fixed, callers must wrap boolean returns with `(positive? ...)` or `(not (zero? ...))`. Backlog task: "Fix generator to emit `bool`/`BOOL` return types as `_bool` not `_uint8`".
- id: generated-binding-contracts-are-any-c-no-receiver-or-type-checking
  title: Generated binding contracts are `any/c` — no receiver or type checking
  body: |
    `provide/contract` forms in generated bindings use `any/c` for all parameters and return types. Passing the wrong receiver class, an unwrapped `objc-object` instead of `_id`, a missing `coerce-arg`, or a raw Racket string where an NSString pointer is expected all bypass the contract boundary and fail late (or silently). The minimum useful improvement is a receiver-class predicate on `self`. Backlog task: "Strengthen generated binding contracts beyond `any/c`".
- id: racket-malloc-is-gc-managed-use-raw-for-c-heap-allocation
  title: Racket `malloc` is GC-managed; use `'raw` for C-heap allocation
  body: |
    Plain `(malloc n)` in Racket CS calls `scheme_malloc_atomic` — the buffer is GC-managed and must NOT be passed to C `free()`. Calling `(free buf)` on a GC-managed buffer causes SIGABRT (exit 134). When a C function requires a caller-allocated buffer that C code (or explicit Racket code) must later `free`, use `(malloc n 'raw)`. Canonical reference: `ax-get-pid` in `ax-helpers.rkt` (GC path, no free) vs any `'raw` allocation paired with an explicit `(free ...)`.
- id: llm-annotations-use-a-dedicated-input-directory
  title: LLM annotations use a dedicated input directory
  body: |
    Two annotation sources: (1) heuristic annotations via checkpoint output dir
    (`load_existing_annotations()`), (2) LLM-generated `.llm.json` files from
    `--llm-dir` (`load_llm_annotations()` in `llm.rs`). LLM annotations take
    precedence via merge logic. Full workflow: `llm-extract` CLI → `.methods.json`
    summaries → Claude Code subagents (one per framework, parallel) → each subagent
    runs `llm-validate` pre-return → `.llm.json` → `annotate --llm-dir` → `enrich`
    → `jq '.verification'`. Runs within Claude Code for cost reasons. Scripts:
    `analysis/scripts/llm-annotate-subagent.md` (subagent prompt with schema and
    hard rules), `analysis/scripts/llm-annotate-orchestration.md` (main-agent
    orchestration loop). IR staging: `analysis/ir/llm-summaries/` is gitignored;
    `analysis/ir/llm-annotations/*.llm.json` is versioned (see "LLM .llm.json files
    are versioned in git").
- id: const-char-maps-to-typerefkind-cstring
  title: '`const char *` maps to `TypeRefKind::CString`'
  body: |
    `TypeRefKind::CString` is a dedicated variant for `const char *` parameters and return
    values only; non-const `char *` stays `Pointer`. FFI type: `_string`. Return contract:
    `(or/c string? #f)`. Parameter contract: `string?`. Any new language emitter must handle
    `CString` in its FFI and contract mappers.
- id: cfstr-constants-extracted-by-tokenizing-macrodefinition-range
  title: CFSTR constants extracted by tokenizing `MacroDefinition` range
  body: |
    The `MacroDefinition` arm in `extract_declarations.rs` calls `extract_cfstr_macro_constant`,
    which scans the macro's token window for the pattern `CFSTR ( "literal" )`. Matched
    constants get `macro_value: Some(string)` in IR. Emitter generates a `_make-cfstr`
    helper via `CFStringCreateWithCString` and emits `(define k (_make-cfstr "literal"))`.
    Fragile if Apple changes the macro expansion shape for CFSTR.
- id: nullable-class-returns-emit-or-c-pred-objc-nil
  title: Nullable class returns emit `(or/c <pred>? objc-nil?)`
  body: |
    `map_return_contract` in `emit_class.rs` emits `(or/c <class-pred>? objc-nil?)` for
    `TypeRefKind::Class { name }`. The `objc-instance-of?` predicate in `objc-base.rkt`
    uses `isKindOfClass:` with a hash-cached `objc_getClass` lookup.
- id: class-side-names-get-class-suffix-on-collision
  title: Class-side names get `-class` suffix on collision
  body: |
    `make_class_method_name` / `make_class_property_{getter,setter}_name` take a
    `disambiguate: bool`. `generate_class_file` builds an `instance_bindings` set and
    derives `class_method_disambig` / `class_property_disambig` sets; colliding class-side
    names get a `-class` suffix. Required to avoid duplicate-define crashes (e.g., NSEvent
    `modifierFlags`).
- id: struct-typedefs-resolve-to-typerefkind-struct
  title: Struct typedefs resolve to `TypeRefKind::Struct`
  body: |
    `TypeKind::Record` typedefs produce `Struct { name }` (not `Alias`). This routes CF
    struct globals (e.g., `kCFTypeDictionaryKeyCallBacks`) through `is_struct_data_symbol`
    to the `ffi-obj-ref` path. See "Struct globals need address-of; pointer globals need
    dereference".
- id: is-generic-type-param-uses-uppercase-then-lowercase-heuristic
  title: '`is_generic_type_param` uses uppercase-then-lowercase heuristic'
  body: |
    Pattern: name starts with an uppercase letter followed by a lowercase letter (e.g., `ObjectType`,
    `KeyType`). Extracted to `pub fn is_generic_type_param` in `ffi_type_mapping.rs` and
    shared between FFI and contract mappers. No false positives in the current framework set;
    theoretically vulnerable to a single-uppercase-letter framework prefix (none exist today).
- id: list-nsarray-hash-nsdictionary-wraps-as-retained
  title: '`list->nsarray`/`hash->nsdictionary` wraps as retained'
  body: |
    `list->nsarray` and `hash->nsdictionary` in `type-mapping.rkt` return `wrap-objc-object
    … #:retained #t`. The inverse `nsarray->list` / `nsdictionary->hash` call
    `unwrap-objc-object` on their inputs before conversion.
- id: clang-2-0-0-panics-on-any-non-utf-8-cxstring-not-just-paths
  title: clang-2.0.0 panics on any non-UTF-8 CXString, not just paths
  body: |
    `clang-2.0.0/src/utility.rs:271` runs `CStr::to_str().expect("invalid Rust string")`
    on every string libclang returns. Doc comments are the highest-risk source — some
    Quartz-subframework cursors carry a stray non-UTF-8 byte at positions 20–32 of the
    brief comment, triggering `Utf8Error { valid_up_to: N, error_len: 1 }`. The panic
    starts as a normal Rust unwind but sits inside `extern "C" fn visit` one frame
    above, so Rust converts it to a process abort — `catch_unwind(AssertUnwindSafe(…))`
    at the call site keeps the unwind inside Rust territory and the visitor continues.
    Pattern used in `safe_get_comment_brief` / `catch_clang_utf8_panic` in
    `extract_declarations.rs`; reapply for any future extractor hot spot that calls
    libclang string-returning methods (name, USR, display_name, comment variants) on
    entities sourced from Quartz-umbrella subframeworks or other headers with
    miscoded byte sequences.
- id: enum-typedef-underlying-type-needs-get-canonical-type
  title: Enum-typedef underlying type needs get_canonical_type
  body: |
    `Entity::get_enum_underlying_type()` on a `CF_ENUM(UInt32, AXValueType)` enum
    returns a `clang::Type` whose `TypeKind` is `Typedef` (the `UInt32` typedef),
    not `UInt`. Calling `map_primitive_name` on it falls through to the
    display-name default → `"UInt32"`, which the FFI mapper then doesn't recognize.
    `.get_canonical_type()` drills through the typedef wrapper to the real
    `TypeKind::UInt`, producing the canonical `"uint32"` name the rest of the
    pipeline expects. Applies anywhere a typed typedef is the "underlying" of
    another type declaration.
- id: typerefkind-alias-carries-underlying-primitive-for-ffi-width
  title: '`TypeRefKind::Alias` carries `underlying_primitive` for FFI width'
  body: |
    `TypeRefKind::Alias { name, framework, underlying_primitive: Option<String> }`
    stores the canonical primitive name (e.g., `"uint32"`, `"int64"`) produced by
    `enum_underlying_primitive()` in `type_mapping.rs` (see "Enum-typedef underlying
    type needs get_canonical_type"). The FFI mapper consults `underlying_primitive`
    for `Alias` kinds to select the correct width and signedness — without it,
    enum-typedef aliases silently map to a wrong-width FFI type. `None` is valid when
    no canonical primitive is determinable. Shared helper
    `racket_ffi_type_for_primitive` in `ffi_type_mapping.rs` converts the canonical
    name to an FFI type string and is called from both the `Alias` arm and the
    `Primitive` arm.
- id: bundle-walkers-must-use-logical-paths-not-canonical-paths
  title: Bundle walkers must use logical paths, not canonical paths
  body: |
    When a language-target bundler walks an app's require/import graph to copy
    transitive dependencies, resolving each candidate via `canonicalize()` breaks
    any source layout that stitches external trees via symlinks (e.g.
    Modaliser-Racket's `bindings/` → `APIAnyware-MacOS/generation/targets/racket-oo/`).
    The canonical path falls outside the app's `source_root`, so an
    "is-this-under-source_root?" guard rejects it. The fix is to normalize paths
    absolutely but without following symlinks: `std::path::absolute` + manual
    `.`/`..` collapse. Reads (`fs::read_to_string`, `fs::copy`) still follow
    symlinks transparently, so the bundler ends up with real copies of the
    symlink targets laid out under the symlinked (logical) bundle path —
    self-contained, no leak of external paths. Pattern lives in
    `bundle-racket-oo/src/deps.rs::collect_dependencies`; reuse verbatim for
    future bundlers (Python, Chez, Gerbil, etc.). Unix-only: uses
    `std::os::unix::fs::symlink` in tests.
- id: stub-launcher-script-resource-dir-must-come-from-the-entry-path
  title: '`stub-launcher` script_resource_dir must come from the entry path'
  body: |
    `stub-launcher`'s Swift stub calls
    `Bundle.main.path(forResource:ofType:inDirectory:)`. For an app whose entry
    is at the `source_root` root (e.g. Modaliser's `main.rkt`), `inDirectory` is
    just `"racket-app"`. For the APIAnyware sample-app layout (entry at
    `apps/<name>/<name>.rkt`), `inDirectory` is `"racket-app/apps/<name>"`. The
    general formula: `racket-app/ + (entry.parent() - source_root)`. Encoded in
    `bundle-racket-oo::bundle::derive_script_resource_dir`; hardcoding it blocks
    non-sample-app layouts.
- id: define-objc-subclass-macro-lives-in-runtime-objc-subclass-rkt
  title: define-objc-subclass macro lives in runtime/objc-subclass.rkt
  body: |
    `define-objc-subclass` in `runtime/objc-subclass.rkt` declares ObjC subclasses from Racket. `drawing-canvas` in the sample apps is the canonical consumer pattern. Required when a Racket app must subclass an ObjC class (e.g., to provide a custom NSView delegate or override lifecycle methods).
- id: hello-window-is-canonical-bundler-integration-demo
  title: hello-window is canonical bundler integration demo
  body: |
    `hello-window` is the designated app for bundler integration tests and the developer guide entry point. Do not replace it with another sample app for these roles. Other sample apps (mini-browser, note-editor, modaliser, etc.) serve as portfolio demos only.
- id: protocol-inherited-methods-missing-from-class-ir
  title: Protocol-inherited methods propagated at resolve layer
  body: |
    Protocol-inherited methods are propagated to class IR at the resolve layer
    (`analysis/crates/resolve/`) via `transitively_conforms_to` (reflexive-transitive
    closure over `conforms_to`/`protocol_inherits`) and an `effective_method` Datalog
    rule. `build_protocol_method_index` in `checkpoint.rs` provides full parameter/
    return-type metadata fallback keyed by `(protocol_name, selector, is_class_method)`.
    Fix lives at the resolve layer — not per-emitter — so every current and future
    language emitter inherits protocol-method propagation automatically.
- id: llm-annotation-validator-separates-semantic-from-structural-checks
  title: LLM annotation validator separates semantic from structural checks
  body: |
    `validate_llm_annotations` / `validate_llm_file` in `analysis/crates/annotate/src/llm.rs` perform semantic cross-referencing (8 error kinds) beyond serde's automatic structural checks. Serde handles field types and required keys; the validator catches cross-referencing failures (e.g., method names that don't exist in IR). `ValidationReport` carries both an `errors` vec and a `warnings` vec; `is_ok()` is errors-only — warnings never fail the validator. `llm-validate` CLI exits 0 on valid input (including warnings), 1 with errors; logs `warnings=N` in the success line. `ValidationWarning::SubagentReportMismatch` fires when `subagent_report` counts diverge from actual output (see "LLM subagent self-reports reconciled via subagent_report field"). Subagents must run `llm-validate` before returning a `.llm.json`.
- id: llm-annotation-durability-llm-json-files-are-gitignored-decide-before-foundation-run
  title: LLM .llm.json files are versioned in git
  body: |
    `analysis/ir/llm-annotations/*.llm.json` files are checked into git (Option A).
    All 284 workspace frameworks are annotated and versioned; storage cost is <1 MB total.
    Regenerating from scratch costs ~14M tokens: naming-compliant/Swift-only frameworks (272) at 35k + N × 250 marginal; code-generated frameworks (Matter) at ~57k via template-based bulk annotation (see "Template-based bulk annotation for code-generated frameworks").
    Fresh-clone workflow: run `annotate --llm-dir analysis/ir/llm-annotations/` — no LLM calls required on clone. `analysis/ir/llm-summaries/` remains gitignored.
- id: apple-developer-docs-are-js-rendered-sdk-headers-are-authoritative
  title: Apple developer docs are JS-rendered; SDK headers are authoritative
  body: |
    `developer.apple.com` returns only `<title>` via WebFetch (JS-rendered SPA). The MacOSX SDK headers at `MacOSX.sdk/System/Library/Frameworks/<F>.framework/Headers/` are the authoritative source for LLM annotation: they carry `weak`/`copy`/`assign`/`nullable` attributes and doc comments unavailable from the web. LLM annotation subagent prompts must prioritize SDK headers, not web docs.
- id: extract-objc-anonymous-enum-members-route-to-enums-values-only
  title: extract-objc anonymous enum members route to enums[].values only
  body: |
    `EnumDecl` child cursors in `extract_declarations.rs` feed `enums[].values`, not `constants[]`. No extract-objc path exists by which anonymous enum members can appear in IR `constants[]`. The corresponding non-C-linkable filter in extract-swift (`c:@Ea@`/`c:@EA@` → `skipped_symbols`) handles the same symbols from the digester side. Audit of all 13,091 ObjC constants across 252 frameworks confirmed zero anonymous-enum leaks.
- id: anonymous-enum-ir-names-embed-absolute-sdk-paths
  title: Anonymous enum IR names embed absolute SDK paths
  body: |
    libclang synthesizes names for anonymous enums from the first member, embedding the absolute SDK path in the name. These appear in IR `enums[].name` fields and cause cosmetic diffs when IR is generated under different Xcode installations or SDK locations. Not a correctness issue — values and types are unaffected. Normalize by stripping the path prefix if cross-toolchain reproducibility is needed.
- id: emitter-contract-md-documents-cross-emitter-ir-conventions
  title: emitter-contract.md documents cross-emitter IR conventions
  body: |
    `generation/docs/emitter-contract.md` is the canonical location for cross-emitter IR conventions — cases where the IR shape alone is insufficient to drive correct emission without additional rules. Template sections: IR shape → mismatch scenario → acceptable resolutions → cross-references → promote-to-IR-annotation trigger. Entry points cross-referenced from the `FfiTypeMapper` trait doc in `generation/crates/emit/src/ffi_type_mapping.rs` and from relevant inline call sites in emitter crates. Future conventions to document under this pattern: block lifecycle, error-pointer out-params, retain/release ownership semantics.
- id: llm-subagent-must-omit-classes-with-zero-annotations
  title: LLM subagent must omit classes with zero annotations
  body: |
    `analysis/scripts/llm-annotate-subagent.md` requires that classes with no
    annotated methods be omitted from the `classes` array in the returned
    `.llm.json` entirely. Returning empty class objects causes `llm-validate`
    failures. This rule is now explicit in the subagent prompt.
- id: llm-annotation-marginal-cost-is-500-tokens-method
  title: LLM annotation marginal cost depends on framework type
  body: |
    EventKit calibration: 38,971 tokens / 19 methods; marginal ~500 tokens/method, ~35k tokens fixed per framework.
    WebKit calibration (86 methods, naming-pattern-defeating): 80,907 tokens total; (80,907 − 35,000) / 86 ≈ 534 tokens/method.
    Foundation calibration (546 methods, naming-compliant): 131,228 tokens total; marginal ~250 tokens/method.
    AppKit calibration (437 methods, naming-compliant): 119,969 tokens total; marginal ~194 tokens/method — 28% under 35k + N × 250 projection.
    CoreData calibration (89 methods, naming-compliant, per-class header inspection): 71,384 tokens total; marginal ~409 tokens/method — 22% over 35k + N × 250 projection; fixed dispatch overhead dominates on small frameworks.
    25-framework batch (≤2 methods each, Swift-only, no ObjC headers): avg 26,027 tokens/framework (24% under 35k baseline). The 35k fixed cost over-estimates for sub-3-method Swift-only frameworks — use 35k + N × 250 as an upper bound for pre-batch sizing.
    Budget model: 35k + N × 250 tokens/method for naming-compliant frameworks (empirically 194–409; higher end for small per-class-inspection runs); 35k + N × 534 tokens/method for naming-pattern-defeating (heavy class decorations like `_SWIFT_UI_ACTOR`).
    Per-class header inspection costs more per method than batched Python synthesis; batched synthesis preferred for large naming-compliant frameworks.
    Code-generated frameworks (Matter, and likely CryptoTokenKit TKToken* cluster, LDAP, GSS) use template-based bulk annotation instead of per-method dispatch — see "Template-based bulk annotation for code-generated frameworks".
- id: llm-adds-value-only-on-naming-pattern-defeating-frameworks
  title: Block-invocation reclassification is primary LLM value-add
  body: |
    Block-invocation re-classification is the primary LLM value-add: heuristics emit 0 `stored` block lifecycle annotations; LLM identifies stored handlers. AppKit: 0→25 `stored_blocks`; 47 async demoted to 22 sync + 25 stored. CoreData: 0→11 `stored` (NSBatchInsertRequest row handlers, NSCustomMigrationStage will/did-migrate handlers, NSFetchRequestExpression block expressions); 30 async demoted to 4 sync + 15 async + 11 stored. AVFoundation: 198 methods, 68 classes, +15 `stored` reclassifications (6→21); `subagent_report` reconciliation warnings=0. `stored` blocks require GC-prevention pinning that `async_copied` blocks do not.

    Threading: LLM was high-yield on WebKit (C-macro `WK_SWIFT_UI_ACTOR`). AppKit threading delta was smaller (+278 method-level entries) because heuristics now propagate class-level `_SWIFT_UI_ACTOR` to methods — LLM is supplementing, not discovering. CoreData threading=0 is correct: queue-flexibility is implicit in `performBlock:` semantics, not a per-method rule. Threading yield declines as heuristics mature.

    Ownership: Near-zero LLM delta on AppKit, Foundation, CoreData. `setDelegate:`/`setDataSource:` patterns are fully covered by heuristics; Foundation `addObserver:` covered by `is_observer_param`.

    Framework selection: weight "headers with `NS_NOESCAPE` / `@property (copy)` block setters" alongside threading attributes.
- id: llm-merge-drops-heuristic-parameter-ownership-annotations
  title: parameter_ownership merge uses per-param union
  body: |
    `merge_annotations` in `validate.rs` merges `parameter_ownership` by cloning the LLM
    list (LLM entries take precedence on any conflict — they are already in the clone),
    then appending heuristic entries for `param_index` values absent from the LLM list.
    Whole-list clone silently drops heuristic entries for params the LLM did not annotate.
    Tests: `test_merge_parameter_ownership_per_param_union` (union of non-overlapping param
    sets) and `test_merge_parameter_ownership_llm_precedence_on_conflict` (LLM wins on
    conflict). WebKit canary: 67 ownership annotations with the fix vs 15 with clobber.
    Contrast with scalar fields (`threading`, `error_pattern`): those use empty-fallback
    (LLM value if non-empty, else heuristic), not per-param union.
- id: annotate-without-llm-dir-re-tags-prior-annotations-as-llm-source
  title: annotate checkpoint fallback returns only LLM-sourced entries
  body: |
    `annotate` without `--llm-dir` falls back to the prior annotated checkpoint via
    `load_existing_llm_annotations` (`analysis/crates/annotate/src/lib.rs`).
    The fallback applies `retain_llm_sourced` — a pure filter that drops any
    `source = Heuristic` entries and prunes classes with no remaining methods —
    then returns `None` when no LLM-sourced entries survive. A heuristic-only
    rerun therefore produces only `source = Heuristic` output with no LLM-source
    contamination.
- id: block-parameters-list-replace-is-safe-by-coincidence-apply-per-elem-union-if-divergence-observed
  title: '`block_parameters` merge: list-replace safe until divergence'
  body: |
    `block_parameters` in `merge_annotations` (`analysis/crates/annotate/src/validate.rs`) uses all-or-nothing list-replace — the same pattern that caused the `parameter_ownership` clobber bug. Currently safe because heuristics and LLM annotate the same block params. Apply per-element union (matching the `parameter_ownership` fix) if LLM and heuristic enumerate different block params for the same method, or if a framework/SDK update introduces heuristic vs. LLM block-param divergence. No divergence in current calibration data.
- id: is-observer-param-heuristic-covers-add-observer-first-param-weak
  title: '`is_observer_param` heuristic covers add…Observer: first-param weak'
  body: |
    `is_observer_param` in `analysis/crates/annotate/src/heuristics.rs` classifies the
    first parameter of `add…Observer:` selectors as `weak` ownership. Structural rule:
    first selector segment `starts_with("add") && ends_with("Observer")`. Generative —
    covers `addObserver:`, `addSharedObserver:forKey:options:context:`, and future
    `addXxxObserver:` variants automatically. Excludes block-form
    `addObserverForName:object:queue:usingBlock:` (first segment is `addObserverForName`,
    which does not end with `"Observer"`). Foundation heuristic-only annotation produces
    302 `parameter_ownership` entries; LLM provides no additional ownership coverage.
- id: llm-subagent-self-reports-need-jq-cross-check
  title: LLM subagent self-reports reconciled via subagent_report field
  body: |
    `subagent_report` in `FrameworkAnnotations` (`analysis/crates/types/src/annotation.rs`) carries seven `Option<usize>` count fields (`None` = not tracked; `Some(0)` = tracked, none found). `llm-validate` emits `ValidationWarning::SubagentReportMismatch` and logs `warnings=N` when subagent-stated counts diverge from actual output; strict equality is the threshold (no tolerance). Subagents include a structured self-report via `analysis/scripts/llm-annotate-subagent.md` template. Manual `jq` cross-check is available for ad-hoc inspection. AVFoundation first run: `warnings=0`. CoreData reference discrepancy: subagent reported async_copied=18/stored=8/ownership=7; actual `.llm.json` held 15/11/5.
- id: avfoundation-stored-block-signals-require-racket-oo-emitter-audit-before-avplayer-sample-apps
  title: 'AVFoundation stored-block signals: Racket-OO emitter audit required'
  body: |
    AVFoundation's LLM annotation identified 15 stored-block reclassifications critical for language binding emitters:

    - `addPeriodicTimeObserverForInterval:queue:usingBlock:` (AVPlayer, AVPlayerItemIntegratedTimeline, AVSampleBufferRenderSynchronizer) — long-lived periodic observer
    - `addBoundaryTimeObserverForTimes:queue:usingBlock:` — long-lived boundary observer
    - `requestMediaDataWhenReadyOnQueue:usingBlock:` / `respondToEachPassDescriptionOnQueue:usingBlock:` — pull-style callbacks, repeatedly invoked
    - `videoCompositionWithAsset:applyingCIFiltersWithHandler:` — per-frame applier block (stored), plus a separate async_copied one-shot completion

    Emitters that label these as `async_copied` under-pin them, causing intermittent observer disappearance under GC pressure. The Racket-OO emitter requires audit of generated AVFoundation bindings — specifically the `addPeriodicTimeObserverForInterval:` family — against the `stored` annotations to verify correct GC-prevention pinning before any sample app using AVFoundation time observers ships.
- id: llm-annotation-parallel-dispatch-safe-at-25-way-fan-out
  title: LLM annotation parallel dispatch safe at 25-way fan-out
  body: |
    25 simultaneous subagents returned `llm-validate warnings=0`; `subagent_report` reconciliation held with zero divergences. Wall-clock ~105s for 25 frameworks vs ~1,100s serial-aggregate (~10× speedup). Orchestration context overhead is negligible at this fan-out. Orchestration history tracked in `analysis/scripts/llm-annotate-orchestration.md`.
- id: template-based-bulk-annotation-for-code-generated-frameworks
  title: Template-based bulk annotation for code-generated frameworks
  body: |
    Code-generated frameworks (Matter, and likely CryptoTokenKit TKToken* cluster, LDAP, GSS) have mechanically structured selectors that permit template-based bulk annotation instead of per-method dispatch. Strategy: identify selector-family regex patterns (e.g. `subscribeAttribute.*:reportHandler:`, `readAttribute.*:completion:`) and annotate by pattern group, not individual method. Budget: `35k + ~5k × num_unique_patterns` (not `35k + N × 250`). Matter calibration: 12,827 methods, 7 patterns, ~57k tokens total — ~50× under naive projection of 3.24M. Orchestration: `analysis/scripts/llm-annotate-orchestration.md` includes a Matter strategy section with the full pattern table.
- id: subscription-observer-stored-block-superclusters-are-high-re-annotation-yield
  title: Subscription/observer stored-block superclusters are high re-annotation yield
  body: |
    Per-attribute/per-event callback registration concentrates stored-block annotations in subscription superclusters. Paradigm: Matter `subscribeAttribute*…reportHandler:` family — each selector in the family takes a per-attribute stored block (3,314 stored blocks from Matter alone vs 792 for 121 non-Matter frameworks). Reactive frameworks (Combine, CloudKit operations, RealityFoundation subscribe) and code-generated subscription frameworks share the same pattern. These are the highest-yield targets for future re-annotation cycles if annotation strategy is revised. Stored-block superclusters require GC-prevention pinning that `async_copied` blocks do not.
- id: methods-extraction-misattribution-at-cross-framework-extension-boundaries
  title: Methods-extraction misattribution at cross-framework extension boundaries
  body: |
    Extensions from framework B on types declared in framework A may surface in framework A's annotation context. Canary: `SBElementArray.mapAnnotations(_:)` and `SBElementArray.mapFeatures(_:)` belong to `CreateMLComponents.Sequence` extensions (CreateMLComponents.framework), not ScriptingBridge; the annotation subagent skipped them as unrecognized. Risk: LLM subagents may silently skip or misannotate cross-framework extension methods when the framework boundary is unclear. Filed as backlog task: investigate methods-extraction misattribution bug.
- id: swift-api-digester-re-emits-foreign-extension-targets-as-type-decls
  title: swift-api-digester re-emits foreign extension targets as type decls
  body: |
    swift-api-digester re-emits extension targets as foreign top-level type decls with `moduleName` pointing at the owning module (not the framework under extraction). Without a filter, `map_abi_to_framework` in `declaration_mapping.rs` attributes those extension members to the wrong framework; Datalog's `effective_method` rule then propagates the spurious methods to every conforming class. Fix: `is_foreign_module_type_decl()` drops top-level `Class`/`Protocol`/`Struct`/`Enum` nodes whose `moduleName` differs from the framework root name. `Func` and `Var` nodes always carry the correct owning module name and are unaffected. Canonical symptoms: CreateMLComponents methods leaking into ScriptingBridge; SwiftUI extension methods (`beginSheet`, `animate`) leaking into AppKit.
- id: effective-method-blast-radius-extractor-bugs-cascade-widely-via-protocol-propagation
  title: 'effective_method blast-radius: extractor bugs cascade widely via protocol propagation'
  body: |
    The resolve pass's `effective_method` Datalog rule (`analysis/crates/resolve/src/program.rs:132`)
    is intentionally permissive: any class conforming to a protocol picks up all of that protocol's
    `optional_methods`. This interacted badly with the foreign-module type-decl misattribution bug:
    a single misattributed extension (CreateMLComponents extending `Sequence`) cascaded into every
    SDK class conforming to `Sequence` — NSArray, NSData, NSDictionary, NSEnumerator in Foundation,
    CloudKit, IOBluetooth, OSLog, Photos, plus SBElementArray in ScriptingBridge.

    Implication for future extractor bugs: any spurious protocol method introduced at the extractor
    layer will propagate to *all* conforming classes via `effective_method`. Before assuming a bug is
    narrow in scope, check whether the affected type is a commonly-conformed protocol (Sequence,
    Collection, Hashable, Comparable, etc.). The blast radius may span many frameworks even if the
    extraction symptom manifests in only one framework.

    Fix must target the extractor filter (upstream), not the Datalog propagation rule — the
    propagation semantics are correct for legitimate protocol methods.
