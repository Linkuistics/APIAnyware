body: |
  ### Session 51 (2026-04-28T13:33:20Z) â€” Capture _SWIFT_UI_ACTOR from ObjC headers and audit LLM annotation redundancy

  - **What was attempted.** Three related tasks: (1) add ObjC-side MainActor macro capture to extract-objc so that `NS_SWIFT_UI_ACTOR`-decorated classes reach `ir::Class.swift_attributes` without relying on a hardcoded UI class list; (2) re-run the full pipeline workspace-wide to materialise both the new macro capture and the copy-block-setter `stored` heuristic from the prior cycle; (3) audit which frameworks' LLM annotations are now fully covered by heuristics.

  - **What worked.**
    - `detect_class_swift_attributes` in `collection/crates/extract-objc/src/extract_declarations.rs` scans lines above each `@interface` for `*_SWIFT_UI_ACTOR` / `*_SWIFT_MAIN_ACTOR` token patterns, covering NS/WK/CF/MP prefixes and any future framework aliases without code changes. The source-line scan approach was chosen after three libclang-native approaches failed (tokenize NULL-buffer abort, extent excludes pre-`@interface` lines, display_name always empty for swift_attr cursors).
    - Integration tests on Foundation added to `collection/crates/extract-objc/tests/extract_foundation.rs`: positive case (NSUndoManager has MainActor), negative case (NSString does not), unit tests for alias matcher.
    - Pipeline re-run confirmed 39 AppKit classes and 38 WebKit classes now pick up `swift_attributes: ["MainActor"]` from ObjC headers, feeding 16,106 heuristic-sourced `main_thread_only` annotations in AppKit.
    - LLM-merge precedence held: LLM-sourced annotation counts in AppKit unchanged (36 sync + 137 async + 25 stored).
    - `cargo test --workspace` clean.
    - Redundancy audit (`analysis/scripts/audit-llm-redundancy.py`, ~80 LOC): 52 frameworks where heuristic-only output matches merged output exactly â€” pure cost on next re-annotation cycle. ~1.82M token saving on full re-annotation. 7 orphaned frameworks where resolved IR has 0 classes (synthetic Swift-only cross-framework modules). Results documented in `analysis/scripts/llm-annotate-orchestration.md`.

  - **What didn't work / interesting failures.**
    - First redundancy-audit approach used `source == "llm"` in merged output as "LLM is additive" proxy â€” wildly overcounted because LLM precedence wins ties even when heuristic produces the same value. Pivoting to heuristic-only-vs-merged comparison gave the correct classification.
    - Three libclang-native approaches for attribute detection were abandoned (see results block on the extract-objc task for details). Source-line scan is the only safe and reliable route.

  - **What this suggests trying next.**
    - Investigate the 7 orphaned Swift-only frameworks (0 classes in resolved IR) â€” likely an extract-swift regression for synthetic cross-framework modules. Worth a standalone task.
    - Wire `audit-llm-redundancy.py` into the triage pre-hook or as a `make` target so framework skip-list stays current after any heuristic change.
    - Prune the hardcoded UI class list in `derive_threading` to UIKit-only names; every NS_SWIFT_UI_ACTOR-decorated AppKit class now reaches the heuristic via `swift_attributes`.

  - **Key learnings.**
    - libclang's `clang_tokenize` for `UnexposedAttr` cursors backed by macro expansions can return a NULL token buffer, causing a process abort across the `extern "C"` visitor boundary that `catch_unwind` cannot intercept.
    - The `ObjCInterfaceDecl` cursor extent starts at `@interface`, not at the preceding attribute macro lines; header source scanning is the only way to read those decorators.
    - Comparing heuristic-only vs merged output is a sharper LLM-redundancy test than counting `source == "llm"` in the merged output.
