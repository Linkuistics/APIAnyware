  ### Session 40 (2026-04-28T01:41:51Z) — Gate annotate checkpoint fallback to avoid heuristic re-tagging

  - **Attempted:** Fix the `annotate` checkpoint-fallback path (`analysis/crates/annotate/src/lib.rs:62-77`) so that heuristic-only reruns do not re-tag prior heuristic annotations as `source = Llm`. Surfaced in session 38 as a known bug; deferred from session 39.
  - **What worked:**
    - Renamed `load_existing_annotations` → `load_existing_llm_annotations` to signal that it returns only LLM/HumanReviewed entries.
    - Extracted `retain_llm_sourced(Vec<ClassAnnotations>) -> Vec<ClassAnnotations>` — pure helper that filters per-method, dropping any `source = Heuristic` entries, and prunes classes with no remaining methods.
    - The fallback now returns `None` when the prior checkpoint contains zero LLM-sourced entries, so a heuristic-only rerun produces only `source = Heuristic` annotations (no contamination).
    - Updated the call-site comment and `analysis/scripts/regenerate-stale-pipeline.sh` shell comment to document the renamed function and the filtering behaviour.
    - Six tests added in `#[cfg(test)] mod tests`: four unit tests for `retain_llm_sourced` covering the keep/drop/empty cases, plus two end-to-end tests for `load_existing_llm_annotations` (heuristic-only checkpoint → `None`; mixed checkpoint → only LLM entries returned). No `tempfile` crate dep — used `std::env::temp_dir()` with nanos disambiguation.
  - **What didn't work / wasn't attempted:** Nothing failed; task was well-scoped from the hand-off in session 39.
  - **What this suggests next:** Run the Foundation LLM annotation pass (unblocked after session 39's merge-clobber fix). The WebKit annotated checkpoint should be refreshed to pick up the merge-fix correction.
  - **Key learnings:** The `retain_llm_sourced` extraction kept the fix incremental and easy to test in isolation — the gating logic doesn't need to know about file I/O. Nanos-suffixed temp dir names in `std::env::temp_dir()` are a reliable substitute for `tempfile` when adding a crate dep is undesirable.
