body: |
  ### Session 37 (2026-04-28T00:01:04Z) — EventKit LLM calibration + durability strategy settled

  - **Attempted:** LLM annotation calibration run on EventKit (mixed annotation reasons: block params, error out-params, delegate/observer), then durability strategy decision based on the resulting cost data.
  - **What worked:**
    - EventKit selected as calibration target after surveying candidates: 19 flagged methods spanning all three reason categories simultaneously (8 `has_block_params`, 9 `error_out_param`, 2 `delegate_observer_pattern`).
    - Subagent run: 38,971 tokens / ~73s / 12 tool uses. All three reason categories exercised and passed `llm-validate` + `enrich` verification.
    - Heuristic vs LLM finding: for EventKit, the heuristic name-pattern matcher already classifies block/error patterns identically; the LLM pass was confirmatory rather than additive. Future calibration on a naming-pattern-defeating framework (e.g. WebKit, IOUSBHost) would surface the LLM's actual additive contribution.
    - Prompt-clarity fix applied to `analysis/scripts/llm-annotate-subagent.md`: explicitly state that classes with zero annotated methods must be omitted from `classes` entirely.
    - Durability decision: Option A chosen — `analysis/ir/llm-annotations/*.llm.json` versioned in git. Rationale: 154 frameworks × ~35k fixed tokens + 17,862 methods × ~500 marginal tokens ≈ 14M tokens to regenerate from scratch; storage cost is <1 MB total. `.gitignore` updated; orchestration doc updated with rationale + fresh-clone workflow + rejected-options section + EventKit cost table row.
  - **What didn't work / notable gaps:** EventKit is a weak test of LLM additive value because heuristic patterns cover it fully. No LLM-vs-heuristic delta observed.
  - **What this suggests next:**
    - Calibrate on a framework where heuristic naming patterns fail (WebKit, IOUSBHost, or similar) to measure LLM's actual additive contribution.
    - Matter framework (12,827 methods) is an outlier that needs class-level chunking if ever annotated.
    - The ~500 tokens/method marginal-cost estimate is based on small runs; a 100-method calibration would tighten it before committing to Foundation.
