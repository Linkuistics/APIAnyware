  ### Session 36 (2026-04-27T13:39:50Z) — Emitter contract doc and backlog audit close two collection tasks

  - **Attempted:** Two backlog tasks addressed — both closed as `done`.

  - **What worked:**
    - `ir-annotation-for-os-object-use-objc-typed-gcd-handles`: Resolved via documentation path (Option B endorsed by the task's own priority justification). The OS_OBJECT_USE_OBJC pattern bites only one framework (libdispatch); the manual per-emitter gate is already in place and tested. Rather than adding an IR-level annotation, a new cross-emitter contract doc was written at `generation/docs/emitter-contract.md` and cross-referenced from two natural choke points: the `FfiTypeMapper` trait doc in `generation/crates/emit/src/ffi_type_mapping.rs` and the existing inline comment in `generation/crates/emit-racket-oo/src/emit_functions.rs`. `README.md` documentation index updated. All tests (`cargo test` + `cargo clippy`) pass clean.
    - `cf-struct-globals-from-corefoundation-absent-from-collected-ir`: Already resolved — symptom did not reproduce. Full audit confirmed all 9 `kCF*CallBacks` struct globals are present in the collected IR and emitted correctly via the `is_struct_data_symbol → ffi-obj-ref` path. 663 struct globals across 20 frameworks are in scope; regression test `test_struct_typedef_global_uses_ffi_obj_ref` covers the key case. No code changes needed; closed with audit evidence.

  - **What this suggests trying next:** LLM annotation calibration run on a medium framework (`llm-annotation-calibration-run-on-medium-framework-mixed-annotation-reasons`) is the highest-priority unblocked item. Good candidates: `Network`, `EventKit`, or URLSession-adjacent material.

  - **Key learnings:**
    - Backlog task descriptions are hypotheses against the state at the time they were written. The CF struct globals task was stale — always verify a symptom against *current* IR before promoting to a work cycle.
    - The `generation/docs/emitter-contract.md` pattern (IR shape → mismatch → acceptable resolutions → cross-references → promote trigger) is the right template for future cross-language conventions (block lifecycle, error-pointer out-params, retain/release ownership).
