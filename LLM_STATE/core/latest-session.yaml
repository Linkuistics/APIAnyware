  ### Session 39 (2026-04-28T01:04:35Z) — Fix parameter_ownership merge-clobber in validate::merge_annotations

  - **Attempted:** Fix the `parameter_ownership` whole-list clone in `validate::merge_annotations` that silently dropped heuristic ownership annotations for params the LLM didn't annotate (surfaced in session 38 WebKit calibration: 66 → 15 entries).
  - **What worked:** Replaced the bare `llm_ann.clone()` with a per-param union: clone the LLM list (preserving LLM precedence on conflicts), then append any heuristic entry whose `param_index` isn't already present. Two regression tests added: `test_merge_parameter_ownership_per_param_union` (heuristic params 0+2, LLM param 1 → merged has all 3) and `test_merge_parameter_ownership_llm_precedence_on_conflict` (conflict on param 0 → LLM wins). End-to-end WebKit validation: 67 ownership annotations post-fix (vs 66 heuristic-only, 15 pre-fix), matching acceptance criteria. `cargo test --workspace` 56/56, clippy clean.
  - **What didn't work / wasn't attempted:** The secondary sub-task (gating the existing-checkpoint fallback in `lib.rs:62-77` to avoid re-tagging stale annotations as `source = Llm`) was deliberately left for a separate task — orthogonal to the merge logic.
  - **What this suggests next:** Run the Foundation LLM annotation pass (now unblocked). Address the `lib.rs` checkpoint-fallback source-tagging issue in a follow-up task.
  - **Key learnings:** The per-param union pattern (start from LLM clone, append heuristic for missing indices) composes cleanly with the existing empty-fallback philosophy for scalar fields — no special-casing needed for the conflict path since LLM entries are already in the clone.
