body: |
  ### Session 48 (2026-04-28T11:25:47Z) — Fix Swift extension method misattribution in methods extractor

  - Investigated root cause of `SBElementArray.mapAnnotations(_:)` / `mapFeatures(_:)` appearing in ScriptingBridge IR despite those methods belonging to `CreateMLComponents`.
  - Root cause confirmed: `swift-api-digester -dump-sdk -module X` re-emits any external type X extends as a top-level decl with `moduleName` pointing at the owning module. Pre-fix, the extractor walked these nodes indiscriminately, storing extension members in framework X's IR as if X declared them. At resolve-time, Datalog's `effective_method` rule then propagated those methods to every conforming class across all SDK frameworks.
  - Fix applied in `collection/crates/extract-swift/src/declaration_mapping.rs`: added `is_foreign_module_type_decl()` helper and early-continue in `map_abi_to_framework` to drop top-level `Class`/`Protocol`/`Struct`/`Enum` decls whose `moduleName` differs from the framework root name. Functions and Vars are unaffected (they always carry the correct owning module name).
  - Four synthetic tests added in `collection/crates/extract-swift/tests/declaration_mapping.rs` covering: foreign Protocol skipped, foreign Struct skipped, own protocol with matching module kept, decl without moduleName kept (defensive).
  - The fix also covers SwiftUI → AppKit leakage (`beginSheet`, `animate` etc.) and any other framework-extension pattern with the same shape.
  - Next: re-run extraction pipeline for affected frameworks (CreateMLComponents, SwiftUI, and any framework that extends foreign types), re-run resolve + LLM annotation, and validate `SBElementArray` no longer carries the spurious methods.
