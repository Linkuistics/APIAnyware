  ### Session 43 (2026-04-28T03:50:00Z) — AppKit LLM annotation pass

  - **What was attempted:** Ran the AppKit LLM annotation pass following the established subagent dispatch workflow: refreshed llm-summaries via `llm-extract --only AppKit`, captured a heuristic-only baseline, dispatched a single Claude Code subagent with the `llm-annotate-subagent.md` template, re-annotated and enriched, and appended a row to the runs table.

  - **What worked:**
    - Subagent wrote `analysis/ir/llm-annotations/AppKit.llm.json`; `llm-validate` passed first run (138 classes / 437 methods). `enrich --only AppKit` verification passed before and after merge.
    - Cost came in 28% under projection (119,969 tokens vs 166k projected by 35k + 524×250). The 35k + N × 250 budget rule continues to hold; AppKit and Foundation both run 28–60% under the older 534/method WebKit figure, confirming the WebKit figure was a small-batch artifact.
    - **Block-invocation re-classification** was the headline win: heuristics had 0 `stored` block annotations; LLM identified 25 stored handlers and demoted 47 async → 22 sync + 25 stored. `enrich` stored_blocks count: 0 → 25. These matter for Racket binding generation because `stored` blocks need GC-prevention pinning that `async_copied` blocks don't.
    - Threading additive: +278 (15605 → 15883 method-level entries); per-class `main_thread_classes` 73 → 142.

  - **What didn't / surprised:**
    - Threading delta was smaller than the WebKit-calibrated expectation because heuristics now propagate class-level `NS_SWIFT_UI_ACTOR` to methods — the LLM is supplementing rather than discovering threading annotations.
    - Ownership delta effectively zero (+1 method): AppKit's delegate setters overwhelmingly follow the `setDelegate:`/`setDataSource:` naming pattern that heuristics already classify correctly.
    - 9 modal-completion-callback selectors deliberately left unannotated because Apple headers carry no explicit retention attribute on the callback target.

  - **What this suggests trying next:**
    - The post-Foundation-fix merge logic is empirically sound at 524-method scale — the WebKit-era parameter_ownership clobber bug is definitively gone.
    - Block-invocation re-classification is the consistent per-framework LLM win. Future framework selection should weight "headers with NS_NOESCAPE / `@property (copy)` block setters" alongside threading attributes.
    - Next high-value candidates: **CoreData** (ownership/error patterns, rich delegate-and-observer surface) or **AVFoundation** (block lifecycle, large completion-handler and stored-observer surface). Threading prior is now empirically lower-yield than block-invocation prior on most frameworks.
