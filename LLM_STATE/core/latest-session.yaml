  - Bootstrapped website content (`website/index.md`, `website/meta.yml`).
  - Migrated all LLM_STATE plan files to typed YAML format (ravel-lite); created per-app state directory `LLM_STATE/apps/modaliser-racket/`. Path references throughout LLM_STATE documentation migrated from `LLM_CONTEXT/` to `Ravel-Lite/`.
  - Improved Rust generation crates: `bundle-racket-oo` gained Info.plist override support and stable codesigning tests; `stub-launcher` gained codesigning module; `emit-racket-oo` golden tests expanded with 7 new snapshot files.
  - Promoted 5 collection/emission gap tasks to the core backlog (bare c:@<name> macro USR filter, anonymous-enum leak, GCD OS_OBJECT annotation, CF struct globals, protocol-inherited methods) — all surfaced during app development; all not_started, low-to-medium priority.
  - What this suggests trying next: run the triage cycle to assign priority to the 5 new core tasks; Modaliser live VM shake-down (modaliser-racket backlog Task 26 Step 6) gated on GUIVisionVMDriver spec-v1 log tailer support.
