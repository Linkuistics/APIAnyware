- id: 2026-04-16-attempted-ffi-main-thread-rkt-migration-reverted-pending-upstream-fix
  timestamp: 2026-04-16T00:22:40Z
  phase: work
  body: |
    **Attempted ffi/main-thread.rkt migration, reverted pending upstream fix**

    - **Attempted:** Verify Task #7b/#7c upstream status, then execute Task #7b
      (main-thread.rkt FFI migration). User confirmed upstream work may have
      landed.
    - **Upstream audit:** Both tasks unblocked on the library-coverage axis as
      of APIAnyware 2026-04-15.
      `bindings/generated/oo/libdispatch/functions.rkt` exports
      `dispatch_async_f`, `dispatch_after_f`, `dispatch_time`, `pthread_main_np`.
      `libdispatch/constants.rkt` exports `_dispatch_main_q`.
      `applicationservices/functions.rkt` exports the full AX function family
      (`AXIsProcessTrusted*`, `AXUIElement*`, `AXValue*`) plus the
      `kAXTrustedCheckOptionPrompt` global. Remaining `kAX*` attribute names are
      still `CFSTR("...")` macros — keep runtime pre-allocation pattern.
    - **Pre-migration probe caught a generator bug:** `_dispatch_main_q` is
      declared `extern struct dispatch_queue_s _dispatch_main_q;` — the symbol
      IS the struct, and `dispatch_get_main_queue()` is a C macro taking
      `&_dispatch_main_q`. The generated
      `(get-ffi-obj '_dispatch_main_q _fw-lib _pointer)` reads the first 8 bytes
      *at* the symbol and returns them as a pointer — correct for
      `CFStringRef kFoo` (symbol's memory IS a pointer) but wrong for struct
      globals. Empirically confirmed: `ffi-obj-ref` and `dlsym` agree on one
      address X, the generated constant returns different bytes Y.
    - **Migration attempted, then reverted:** Drafted the migration using
      `(only-in libdispatch/functions.rkt ...)` for the four functions and a
      local `(cast (ffi-obj-ref #"_dispatch_main_q" libSystem) _pointer _id)`
      workaround for `_dispatch_main_q`. Required two follow-up fixes along the
      way:
      1. `ffi-obj-ref` returns a `#<cpointer/ffi-obj>`-tagged pointer that
         `id->C` rejects; stripping to plain `_pointer` still rejected.
         Resolved by casting to `_id` (the ObjC ctype tag).
      2. `_id` is not exported by `ffi/unsafe`; needs `ffi/unsafe/objc`.
      Full test suite passed (26/26) with the workaround in place.
      **Per explicit user direction, the migration was then reverted** — the
      goal of Task #7 is to replace hand-written FFI with clean generated
      requires, and introducing a new local workaround contradicts that.
      `ffi/main-thread.rkt` is now back to its original dlsym block, but with
      an explanatory header comment pointing at the two upstream blockers.
    - **Upstream filings (still pending as of session end):** Two entries
      added to APIAnyware racket-oo backlog under "Bug Fixes and Cleanup":
      1. **Struct-typed data symbols emitted as ptr-ref instead of symbol
         address.** Affects `_dispatch_main_q` today; likely also affects
         every `_dispatch_data_empty`, `_dispatch_queue_attr_concurrent`, and
         `_dispatch_source_type_*` entry in `libdispatch/constants.rkt`. Fix:
         when IR records a data global's type as a struct, emit
         `(ffi-obj-ref 'foo _fw-lib)` instead of
         `(get-ffi-obj 'foo _fw-lib _pointer)`.
      2. **Ergonomics follow-up:** dispatch queue params typed `_id` force raw
         cpointer callers to `(cast ptr _pointer _id)`. Options outlined:
         emit `_pointer` for `DISPATCH_DECL`-style OS-object types, export an
         `as-id` helper from the framework, or document the idiom.
    - **Modaliser-side records:** Task #7b re-flagged as blocked (not done),
      with a detailed dependencies block pointing at the two upstream issues
      and a documented "migration shape once unblocked" so the next session
      has a straight path. Task #7c (`accessibility.rkt` + `permissions.rkt`)
      remains unblocked — the AX family is clean generated functions with no
      struct-global dependency. Memory updated with the struct-data-symbol
      bug class and the `_id` vs `_pointer` friction; both are worth knowing
      for any future FFI migration.
    - **What worked:** The pre-migration empirical probe (comparing
      `ffi-obj-ref` / `dlsym` / `get-ffi-obj` return values) caught the
      generator bug before committing a subtle runtime failure. The
      `test-main-thread.rkt` unit test would NOT have caught it — it only
      exercises the synchronous path where `main-queue` is never touched.
      The integration test (`test-integration-keyboard-capture.rkt`) is
      where the `_id` rejection surfaced.
    - **What didn't work on the first try:** Assuming `ffi-obj-ref`'s
      tagged pointer would pass through the `_id` contract. Required two
      successive casts (strip tag, then add `_id` tag) — the second only
      works because `_id` is a ctype applied as a type conversion, not a
      runtime class check.
    - **Suggests next:** Task #7c (accessibility + permissions migration)
      is the clean next step — two files, 9+ AX functions, no struct-global
      dependencies visible in the audit. `AXValueCreate`/`AXValueGetValue`
      pair has out-params that will need careful handling. `kAX*` attribute
      names stay runtime-constructed via `CFStringCreateWithCString`.
      When Task #7b's upstream blockers land, returning to it is a
      near-trivial `only-in` swap — see the backlog's "migration shape once
      unblocked" section.
    - **Key learnings:**
      - **`ffi-obj-ref` is the right primitive for taking symbol addresses**
        without dereferencing. Matches `dlsym` semantics. Use when the
        symbol IS a struct and callers want `&symbol`.
      - **`_id` ctype tagging is purely syntactic**, achievable by
        `(cast ptr _pointer _id)`. No runtime class check. Works for any
        pointer that happens to be an ObjC object at the C ABI level.
      - **Generator type decisions propagate contract friction**: typing
        `dispatch_queue_t` as `_id` is defensible from the header but forces
        every raw-pointer caller to cast.
      - **Unit tests that don't exercise the full code path miss FFI bugs.**
        `test-main-thread.rkt`'s sync path never invokes `main-queue`; async
        bugs only surface under the real NSApp loop in the integration test.
      - **"Wait for upstream" is a valid answer.** The attempted workaround
        was functionally correct and tests passed, but it introduces exactly
        the kind of hand-written glue Task #7 exists to eliminate. Reverting
        and waiting for the generator fix keeps the migration endpoint clean.
