sessions:
- id: 2026-04-10-full-implementation-phases-1-9
  timestamp: 2026-04-10
  phase: work
  body: |
    **Full Implementation (Phases 1-9)**

    ### Phase 1 Learnings
    - Binding symlinks via `bindings/` directory work cleanly -- all modules use relative paths like `"../bindings/runtime/objc-base.rkt"`.
    - `nsapplication-set-activation-policy!` and `nsapplication-set-delegate!` return values that print to stdout; wrap with `(void ...)` to suppress.
    - Racket block-buffers stdout when piped; use `(file-stream-buffer-mode (current-output-port) 'line)` for visible logging during development.
    - The generated `nsmenuitem-separator-item` binding is incorrect (treats the class method as an instance bool property). Use `(tell NSMenuItem separatorItem)` directly instead.
    - Menu target-action pattern with `make-delegate` works well: create one delegate with methods for each action, set as target on each NSMenuItem.
    - SF Symbol `"keyboard"` works for status bar icon via `nsimage-image-with-system-symbol-name-accessibility-description`. Must call `nsimage-set-template!` for dark/light mode adaptation.
    - NSStatusBarButton (from `nsstatusitem-button`) inherits `setImage:` from NSButton -- use raw `tell` with `coerce-arg` since the method is inherited.

    ### Phase 2 Learnings
    - CGEvent tap FFI works via `ffi/unsafe` with `_cprocedure` and `function-ptr` for the C callback. The callback proc and function pointer must be held at module scope to prevent GC.
    - `CGEventTapCreate` returns NULL if accessibility not granted -- handle gracefully.
    - The Racket process (`racket`) already has accessibility permissions on this machine -- `AXIsProcessTrusted` returns `#t`. No prompt needed for dev testing.
    - `kCFRunLoopCommonModes` is a global `CFStringRef` loaded via `get-ffi-obj` as `_pointer` -- this correctly dereferences the global variable.
    - `AXIsProcessTrustedWithOptions` requires a CFDictionary with `kAXTrustedCheckOptionPrompt: kCFBooleanTrue`. Built via `CFDictionaryCreate` with inline `malloc`'d key/value arrays -- simpler than going through ObjC.
    - `core/keymap.rkt` is self-contained (no FFI dependency) -- modifier constants are just hardcoded hex values. This keeps the module testable without loading CoreGraphics.
    - Phase 1 code review found no critical issues. Applied fixes: comment on raw `tell` usage, guard `HOME` env var, wrap subprocess errors in `open-settings!`.

    ### Phase 2R Learnings
    - No critical issues found in Phase 2.
    - Fixed: `stop-keyboard-capture!` now calls `CFRelease` on the event tap and run loop source to prevent memory leaks, and clears callback-fptr/proc/handler to allow GC of the callback closure.

    ### Phase 3 Learnings
    - Breaking circular dependencies between state-machine <-> event-dispatch: use hook functions. state-machine.rkt exposes `set-modal-key-handler!`, `set-keyboard-hooks!`, `set-overlay-hooks!`. event-dispatch.rkt wires these during module initialization. One-way dependency: event-dispatch -> state-machine.
    - Similarly, dsl.rkt needs hotkey registration but can't depend on event-dispatch (which depends on dsl.rkt's tree building). Solved via `set-leader-hooks!`.
    - Racket module-level `set!`'d variables ARE visible to importers -- the binding is shared. So `modal-active?` exported from state-machine.rkt correctly reflects the current state in event-dispatch.rkt.
    - `after-delay` implemented as `(thread (lambda () (sleep s) (callback)))` for Phase 3. This runs on a background thread -- fine for stub overlay hooks, but Phase 4 will need main-thread scheduling for UI updates.
    - `assoc` in Racket uses `equal?` by default, which works for symbol keys in alist nodes. No change needed from the LispKit original.
    - `#lang racket/base` module bodies DO print non-void top-level expressions. Wrap bare function calls in `(void ...)` when the return value is unneeded.
    - `focused-app-bundle-id` stubbed as `(lambda () #f)` -- Phase 6 implements via NSWorkspace/NSRunningApplication bindings.

    ### Phase 3R Learnings
    - CRITICAL fix: `dsl.rkt` now re-exports keycode constants with short aliases (`F17`, `F18`, `ESCAPE`, `RETURN`, etc.) via `rename-out`. The user's config.scm uses bare `F17`/`F18` identifiers. Without these aliases, config loading would fail with unbound identifier errors.
    - Fixed: removed dead `unless` block in `event-dispatch.rkt`'s `master-key-handler` (lines 110-114 were a no-op -- both branches evaluated `(void)`).
    - Noted for Phase 4+: `after-delay` thread safety concern acknowledged -- the generation counter in `modal-show-overlay-delayed` mitigates stale callbacks, but main-thread dispatch will be needed for UI operations.

    ### Phase 4 Learnings
    - Used Racket's `struct` for `raw-html` wrapper instead of cons-tag pattern from original. Struct gives free predicate/accessor, plus `#:transparent` for testing. Added `make-raw-html` alias for API compatibility with original overlay.scm.
    - `racket/base` doesn't include `string-contains?` -- need `racket/string`. Similarly, `string-contains?` returns `#t/#f` (not position index) unlike some Scheme implementations. Use `regexp-match-positions` for position-based checks.
    - The generated `nsscreen.rkt` binding has a duplicate `nsscreen-cg-direct-display-id` definition that prevents loading. Workaround: use raw `tell NSScreen mainScreen` and `tell #:type _NSRect screen visibleFrame` instead of the generated binding.
    - `define-runtime-path` from `racket/runtime-path` is the correct way to reference sibling resource files (base.css, overlay.js) so they work both in source and when compiled/packaged.
    - Type constructors from `type-mapping.rkt` are lowercase: `make-nsrect`, `make-nspoint`, `make-nssize` -- not CamelCase `make-NSRect`.
    - WKScriptMessageHandler delegation works via `make-delegate` with selector `"userContentController:didReceiveScriptMessage:"`. The message body arrives as an NSDictionary when JS posts an object -- extract values via `objectForKey:` / `UTF8String` / `doubleValue`.
    - Panel resize (keeping top edge fixed) requires adjusting `origin.y` by the height delta -- Cocoa's coordinate system has origin at bottom-left.

    ### Phase 4R Learnings
    - GC roots must be per-panel, not a global ever-growing list. Fixed: `gc-root!` now takes the panel id, stores roots in `panel-gc-roots` hash, and `gc-unroot-panel!` is called in `close-panel!` to release them.
    - `js-escape-overlay` must escape `\r` and `\t` in addition to `\\`, `"`, `\n` for valid JSON string generation. Added both.
    - ObjC nil pointer handling: avoid messaging nil by checking `objc-nil?` before sending `UTF8String` or `doubleValue`. Extracted shared `objc-nil?` predicate.
    - `show-overlay` was passing `#:shadow #t` to `create-panel!`, but the shadow parameter is forced to `#f` when `#:transparent` is `#t`. Removed the misleading parameter to match actual behavior.
    - The `after-delay` thread safety concern remains: overlay show/update hooks called from delayed callbacks run on background threads, but WKWebView operations need the main thread. Tracked for Phase 8/9 integration.

    ### Phase 5 Learnings
    - AX attribute string constants (kAXWindowsAttribute etc.) are C macros (`CFSTR("AXWindows")`), not exported symbols. Must create via `CFStringCreateWithCString`, not `get-ffi-obj`.
    - AX functions live in HIServices (sub-framework of ApplicationServices). On modern macOS, load HIServices to pull symbols into the shared cache, then resolve via `(ffi-lib #f)` (RTLD_DEFAULT).
    - `CFNumberGetValue` needed for CGWindowList dict values -- can't use `tell ... integerValue` on raw pointers (ObjC bridge requires wrapped _id). Similarly, `cfstring->string` needs `CFStringGetCStringPtr`/`CFStringGetCString` instead of `tell ... UTF8String` on raw pointers.
    - CF memory management is critical for a long-running menu-bar app. `AXUIElementCopyAttributeValue` follows the Create/Copy rule -- caller must `CFRelease`. Applied to: AXValue from get-position/get-size, CFString from get-title/get-subrole, CFBoolean from is-minimized?/is-fullscreen?, CFArray from get-windows (with CFRetain on borrowed elements), AXValue from set-position!/set-size!.
    - `focus-window` must set kAXMain, kAXFocused, AND kAXRaise -- all three are needed for multi-window apps to correctly switch to the target window.
    - `screen-containing-ax-point` converts each screen frame to AX coordinates before comparing -- more correct than the Swift original which mixes coordinate systems on multi-screen setups.

    ### Phase 5R Learnings
    - Review found 3 critical (focus-window missing attributes, CF leaks from CopyAttributeValue, CF leaks from AXValueCreate), 5 important, 5 minor issues. All critical and most important issues fixed.
    - Remaining tracked items: `save-window-frame!` uses indirect PID lookup via NSWorkspace (potential race) -- should switch to AX-based PID extraction. `restore-window` fullscreen delay has no concurrent-command guard.

    ### Phase 6 Learnings
    - `port->string` is in `racket/port`, not `racket/base`. Both `app-scanner.rkt` and `shell.rkt` needed explicit `(require racket/port)`. Easy to miss because `#lang racket` includes it but `#lang racket/base` does not.
    - **Critical hash table bug**: `hasheq` (eq? identity comparison) must NEVER be used with string keys from dynamic sources. `string-downcase` always creates a new string object, so `(hash-ref (hasheq "a" 1) (string-downcase "A") #f)` -> `#f`. Use `hash` (equal? comparison) for string keys. This also affects keymap.rkt's `char-table` (built with `for/hasheq`) -- it works when callers pass string literals (which may be interned) but breaks with constructed strings. cgevent-emitter.rkt builds its own `equal?`-based `char-keycode-table`.
    - `rackunit`'s `check-true` requires exactly `#t`, not just truthy values. `(check-true (member "x" xs))` fails when `member` returns a non-empty list. Use `check-not-false` for truthy checks.
    - NSPasteboard string type is the UTI `"public.utf8-plain-text"` -- passed as a plain Racket string, auto-coerced to NSString by `coerce-arg`.
    - `nspasteboard-string-for-type` returns a wrapped ObjC object. To get a Racket string, send `UTF8String` via `tell #:type _string`. Check for nil first.
    - HTTP via `net/url` (Racket stdlib) is simpler and more portable than NSURLSession via ObjC bindings. `get-pure-port` handles redirects with `#:redirections`.
    - `run-shell-async` timeout uses a watchdog thread pattern: spawn a second thread that sleeps then kills the subprocess. If the process finishes first, kill the watchdog with `kill-thread`. Semaphore-based process tracking (`processes-lock`) prevents race conditions in `terminate-all-processes!`.
    - CGEvent emission requires `CFRelease` on source, key-down, and key-up events. `CGEventSourceCreate` can return NULL (rare), so guard before CFRelease.
    - App scanner uses batch `mdls` call (via `mdfind -0 | xargs -0 mdls`) instead of one `defaults read` per app. 670 apps in ~550ms vs ~6s.
    - All 5 new Phase 6 test suites pass, plus integration test verifying end-to-end wiring: DSL tree -> modal dispatch -> service execution -> result capture.

    ### Phase 6R Learnings
    - Review found 2 critical, 4 important, 3 minor issues. All fixed.
    - **CRITICAL: Subprocess pipe deadlock** -- `subprocess-wait` before draining stderr causes deadlock if child fills the pipe buffer (~64KB). Fix: always `port->string` both stdout and stderr BEFORE `subprocess-wait`. This is the classic pipe deadlock pattern and affects shell.rkt and app-scanner.rkt.
    - **CRITICAL: CF object leak on FFI exception** -- `CGEventPost` could theoretically raise through FFI, leaking `CGEventSource` and `CGEvent` objects. Fix: wrap post+release in `dynamic-wind` to ensure cleanup on any exit path.
    - **IMPORTANT: App scanner performance** -- Spawning 600+ `defaults read` subprocesses is O(n) blocking. Rewritten to use a single `mdfind -0 | xargs -0 mdls` pipeline. 10x faster.
    - **IMPORTANT: Duplicate `objc-nil?`** -- `pasteboard.rkt` shadowed the canonical `objc-nil?` from `objc-base.rkt`. Removed the local copy.
    - **IMPORTANT: Port leak in http.rkt** -- `get-pure-port` returns a TCP connection. If `port->string` throws mid-stream, the port was never closed. Fix: `dynamic-wind` ensures `close-input-port` on all exit paths.
    - `call-with-port` (R7RS) is not available in `racket/base`. Use `dynamic-wind` as the Racket equivalent for guaranteed resource cleanup.
    - `(> modifiers 0)` should be `(not (zero? modifiers))` -- the former could theoretically fail if a `_uint64` FFI value overflows to negative in Racket's fixnum representation. Fixed to `(unless (zero? modifiers) ...)`.

    ### Phase 7 Learnings
    - **Fuzzy matcher DP algorithm**: Ported faithfully from FuzzyMatcher.swift. Key Racket choices: `make-vector` for O(1) DP table access (lists would be O(n)), `MIN-SCORE = -(2^30)` stays in fixnum range avoiding bignum allocation. `string->vector` converts strings once upfront for O(1) character access.
    - **Word-boundary bonus can beat consecutive bonus**: In the DP algorithm, matching after a separator (`/`, `_`, `-`) gives bonus 8-9, while consecutive bonus is only 4. With gap penalty -3, the net gap-with-boundary score (+5) can exceed consecutive (+4). This is correct behavior -- matching word starts is more valuable than consecutive mid-word characters.
    - **Match-proportion bonus**: Applied in `fuzzy-filter` (not `fuzzy-match`): `adjusted-score = raw-score + (query-len * 100 / target-len)`. This makes short targets rank higher when query coverage is proportionally larger.
    - **Chooser message handler dual dispatch**: The handler accepts both ObjC NSDictionary bodies (production, via `objc-dict-get`) and Racket alists (testing, via `(pair? body)`). This makes the full message dispatch testable without ObjC.
    - **`panel-manager.rkt` exports expanded**: Added `objc-dict-get` and `objc-dict-get-number` to the provide list for chooser.rkt's message extraction. Used `dynamic-require` in chooser.rkt to avoid circular load issues.
    - **Async search with generation counter**: Same pattern as ChooserSearchEngine.swift and overlay delay timer. Each new search increments a generation; background thread checks `(= gen chooser-search-generation)` at each step to abandon stale work.
    - **CSS class names appear in stylesheets**: Tests checking for absent HTML elements must not match against CSS class names in `<style>` blocks. Use content-based checks like `">Actions<"` instead of class-based checks like `"chooser-actions"`.
    - `highlight-matches` splits text into per-character spans, so the original string (e.g., "Safari") doesn't appear contiguously in rendered HTML. Tests must check for fragments ("fari") or match spans, not the full string.
    - All 3 test suites pass (22 fuzzy-match tests, 22 chooser-render tests, 8 integration tests) plus all prior phase tests remain green.

    ### Phase 7R Learnings
    - Review found 2 critical, 2 important, 3 minor issues. All fixed.
    - **CRITICAL: `file-roots` selector property silently ignored** -- User's config.scm uses `'file-roots (list "~")` for "Find File" selector, but `open-chooser` only checked for `source` and `dynamic-search`. Fix: added `file-roots` branch that calls an `index-files-fn` hook (set by services layer, similar to how overlay hooks break circular dependencies).
    - **CRITICAL: Race on `chooser-filtered`** -- Background search thread wrote `chooser-filtered` before pushing JSON to JS. If `toggle-actions` fired between the write and JS push, action panel rendered stale data. Fix: moved `set! chooser-filtered` to after the final generation check, immediately before `panel-eval-js!`. Both writes now happen in an uninterrupted sequence.
    - **IMPORTANT: Unnecessary `dynamic-require`** -- `dict-get-string`/`dict-get-number` wrappers called `dynamic-require` on every JS message despite `panel-manager.rkt` already being imported. Fix: replaced with direct aliases (`define dict-get-string objc-dict-get`).
    - Removed dead `setSelectedIndex` function from `chooser.js` (never called).
    - Renamed `exact-nonneg-int` to `nonneg-number?` (old name was misleading -- it accepted non-integer floats).
    - Noted: `'remember` and `'id-field` properties from config.scm are silently ignored (MRU ordering). This is a Phase 8 compatibility item, not a Phase 7 bug.

    ### Phase 8 Learnings
    - **Zero config syntax changes needed**: The user's config.scm loads directly into Racket without any modifications. LispKit and Racket share enough core forms (`define`, `lambda`, `list`, `assoc`, `cdr`, `cons`, `string-append`) that the config "just works" when evaluated in a `make-base-namespace`.
    - **Config loader pattern**: `make-base-namespace` + `namespace-set-variable-value!` for each DSL/service binding, then `(parameterize ([current-namespace ns]) (load path))`. This gives a flat namespace similar to LispKit's global environment, sidestepping Racket's module system differences entirely.
    - **`send-keystroke` signature mismatch was the critical bridge**: Config uses `(send-keystroke '(cmd) "t")` (modifier-list first, key second), but the FFI emitter uses `(send-keystroke "t" numeric-flags)` (key first, flags second). Solved with `config-send-keystroke` wrapper that reorders args and calls `parse-modifier-symbols`.
    - **App scanner key format mismatch**: Internal format uses `'name`, `'bundle-id` (kebab-case symbols), but config.scm expects `'text`, `'bundleId` (chooser format + camelCase). `find-installed-apps` in util.rkt translates between formats.
    - **`uri-encode` is in `net/uri-codec`**, not `net/url-string`. Easy to confuse with `net/url` which provides URL parsing but not encoding.
    - **Google Suggest API** (`suggestqueries.google.com/complete/search?client=firefox`) returns clean JSON: `["query", ["sugg1", "sugg2", ...]]`. Racket's `json` library parses it directly -- no hand-written parser needed unlike the Swift original.
    - **`define-runtime-path` syntax**: Accepts string literals (`"../main.rkt"`) but NOT `(build-path 'up "main.rkt")` -- the path expression must be evaluable at compile time without additional imports.
    - `'remember` and `'id-field` selector properties remain unimplemented (MRU ordering for chooser results). Low priority -- functional without them.
    - All 14 test suites pass (4 unit + 5 integration + 4 prior unit + 1 config loading).

    ### Phase 8R Learnings
    - Review found 3 critical, 5 important, 3 minor issues. All critical and important issues fixed.
    - **CRITICAL: `unless`/`when` non-return pattern** -- Used in both `load-config!` and `relaunch!`. Racket's `unless`/`when` are conditional expressions, not early-return statements. `(unless cond (void))` does NOT prevent subsequent code from executing. Fix: restructured both to use `cond` with exclusive branches.
    - **CRITICAL: Success message outside `with-handlers`** -- `"config loaded successfully"` printed even after a config eval error because it was at the same level as the `with-handlers` form. Fix: moved inside the handler body, after `(load path)`, so it only prints on success.
    - **CRITICAL: Duplicate config path logic** -- `lifecycle.rkt` used `getenv "HOME"` while `config-loader.rkt` used `find-system-path 'home-dir`. Fix: canonical `modaliser-config-path` defined in lifecycle.rkt, imported by config-loader.rkt.
    - **IMPORTANT: Web search stale query race** -- Rapid typing could cause an older HTTP callback to overwrite newer results. Fix: `current-search-query` box tracks the latest query; background callback checks `(equal? (unbox current-search-query) my-query)` before calling the callback.
    - **IMPORTANT: `shell-quote` type guard** -- Added `string?` validation to prevent unhelpful contract violations deep in `regexp-replace*` when non-strings are passed by misconfigured config.scm.
    - **IMPORTANT: Security documentation** -- Added explicit note in config-loader.rkt that config.scm runs with full user privileges (run-shell, http-get access).
    - `with-input-from-string` (from `racket/port`) is the idiomatic way to read JSON from a string without leaking a port object. Avoids GC pressure in hot loops.

    ### Phase 9 Learnings
    - **Launcher script approach**: For a personal-use menu-bar app, a shell script launcher (`#!/bin/bash` -> `exec racket main.rkt`) is simpler and more maintainable than `raco exe` (which bundles the entire Racket runtime). Trade-off: requires Racket installed, but allows live editing and avoids FFI dylib embedding complexity.
    - **`realpath` for symlink resolution**: `readlink` returns relative paths on macOS. When resolving binding symlinks for the bundle, `realpath` gives absolute paths. `cd + readlink + pwd` fails when the relative path isn't resolved from the right working directory.
    - **Binding symlinks use absolute paths in bundle**: The built .app is tied to this machine's directory layout (APIAnyware-MacOS location). A distributable version would need to copy bindings and fix dylib `@rpath`.
    - **main.rkt fully wired in Phase 9**: Previous phases left main.rkt minimal (Phase 1 version with only `setup-status-bar!`). Full bootstrap added: permissions check -> overlay/chooser hook wiring -> keyboard dispatch start -> config loading. Also added `stop-keyboard-dispatch!` in `applicationWillTerminate:` for clean shutdown.
    - **`exec` in launcher script**: `exec /opt/homebrew/bin/racket ...` replaces the shell process with racket, so racket becomes the actual PID. Important because macOS TCC checks the calling process for accessibility permissions.
    - **Code signing**: Reuses the same "Modaliser Dev" certificate pattern from the Swift original. Stable identity preserves TCC permissions across rebuilds. Falls back to ad-hoc signing (`codesign --force --sign -`) if certificate not found.
    - **Icon generation**: `sips` + `iconutil` convert a single PNG to multi-resolution .icns. The 5 base sizes (16/32/128/256/512) plus @2x variants give 10 PNGs.
    - All 14 test suites continue to pass after main.rkt bootstrap wiring.

    ### Phase 9R Learnings (Final Review)
    - Review found 3 critical, 6 important, 5 minor issues. All critical and important issues fixed.
    - **CRITICAL: Dynamic search callback arity** -- `chooser-dynamic-search` was called with 1 arg (`query`) but `web-search-handler` expects 2 (`query`, `callback`). Google Search selector would crash at runtime. Fix: pass `chooser-push-results` as the callback argument.
    - **CRITICAL: CF object leaks in list-windows** -- `ax-app-element` (Create rule) and `ax-get-windows` (CFRetain'd elements) were never released. Fix: added `cf-release!` for all window elements and app elements after each app's loop in both `list-windows` and `focus-window`.
    - **CRITICAL: CFString leaks in focus-window** -- `(cfstring "AXMain")` etc. created new CFStrings on every call. Fix: use pre-allocated `kAXMainAttribute`/`kAXFocusedAttribute` constants from accessibility.rkt (added to provide list).
    - **IMPORTANT: `for/hasheq` in keymap.rkt** -- `eq?`-based hash fails with dynamically-constructed strings. Changed to `for/hash` (`equal?`-based).
    - **IMPORTANT: Bootstrap after accessibility denied** -- App continued to start keyboard dispatch and load config even when accessibility was denied. Fix: wrapped steps 3-5 in `(when trusted? ...)`.
    - **IMPORTANT: Bundle ID mismatch** -- `window-manager.rkt` used `"com.modaliser.racket"` but Info.plist used `"dev.antony.Modaliser-Racket"`. Self-exclusion from window lists would fail. Fixed to match Info.plist.
    - **Upgraded to `raco exe --gui --launcher`**: Replaced shell script launcher with a proper Mach-O arm64 binary. `raco exe --gui` produces a GRacket-based .app bundle. The `--launcher` flag creates a launcher binary that loads main.rkt at runtime, avoiding module embedding issues with FFI-heavy bindings. The non-launcher mode (`raco exe` without `--launcher`) failed with `#%embedded:bindings/runtime/coerce` namespace mismatch error due to complex FFI module instantiation order.
    - The build process is: `raco exe` -> overlay custom Info.plist -> generate .icns -> remove raco's default Starter.icns -> code sign. Clean separation between Racket's bundling and our app-specific customization.
- id: 2026-04-11-swift-stub-launcher-integration
  timestamp: 2026-04-11
  phase: work
  body: |
    **Swift stub launcher integration**

    - **Blocker resolved:** APIAnyware-MacOS now provides `apianyware-macos-stub-launcher` crate at `generation/crates/stub-launcher/`. It generates per-app Swift stub binaries that `execv` into a language runtime, giving each app a unique CDHash for independent TCC permissions.
    - **Replaced `raco exe` with Swift stub:** Rewrote `bundle/build.sh` to compile a ~15-line Swift stub with `swiftc -O` instead of using `raco exe --gui --launcher`. The stub finds `main.rkt` via `Bundle.main.path(forResource:inDirectory:)` and `execv`s into `/opt/homebrew/bin/racket`. Result: ~71KB Mach-O arm64 binary with a unique CDHash.
    - **New bundle structure:** Project source files are copied into `Contents/Resources/racket-app/` (core/, ffi/, lib/, services/, ui/, main.rkt). Bindings use absolute symlinks to `APIAnyware-MacOS/generation/targets/racket-oo/` (generated, lib, runtime). Bundle is tied to this machine's directory layout — a distributable version would need to copy bindings and fix dylib @rpath.
    - **Key design decision — inline Swift vs Rust crate:** The stub source is trivial (~15 lines), so generating it inline in build.sh is simpler than adding a cargo build dependency. The pattern matches `apianyware-macos-stub-launcher`'s `generate_stub_source()` output exactly.
    - **Key design decision — racket vs gracket:** Used plain `/opt/homebrew/bin/racket` (not `gracket`). main.rkt creates its own NSApplication via FFI and doesn't use `racket/gui`. The stub's `execv` preserves the PID and .app bundle identity, so macOS recognizes the process as a GUI app.
    - **Info.plist kept custom:** The stub launcher crate generates a minimal Info.plist, but ours has Modaliser-specific keys: `LSUIElement` (menu bar only), `NSAccessibilityUsageDescription`, `NSScreenCaptureUsageDescription`, `CFBundleIconFile`. Kept the custom version.
    - Build succeeds in ~3 seconds. "Modaliser Dev" certificate used for stable TCC identity across rebuilds.
    - **Testing confirmed TCC independence:** Running the stub binary shows "accessibility not granted" — the new CDHash is correctly treated as a fresh app by macOS TCC. The old `raco exe` binary would have inherited accessibility from the shared Racket runtime. Full bootstrap sequence verified: stub finds main.rkt via `Bundle.main.path(forResource:)`, execv into racket succeeds, all modules load, NSApplication starts, status bar configured. App runs stably via `open Modaliser.app`.
    - **Remaining:** Full keyboard capture testing requires granting Accessibility permission to the new app in System Settings. This is now safe to do since TCC manages it independently per the unique CDHash.
- id: 2026-04-11-end-to-end-testing-and-bug-fixes
  timestamp: 2026-04-11
  phase: work
  body: |
    **End-to-end testing and bug fixes**

    - **CGEvent tap callback bug (CRITICAL):** `function-ptr` created inside `start-keyboard-capture!` (called from `applicationDidFinishLaunching:` — a C→Racket reentry context) produced a valid-looking `#<callback>` object, but the CGEvent tap never invoked it. Fix: moved callback creation to module top level in `cgevent.rkt`. Root cause likely a Racket CS FFI limitation with callback allocation during foreign reentry.
    - **Debugging false trail:** Spent significant time thinking the event tap wasn't receiving events. The actual issue was that Claude Code's Bash commands don't generate physical keyboard events (CGEvents). Tests only receive events when the user physically presses keys. Every "no events" result was simply a test window with no physical typing.
    - **Modal system works:** F18 leader key enters modal mode, catch-all handler activates, subsequent keys dispatch to commands (e.g. F18+s launches Safari). The full modal state machine → event dispatch → config chain is operational.
    - **Overlay bug — `make-nsrect` arity:** `panel-manager.rkt` called `(make-nsrect point size)` but the binding expects `(make-nsrect x y w h)`. Fixed both call sites.
    - **Overlay bug — `coerce-arg` missing on `tell` calls:** Generated bindings return `objc-object` wrappers, but raw `tell` calls expect `_id` pointers. Fixed: `(tell content-view ...)` → `(tell (coerce-arg content-view) ...)`.
    - **Overlay bug — `wkwebview-set-autoresizing-mask!` missing:** This NSView-inherited property isn't in the generated WKWebView bindings. Replaced with direct `objc_msgSend` call.
    - **Overlay bug — KVC `forKey:` PAC crash:** `forKey: #:type _string "drawsBackground"` passed a C `char*` where `NSString*` is expected. On arm64e, this triggers a Pointer Authentication trap in `CFHash`. Fixed: `forKey: (coerce-arg "drawsBackground")`.
    - **Overlay status:** Panel creation and HTML loading now succeed (10KB HTML, panel ordered front), but the app crashes shortly after — likely a subsequent Cocoa/WKWebView interaction issue. Needs further investigation.
    - **User feedback:** Debugging experience is poor. Binding type mismatches cause silent failures or PAC traps instead of clear error messages. The bindings should use Racket contracts or Typed Racket to catch these at the boundary. This is an APIAnyware-MacOS concern, not Modaliser-specific.
- id: 2026-04-11-main-thread-dispatch-for-ui-operations
  timestamp: 2026-04-11
  phase: work
  body: |
    **Main-thread dispatch for UI operations**

    - **Created `ffi/main-thread.rkt`:** New module implementing `call-on-main-thread` and `on-main-thread?` using GCD's `dispatch_async_f` (function-pointer variant avoids Objective-C block ABI). Uses `pthread_main_np()` for main-thread detection: synchronous when already on main thread, async dispatch via GCD main queue otherwise.
    - **Key FFI technique — `dlsym` for struct-global addresses:** `_dispatch_main_q` is a global struct (not a pointer variable). `get-ffi-obj` with `_pointer` would read the first word of the struct, not its address. Used `dlsym(RTLD_DEFAULT, "_dispatch_main_q")` to get the symbol address directly — equivalent to `dispatch_get_main_queue()`.
    - **Thunk registry pattern:** Maps integer IDs to Racket closures. Background thread registers a thunk, passes the ID through GCD's `void *context` parameter. The C callback (module-level `function-ptr` for GC stability, same pattern as `cgevent.rkt`) retrieves and invokes the thunk on the main thread.
    - **`pthread_main_np` behavior in Racket CS:** Without a Cocoa run loop (test context), all green threads run on the main OS thread → `on-main-thread?` returns `#t` → `call-on-main-thread` calls directly (synchronous). With `nsapplication-run` blocking the main OS thread, green threads run on Racket CS scheduler threads → `on-main-thread?` returns `#f` → async dispatch via GCD fires on the next Cocoa run loop iteration.
    - **4 call sites wired up:**
      1. `state-machine.rkt` — overlay delayed show (`modal-show-overlay-delayed` callback)
      2. `state-machine.rkt` — safety watchdog timeout (auto-exits modal after 5s)
      3. `chooser.rkt` — async fuzzy search results push (`chooser-async-search!` final update)
      4. `chooser.rkt` — dynamic search results push (`chooser-push-results`, called from both main and background threads — `call-on-main-thread` handles both cases)
    - **Double generation checks in chooser:** Background thread checks generation before dispatching (quick bail), main thread checks again inside the dispatch (authoritative). Prevents stale results from overwriting newer data.
    - **All 22 test suites pass** with no regressions. New `tests/test-main-thread.rkt` verifies FFI bindings load, `on-main-thread?` returns `#t` in test context, and `call-on-main-thread` invokes thunk synchronously.
    - **Next step:** Rebuild the app bundle and test whether the overlay panel crash (Session 10b) is resolved now that WKWebView operations dispatch to the main thread.
- id: 2026-04-11-overlay-panel-crash-resolved-3-bugs
  timestamp: 2026-04-11
  phase: work
  body: |
    **Overlay panel crash resolved (3 bugs)**

    - **Green threads are dead under `nsapplication-run`:** The overlay delay timer (`after-delay`) used `(thread (lambda () (sleep N) (callback)))`. Since `nsapplication-run` blocks the Racket place main thread, the scheduler cannot advance green threads — `sleep` never returns. Confirmed via debug logging: "scheduling with gen=1" appeared but "timer fired" never did. Fix: added `call-on-main-thread-after` to `ffi/main-thread.rkt` using GCD's `dispatch_after_f` + `dispatch_time`. The GCD timer is integrated with the Cocoa run loop and fires correctly.
    - **`coerce-arg` needed on WKScriptMessage body:** The overlay's HTML sends a "resize" message via `window.webkit.messageHandlers.modaliser.postMessage(...)`. The body arrives as an `objc-object` wrapper from `wkscriptmessage-body`. Passing it directly to `tell ... objectForKey:` fails with `id->C: argument is not 'id' pointer`. Fixed by adding `coerce-arg` to `objc-dict-get` and `objc-dict-get-number` in panel-manager.rkt.
    - **`make-objc-block` crashes when wrapping `#f`:** `panel-eval-js!` passed `#f` as the completion handler to `wkwebview-evaluate-java-script-completion-handler`. The generated binding calls `make-objc-block #f ...` which wraps it as `(lambda args (apply #f (cdr args)))`. When WKWebView asynchronously invokes the block after JS completes, this crashes. Fixed by passing `(lambda (result error) (void))` instead of `#f`. Reported as APIAnyware runtime bug — `make-objc-block` should emit a NULL block pointer when given `#f`.
    - **Chooser search made synchronous:** Replaced `(thread ...)` in `chooser-async-search!` with synchronous `chooser-search!` on the main thread. Fuzzy-filter on ~670 items is fast enough (~10ms). The green-thread approach is unviable under `nsapplication-run`.
    - **`after-delay` reimplemented via GCD:** The public `after-delay` utility now delegates to `call-on-main-thread-after` instead of spawning a green thread. Preserves API for any config code that uses it.
    - **Error handling added to `dispatch-script-message`:** ObjC delegate callbacks lack Racket exception handling by default. Added `with-handlers` wrapper to prevent unhandled script message errors from crashing the app.
    - **Overlay confirmed working end-to-end:** Panel appears after delay, updates on group navigation, app remains stable through repeated modal enter/exit cycles.
    - **Chooser issues discovered (pre-existing):** Chooser panel doesn't accept keyboard input and doesn't dismiss on ESC or external clicks. All choosers affected (same code path). Added as new backlog item.
    - **APIAnyware backlog items added:** (1) `make-objc-block` nil handling; (2) GCD timer utility for runtime.
- id: 2026-04-12-chooser-panel-keyboard-input-and-dismiss
  timestamp: 2026-04-12
  phase: work
  body: |
    **Chooser panel keyboard input and dismiss**

    - **Root cause identified:** Borderless `NSPanel` returns `false` for `canBecomeKeyWindow` by default. The Swift original solved this with a `KeyablePanel` subclass overriding `canBecomeKey` → `true`. The Racket version used a plain `NSPanel`, so the panel could never become the key window — the WKWebView's `<input autofocus>` element never received focus, keydown events never fired in JS, and ESC was never caught.
    - **Fix 1 — KeyablePanel dynamic ObjC subclass:** Created `ModaliserKeyablePanel` at module load time via ObjC runtime API (`objc_allocateClassPair`, `class_addMethod`, `objc_registerClassPair`). Overrides `canBecomeKeyWindow` and `canBecomeMainWindow` with an IMP that returns `YES`. `make-keyable-panel` allocates instances via `objc_msgSend` (alloc + `initWithContentRect:styleMask:backing:defer:`), wraps via `wrap-objc-object` for compatibility with all existing `nspanel-*` functions. Activating panels use KeyablePanel; non-activating panels (overlay) continue using plain NSPanel.
    - **Fix 2 — windowDidResignKey: delegate for click-outside dismiss:** For activating panels, creates a `make-delegate` with `windowDidResignKey:` that sends `(list (cons 'type "cancel"))` to the panel's registered message handler. The chooser's handler recognizes this alist format (dual dispatch: ObjC dict for production, Racket alist for internal/testing) and calls `close-chooser`. Delegate is set on the panel via `(tell panel setDelegate:)` and stored in the panel registry as `'resign-delegate`.
    - **Fix 3 — Delegate cleanup in close-panel!:** `close-panel!` now calls `(tell panel setDelegate: #f)` before `nspanel-order-out!`/`nspanel-close!`. This prevents the resign delegate from firing spuriously when the panel is programmatically closed (e.g., user selected an item, not clicked outside).
    - **CGEvent tap not involved:** Confirmed that the CGEvent tap is not the problem — `modal-exit` clears the catch-all handler before opening the chooser, so regular keystrokes pass through to the system. The issue was purely at the Cocoa window level.
    - **All 35 chooser tests pass.** Full test suite green (pre-existing overlay delay timer test is a known timing flake).
    - **Pattern learned:** Dynamic ObjC class creation in Racket follows the same flow as `delegate.rkt`'s fallback path. The `_cprocedure` + `function-ptr` at module level ensures the IMP stays reachable (same GC stability pattern as CGEvent callback and GCD trampolines).
- id: 2026-04-12-implement-remember-and-id-field-selector-properties
  timestamp: 2026-04-12
  phase: work
  body: |
    **Implement `'remember` and `'id-field` selector properties**

    - **Task:** Config.scm uses `'remember "apps"` for MRU ordering and `'id-field "bundleId"` for identity-based matching in chooser results. These were silently ignored.
    - **What was done:**
      - Created `lib/mru-store.rkt`: persistent MRU storage module. Hash table keyed by remember-key string, values are ordered lists of id values (most recent first, capped at 50). Persisted to `~/.config/modaliser/mru.dat` via `write-to-file`/`file->value`. Graceful error handling on load/save failures.
      - Modified `ui/chooser.rkt`: (1) `open-chooser` reorders source items by MRU when selector has `'remember` + `'id-field` — MRU items first in recency order, rest in original order. (2) `chooser-handle-select` and `chooser-handle-secondary-action` record the selected item's id-field value before `close-chooser` clears the selector node. (3) Added `chooser-record-mru!` helper.
      - Modified `main.rkt`: added `mru-load!` call at startup before `load-config!`.
      - Created `tests/test-mru-store.rkt`: 8 test cases covering record/retrieve, MRU ordering, dedup, persistence/reload, reorder with missing items, items without id-field, and an integration test simulating real `find-installed-apps` output with symbol keys.
    - **Key discovery — string→symbol conversion:** Config DSL passes `'id-field "bundleId"` (string), but `find-installed-apps` returns alists with `'bundleId` (symbol) keys. `(assoc "bundleId" item)` fails because `equal?` on string vs symbol is `#f`. Fixed by converting id-field string to symbol via `string->symbol` at the chooser layer (both in `open-chooser` and `chooser-record-mru!`).
    - **Not in original Swift either:** Neither the Swift Modaliser nor the LispKit chooser.scm had `'remember`/`'id-field` implemented — these were planned config properties that were never built. Implemented from scratch based on the implied semantics.
    - **Pre-existing issue noted:** `chooser.rkt` cannot be loaded in isolation due to `_NSEdgeInsets` unbound identifier in `wkwebview.rkt` (binding generation issue). Not related to this change.
- id: 2026-04-12-save-window-frame-ax-based-pid-extraction
  timestamp: 2026-04-12
  phase: work
  body: |
    **`save-window-frame!` AX-based PID extraction**

    - **Task:** Task 1 from backlog — replace NSWorkspace-frontmost PID lookup in `save-window-frame!` with direct AX-element PID extraction. Eliminates multi-instance race where NSRunningApplication lookup by bundle ID could pick the wrong instance.
    - **Observation on re-reading the code:** The bug was worse than the backlog described. `save-window-frame!` receives a window AX element as its only parameter, then discards it and asks NSWorkspace "who is frontmost right now?" — so even in single-instance cases the PID was logically unsound: it was "whoever is frontmost at this instant," not "who owns this window." Any code path that saved a frame for a non-focused window would have been wrong.
    - **Changes:**
      - `ffi/accessibility.rkt`: added FFI binding for `AXUIElementGetPid(element, pid*) -> AXError` and exported a Racket wrapper `ax-get-pid`. The wrapper allocates an `_int32` out-buffer, checks the error code, and guards against `pid <= 0` (kernel_task / bogus values) by returning `#f` on failure. `AXUIElementGetPid` is a Get-rule API, so no CFRelease needed — simpler than `ax-get-position`.
      - `services/window-manager.rkt`: rewrote `save-window-frame!` to call `(ax-get-pid win)` directly on the window parameter. Dropped the `ax-get-focused-app` + NSWorkspace + `nsrunningapplication-process-identifier` chain (8 lines removed, and the old code queried focused-app which wasn't even the owning app of `win`). Also updated `restore-window` to use `ax-get-pid` on the focused window, so save and restore now compute identical cache keys via the same mechanism.
      - `tests/test-window-manager.rkt`: added two rackunit tests. (1) PID round-trip: `ax-app-element` for `getpid()` then `ax-get-pid` on the result should return our own PID — pure FFI test, no permissions needed. (2) Live-window check: for any real window in `list-windows`, `ax-get-pid` on the window's AX element should equal the `ownerPid` field computed by `list-windows`.
    - **What worked:** Both new tests pass on first run, and all 11 pre-existing `test-window-manager.rkt` tests still pass. The `getpid` function is in `racket/os`, not `racket/base` — initial test failed to compile until I added the require.
    - **`AXUIElementGetPid` is a rare ergonomic FFI win:** Most AX accessors return CF objects via `AXUIElementCopyAttributeValue` which require `CFRelease`, wrapping in `dynamic-wind`, and translating via `AXValueGetValue`. `AXUIElementGetPid` writes a plain int to an out-param — no ownership, no CFTypeRef, no unwrap ceremony. Also public (not a private `_` symbol like `_AXUIElementGetWindow`), so no cross-OS availability guard needed.
    - **Task 3 relevance (`restore-window` concurrent-command guard):** While editing `restore-window`, I noticed it still uses `(thread (lambda () (sleep 0.5) ...))` for the fullscreen-exit delay. Per memory, Racket green threads are dead under `nsapplication-run` — the sleep never fires. So `restore-window` for fullscreen windows is currently broken (it just schedules a thread that never resumes). This should be folded into Task 3: not just a concurrent-command guard, but a switch to `call-on-main-thread-after`. The triage phase should update Task 3 to cover both.
    - **Did not touch:** NSWorkspace imports remain required by `focused-app-bundle-id`, `list-windows`, `focus-window`, and `activate-app!`, so I left the require as-is. Only the PID lookup inside the two frame-save/restore paths changed.
- id: 2026-04-12-restore-window-fullscreen-exit-fix-apianyware-contract-collision-cleanup
  timestamp: 2026-04-12
  phase: work
  body: |
    **`restore-window` fullscreen-exit fix + APIAnyware contract-collision cleanup**

    - **Task:** Top-priority backlog task — replace the dead `(thread (lambda () (sleep 0.5) ...))` in `restore-window` with `call-on-main-thread-after`, and add a concurrent-command guard via a per-window generation counter so that a delayed fullscreen-exit repositioning bails if another save/restore/toggle touched the same window during the animation wait.
    - **User preference check:** APIAnyware recently added contracts to the generated bindings, and the user asked me to confirm whether Task 4 was still relevant before starting. Initial grep showed contracts on `functions.rkt` (C function layer); a wider search revealed they are also on every per-class method wrapper file. Task 4's headline concern is therefore now *partially* addressed upstream — the wrappers are contract-protected — but the contracts are still effectively `any/c` for `self` and most `_id` params, so they don't catch the original category of mistake they were supposed to catch. Added a new task in the APIAnyware racket-oo backlog ("Tighten per-class method wrapper contracts") capturing the specific gaps (self, nullability, `_id`-kind params, SEL params, return-type void mismatches) as a follow-up.
    - **Task 1 window-manager changes:**
      - `services/window-manager.rkt`: added a `window-generations` hash keyed by `window-cache-key` (`pid:title`) plus `bump-window-generation!` / `window-generation` helpers. `save-window-frame!` now bumps on every call. `restore-window` switched from `(thread (sleep 0.5))` to `(call-on-main-thread-after 0.5 ...)` for the fullscreen-exit branch, with the delayed continuation capturing its own generation at schedule time and bailing if another command bumped the counter before it fires. Non-fullscreen branch was already synchronous — left untouched. `fullscreen-exit-delay` pulled out as a module-level constant (`0.5`).
      - `require`: added `"../ffi/main-thread.rkt"` to window-manager. Exposed `window-cache-key`, `bump-window-generation!`, `window-generation` from the provides for testing.
      - `tests/test-window-manager.rkt`: added `racket/port` require and 6 new unit tests covering default-zero, monotonic bump, per-key independence (bumping k1 must not affect k2), stale-gen bail-out detection, fresh-gen pass-through, and a source-text regression test asserting `window-manager.rkt` contains no `(thread ` or `(sleep ` calls. The regression test initially tripped on a doc comment that literally said `(thread + sleep)` — rewrote the comment to avoid the pattern rather than make the regex smarter.
    - **Upstream APIAnyware fixes I had to land before Task 1 could be verified:**
      1. **`->` require collision (load-time):** Every class, functions, and constants file emitted `(require ffi/unsafe racket/contract ...)`, which errors at load with "identifier already required: ->" because `ffi/unsafe` and `racket/contract` both export `->`. Every file in the generated tree was broken — Modaliser could not load a single binding. Fix: rename the contract arrow in-place via `(rename-in racket/contract [-> c->])` and emit all generated contract forms using `c->` (e.g. `[nsview-hidden (c-> any/c boolean?)]`). Kept `ffi/unsafe`'s `->` intact for `_fun` FFI signatures. Touched `emit_class.rs` (header + `format_arrow_contract`), `emit_functions.rs` (header + contract format), `emit_constants.rs` (header only — no `->` in constant contracts but the require collision still blocked load). Updated ~10 unit test assertions and regenerated the golden-file snapshots with `UPDATE_GOLDEN=1`.
      2. **Class reference not provided:** Switching class files from `(provide (except-in (all-defined-out) ...))` to `(provide/contract [...])` stopped exporting the `import-class`-bound class name (`NSMenuItem`, `NSView`, etc.). Modaliser uses raw `(tell NSMenuItem separatorItem)` in `services/lifecycle.rkt` because the generated `nsmenuitem-separator-item` wrapper is broken (treats a class method as an instance property) — so `NSMenuItem` became unbound and lifecycle/config-loading tests failed with "NSMenuItem: unbound identifier". Fix: `emit_provide` in `emit_class.rs` now also emits `(provide ClassName)` alongside the `provide/contract` form. Updated `test_empty_class_provide` and the snapshot goldens.
      3. **`void?` return contract vs raw `tell` return (load-time crash on first use):** `nsapplication-set-delegate!` was defined as `(tell (coerce-arg self) setDelegate: (coerce-arg value))` — no `#:type _void` hint — so the `tell` macro returned the raw objc_msgSend result (some garbage `_id`-ish value, not `(void)`), and the emitted contract `(c-> any/c any/c void?)` correctly blamed the wrapper. `test-keyboard-capture.rkt` hit this on startup before it could even reach the event loop. Fix: in `emit_property`'s `_id`-setter branch, wrap the `tell` call in `(void ...)` so the return value is always `(void)`, satisfying `void?`. Audited the method-emit `Tell` dispatch path and applied the same `(void ...)` wrap for void-returning methods there too. The typed `_msg-N` dispatch path was already fine because those bindings declare `-> _void` in their FFI signature. Updated snapshot goldens again.
    - **Test runs:**
      - APIAnyware: `cargo test --release -p apianyware-macos-emit-racket-oo` — 67 unit + 3 snapshot suites green.
      - Modaliser: all 24 automated tests in `tests/test-*.rkt` pass. `test-keyboard-capture.rkt` is a manual integration harness that enters `nsapplication-run` and waits for physical keypresses — "hangs" correctly and is not part of the automated set (previously appeared to fail only because the contract error aborted before the run loop started).
    - **What worked:** The generation-counter pattern from `chooser-search-generation` and the overlay delay timer transferred cleanly to window-manager, and the new tests all pass on first run. `call-on-main-thread-after` was already the documented replacement in `ffi/main-thread.rkt`, so there was no new FFI surface to bring in.
    - **What didn't:** My initial APIAnyware audit was too shallow — I saw `racket/contract` only in `functions.rkt:5` and missed that class files were also affected, because the file-counts view collapsed 1297 files into 20 displayed matches. Only when I tried to actually *load* `nsapplication.rkt` did the collision surface. Lesson for next time: never infer load-time behaviour from a text-only grep when the upstream generator has just been restructured — touch one file with `racket -e '(require ...)'` first.
    - **Remaining dead-green-thread offenders (for Task 2):** `services/shell.rkt:70-85` still spawns a background Racket thread that runs `subprocess` and uses `(sleep timeout-seconds)` as a watchdog. Under `nsapplication-run` this thread never advances, so shell commands with timeouts silently no-op in the app context. Not in Task 1's scope — belongs to Task 2 (guardrail scheduler APIs) which is the next logical follow-up.
    - **APIAnyware side findings worth noting for that project's reflect/triage phases:** The load-time failures above (plus others already recorded in its own memory/backlog) are exactly what the "Runtime load verification in test suite" task at the top of the racket-oo backlog is designed to catch before they reach consumers. None of these would have survived a `dynamic-require` harness, and every text-level snapshot was green. I added a new backlog entry in APIAnyware-racket-oo ("Tighten per-class method wrapper contracts") for the forward-looking contract-quality work.
- id: 2026-04-14-fix-shell-rkt-dead-thread-timeout-watchdog
  timestamp: 2026-04-14T10:08:27Z
  phase: work
  body: |
    **Fix shell.rkt dead-thread timeout watchdog**

    - **Attempted:** Replace `services/shell.rkt` `run-shell-async`'s Racket-thread
      + `(sleep T)` watchdog (dead under `nsapplication-run`) with a shell-level
      watchdog that needs no Racket scheduler. Also factor the existing
      `(thread|sleep` source-text regression guard out of `test-window-manager.rkt`
      into a reusable helper and apply it to `shell.rkt` too.
    - **What worked:**
      - Shell-level timeout via a background `sleep T && kill -KILL $$ &` and-or
        list followed by `exec /bin/zsh -c "$2"`. After exec the parent's PID is
        preserved, so the pre-fork subshell's captured `$$` still targets the
        exec'd user command. User command passed via argv — no injection risk.
      - Detection: `subprocess-status == 137` (128 + SIGKILL) flags timeout. Works
        because zsh's conventional exit code for signal-killed commands is 128+sig.
      - New `tests/source-guards.rkt` exports `check-no-dead-thread-calls`. Strips
        full-line comments before regex matching (necessary — otherwise docstring
        prose like "don't call `(sleep ...)`" trips the check). Used from both
        `test-window-manager.rkt` (replacing its inline regex) and `test-shell.rkt`.
      - `test-shell.rkt` also gains a `dynamic-require` smoke load of
        `services/shell.rkt` using `(build-path (current-directory) ...)` to
        resolve the path correctly from the test file.
      - `run-shell-async` is now synchronous on the caller. Under
        `nsapplication-run` the old version silently no-op'd, so this is a strict
        improvement. The test suite still passes because tests run outside the
        Cocoa run loop and the callback is invoked directly.
      - `test-shell.rkt` runs in ~0.9s total (including Racket startup), which
        confirms the `sleep 10` timeout test actually kills the user command at
        0.5s — if orphaned children were holding the stdout pipe, the test would
        take the full 10 seconds.
    - **What didn't work / got refined:**
      - First regex attempt in `source-guards.rkt` matched the literal
        `"(sleep \"$1\"..."` string inside `timeout-wrapper-script`. Fixed by
        (a) rewriting the script without a leading `(` — `sleep ... && kill ... &`
        as a top-level backgrounded and-or list instead of `(sleep ... && ...) &`
        — and (b) adding a `strip-comment-lines` pass so future prose mentions
        don't false-positive either.
      - First `dynamic-require` used the string `"../services/shell.rkt"`, which
        Racket resolved relative to `(current-directory)` (not the test file),
        yielding `/Users/antony/Development/services/shell.rkt` and failing.
        Fixed by building an absolute path from `(current-directory)`.
    - **Suggests next:**
      - **Task #2 (guardrail) should first fix `services/http.rkt:15-22`.**
        `http-get` wraps its work in `(thread ...)` — another dead-thread offender
        discovered during the shell.rkt inventory sweep. Noted in both backlog.md
        (added to Task #2's description) and memory.md (updated "Known remaining
        offender" line). Same pattern applies: drop the `(thread ...)` wrapper,
        run synchronously on the caller. http-get has no timeout feature to
        preserve, so the fix should be simpler than shell.rkt's.
      - **Follow-up refinement for shell.rkt's timeout watchdog:** current fix
        works for simple commands because `zsh -c "cmd"` exec-optimizes to the
        user command directly. For pipelines / redirects / compound commands,
        zsh must fork helpers; killing the parent shell leaves grandchildren
        orphaned holding the stdout pipe, and `port->string` then blocks until
        the command's natural duration. Exit-code branch still fires at the
        right time but wall-clock timeout is effectively defeated. Could add
        `pkill -KILL -P $$` before the final `kill`, or use `setsid` + process
        group kill, to cover this. Not blocking any current functionality —
        modaliser's typical shell use cases are simple commands (open -a X,
        scripts, etc.).
    - **Key learnings:**
      - The `zsh -c "simple-cmd"` exec optimization is load-bearing for the
        simple-command path. Without it, even `sleep 10` under a 0.5s timeout
        would hang the caller for 10s due to the orphaned-child pipe-holding
        problem, because `port->string` waits for all writers (including
        orphaned grandchildren) to release the fd.
      - Source-text regression guards must handle comments — the first iteration
        matched docstring prose about the pattern, even when the code was clean.
        Stripping full-line comments before regex matching is a cheap, robust
        fix that covers 95% of cases; inline comments are rare enough to manage
        by convention.
      - `dynamic-require` resolves relative paths against `current-directory`,
        not against the file containing the call. Test helpers that load modules
        should always use `build-path` from `(current-directory)` to avoid
        path-drift surprises.
      - `&` in POSIX/zsh is a list terminator: `cmd1 && cmd2 &` backgrounds the
        whole `cmd1 && cmd2` chain, not just `cmd2`. This is what enables the
        parenthesis-free watcher form that sidesteps the source-guard regex.
      - `run-shell-async` synchronous semantics are acceptable for modaliser's
        usage (fire-a-command-from-a-keybinding), but if a future caller needs
        true async (returning control to the UI while a long command runs), the
        fix will need to escalate to a GCD background queue primitive with a
        C-only kill callback (Racket-from-GCD-worker callbacks are unsafe).
- id: 2026-04-14-fix-http-rkt-dead-thread-usage
  timestamp: 2026-04-14T12:02:21Z
  phase: work
  body: |
    **Fix http.rkt dead-thread usage**

    - **Attempted:** Task #2 from the backlog — remove the silent-no-op `(thread ...)`
      wrapper from `services/http.rkt` `http-get`, wire up the reusable source guard
      and `dynamic-require` smoke load for http.rkt, and scrub the now-stale
      background-thread comment in `ui/chooser.rkt`.

    - **What worked:**
      - `http-get` rewritten as a one-liner: `(callback (http-get-sync url))`. Preserves
        the callback-style API for the single in-tree caller (`lib/web-search.rkt`) so
        no caller-side edits are needed beyond the chooser comment.
      - `tests/test-http.rkt` picked up the established pattern trivially:
        `check-no-dead-thread-calls "services/http.rkt"` plus `dynamic-require` smoke
        load. Previous async tests that used semaphore/box ceremony collapsed to plain
        result-box assertions — the ceremony was only meaningful when the callback
        ran on a (never-actually-running) background thread.
      - Full `racket tests/test-http.rkt` run passed end-to-end, including the two
        network-dependent tests (`http://captive.apple.com` success path and an
        invalid-domain failure path). The expected `with-handlers` diagnostic lines
        for the failure path appeared on stderr but don't fail the assertions.
      - `racket tests/test-shell.rkt` still passes — confirms the reusable source-
        guard helper is unaffected by the new call site.
      - `memory.md`'s "Green threads dead" entry now reads "No known offenders
        remain," satisfying the dependency declared by Task #3.

    - **What didn't:** Nothing in this task. The fix was as small as expected and
      the test pattern generalized cleanly from the shell.rkt precedent.

    - **What this suggests next:**
      - Task #3 (guardrail for Racket scheduler APIs) is now fully unblocked and
        was explicitly designed to ship in failing-mode with zero offenders, so
        picking it up next has maximum momentum.
      - A natural refinement during Task #3: promote the per-test-file source-guard
        calls into a single `test-source-guards.rkt` that walks `core/ services/
        ui/ lib/` and asserts the invariant once per suite run. The current
        per-file sprinkling (three files now) has been fine for staging, but it
        will become noisy once the guardrail formalizes the rule.
      - Secondary follow-up for web-search latency: `web-search-handler` now blocks
