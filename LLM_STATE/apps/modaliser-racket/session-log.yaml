    - **What didn't work / wasn't done:**
      - The remaining `ffi/unsafe` imports throughout the codebase (Task #8) are
        not yet eliminated — blocked on upstream CFSTR macro constants, CF/AX/GCD
        runtime helpers, and type-mapping fixes.
      - File merge (ffi/accessibility.rkt + ffi/permissions.rkt into services/) deferred —
        both files still contain local FFI definitions so ffi/ remains appropriate.

    - **What to try next:**
      - Task #8 immediate local action: import the 22+ enum constants already available
        in generated `enums.rkt` files, replacing locally-defined values in
