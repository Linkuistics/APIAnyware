        `CFStringGetCString`/`CFBooleanGetValue`/`CFNumberGetValue` (`_uint8` vs `_bool`).
        Each retained definition carries a comment pointing to the upstream bug entry.
      - `ffi/permissions.rkt`: 4 `get-ffi-obj` bindings, 2 constant lookups, and 2
        explicit `ffi-lib` loads replaced with `only-in` imports from 4 generated
        modules. `accessibility-trusted?` and `request-accessibility!` wrapped with
        `positive?` to adapt `_uint8` returns to proper booleans. `kCFTypeDictionary*CallBacks`
        retained locally (struct-typed data symbol bug, same class as `_dispatch_main_q`),
        now resolved via `(ffi-lib #f)` RTLD_DEFAULT rather than explicit `cf-lib`.
