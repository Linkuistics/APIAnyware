  body: |
    **Task #7 Phase 1: audit + migrate cgevent-emitter to generated bindings**

    - **Attempted:** Task #7 ("Eliminate `ffi/*.rkt` in favour of APIAnyware
      racket-oo C-function bindings"). Per the task's own approach guidance
      ("pick one ffi/*.rkt module at a time"), scoped this work-phase
      iteration to (a) full audit of racket-oo coverage for every symbol
      used by the five `ffi/*.rkt` files, then (b) migration of the
      smallest fully-covered module as a proof-of-concept, then (c)
      cross-plan write of the gap inventory to APIAnyware-MacOS at the
      user's explicit instruction.

    - **What worked:**
      - **Audit** — direct grep against
        `APIAnyware-MacOS/generation/targets/racket-oo/generated/oo/`
        cleanly partitioned the five files into "covered" (cgevent-emitter,
        cgevent) and "blocked on upstream" (main-thread, accessibility,
        permissions). The `kCFRunLoopCommonModes` precedent in
        `corefoundation/constants.rkt:541` answered Task #7's open question
        about how racket-oo handles C global-variable address-of: it uses
        `(get-ffi-obj 'name _fw-lib _pointer)` (no `_fun` wrapper). So
        `_dispatch_main_q` is technically unblocked at the *generator* level
        — the only blocker is libdispatch headers being absent from the
        racket-oo input header set.
      - **cgevent-emitter migration** — straightforward `(only-in
        "../bindings/generated/oo/coregraphics/functions.rkt" ...)` +
        `(only-in "../bindings/generated/oo/corefoundation/functions.rkt"
        CFRelease)` in place of the `get-ffi-obj` block. Local enum
        constants kept (see "didn't work" below). `dynamic-require` smoke
        load passed; `tests/test-cgevent-emitter.rkt` passed; full
        `./tests/run-all.sh` reports `26 passed, 0 failed, 0 silent,
        0 timed out` in ~55 s.
      - **Cross-plan propagation** — added "Coverage gaps discovered by
        Modaliser-Racket Task #7" to
        `APIAnyware-MacOS/LLM_STATE/targets/racket-oo/backlog.md` (just
        before the `## Completed Tasks` section). Four numbered subsections
        cover AX/HIServices, libdispatch+pthread, libobjc runtime, and
        the empty CG enum categories. Each names specific Modaliser
        consumers and points back at this Task #7 as the downstream
        integration test.

    - **What didn't work / surprised me:**
      - **Empty enum categories.** `coregraphics/enums.rkt` lists
        `;; CGEventType`, `;; CGEventTapLocation`, `;; CGEventSourceStateID`,
        etc. as bare comment headers but emits *zero* values for any of
        them. The audit's "functions covered" claim turned out to be only
        half the story — consumers still have to redefine
        `kCGHIDEventTap=0`, `kCGSessionEventTap=1`, `kCGEventKeyDown=10`,
        etc. locally. Filed as bullet 4 of the upstream gap entry.
        Probably affects every framework's `enums.rkt`, not just
        CoreGraphics.
      - **`applicationservices/main.rkt` is an 8-line stub.** I expected
        AX functions to live there given `AXIsProcessTrusted`'s historical
        home in HIServices/ApplicationServices, but the entire file is a
        no-op `provide`. Either the racket-oo input filter excludes
        HIServices entirely or the AX API set is gated behind a separate
        framework dir that doesn't exist yet.
      - **The AX 'accessibility' framework dir is misleading.**
        `generated/oo/accessibility/` has 30+ files but they cover the
        AX-prefixed *UI element data* APIs (charts, braille,
        math-expressions, data-points) — not `AXUIElement`/`AXValue`/
        `AXIsProcessTrusted`, which are what Modaliser's
        `ffi/accessibility.rkt` actually uses. Naming collision worth
        flagging.

    - **Suggests next:**
      - **Phase 2 (Task #7a):** migrate `ffi/cgevent.rkt`. Fully unblocked
        by this audit. The CGEvent tap is the most safety-critical FFI
        surface in the codebase (callback fires on the main OS thread via
        CFRunLoopAddSource, GC root pattern is non-obvious), so this is
        the right next test of the migration approach. Low risk because
        the existing `tests/test-integration-keyboard-capture.rkt` is a
        real end-to-end check under a real NSApp loop.
      - **Phase 3 / Phase 4 (Tasks #7b, #7c)** are blocked on the
        upstream APIAnyware additions. They should not be picked next;
        pick something else from the unblocked set.
      - **Task #6** (shell timeout for pipelines) is the only other
        unblocked task today. After Phase 2 lands, that's the natural
        next pick.
      - **Memory updates:** the "Generated binding workarounds" section
        needs an "empty enum categories" bullet, and the
        `cgevent-emitter` migration pattern (the `only-in` import form
        against `bindings/generated/oo/<framework>/functions.rkt`) is
        worth recording as the canonical migration recipe for Tasks
        #7a–#7c.

    - **Key learnings / discoveries:**
      - racket-oo's coverage today is roughly: Foundation/AppKit/WebKit
        object APIs (extensive), CG/CF C functions (extensive),
        CG/CF C constants/globals (good — including CFStringRef
        globals), and CG/CF *enum values* (none — empty stub
        categories). Plan migration around that shape.
      - Generator-level support for C-global address-of is *already*
        proven by `kCFRunLoopCommonModes`. The dispatch migration is
        not a generator project; it's a header-set inclusion project.
        That's a much smaller upstream ask and reframes Phase 3's
        blocker.
      - `(only-in ...)` is the right import form for migrated FFI
        files — it documents which generated names a file actually
        uses and stops `racket/contract` re-exports from leaking.
        Adopt as the migration house style.
      - Cross-plan writes during work phase are explicitly OK when
        the user instructs them — overrides the default "triage owns
        cross-plan edits" rule. Worth noting because this is the
        second user-instructed cross-plan write in the project's
        history (Task #8 was the first, via subagent in triage).
