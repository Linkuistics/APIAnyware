        so `_uint8` silently breaks boolean logic; wrap with `positive?` at call sites.
      - Generator emits `_pointer` for C string params where `_string` is needed for
        auto-conversion; keep local definitions.
      - Generator emits `_id` for integer enum params; `_id` rejects plain integers.
      - Struct-typed data globals (kCFTypeDictionary*CallBacks) share the same
        upstream bug class as `_dispatch_main_q` — generator reads struct bytes as
        `_uint64` instead of taking the symbol address.
