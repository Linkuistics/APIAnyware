        broken feature (Google Suggest in the chooser), not just a latent bug — the
        fix turns on a feature that was shipping broken. This is a useful pattern
        to check for when auditing other dead-thread sites: ask "was this silently
        masking a broken UX?" not just "is the primitive sound?"
      - Stale comments accrue around removed concurrency: `chooser-push-results`
        documented a "may be called from background thread" contract that had been
        false since the shell.rkt fix and stayed false here. When removing a
        concurrency primitive, grep the whole tree for comments referring to the
        callsite's "background thread" language — they won't be caught by any
        source guard or type system.
      - The source-guard pattern (`check-no-dead-thread-calls` + `dynamic-require`
        smoke load) is now proven across three modules (window-manager, shell,
        http) with zero per-module customization. That's strong evidence it's
        ready to be lifted into a single test-suite-level invariant during Task #3.
- id: 2026-04-14-guardrail-dead-scheduler-forms-via-static-check
  timestamp: 2026-04-14T12:15:30Z
  phase: work
  body: |
    **Guardrail dead-scheduler forms via static check**

    - **Attempted:** Backlog Task #3 — install a guardrail against Racket
      scheduler APIs that silently no-op under `nsapplication-run`. Prior
      sessions fixed every known offender (`shell.rkt`, `http.rkt`,
      `window-manager.rkt` fullscreen delay, chooser search, overlay delay,
      `after-delay`), so the guardrail ships in "zero violations" mode —
      the cleanest posture for a new source-level invariant.

    - **Approach decision:** Three options in the backlog —
      (1) shadow-and-raise via a `scheduler-shims` module with `except-in
      racket/base`, (2) shadow-and-redirect to sanctioned primitives with
      a warning, (3) static source-text check. Picked Option 3. Option 1
      is invasive (requires retrofitting every module that imports
      `racket/base`) and only fires at runtime when the bad call is
      actually reached — strictly more expensive than a test-time grep.
      Option 2 is actively harmful: silently rewriting `(thread ...)` to
      synchronous execution hides real semantic bugs, which is exactly
      the silent-failure mode the original `shell.rkt`/`http.rkt`
      offenders exhibited. Option 3 is zero runtime cost, covers the
      sanctioned forbidden list, and consolidates what was previously
      three per-module inline guards into one suite entry. Rationale is
      recorded in `tests/source-guards.rkt`'s module-level comment so a
      future contributor can see why the alternatives were rejected.

    - **Inventory:** Ran the sanctioned grep first —
      `grep -rnE '\(thread[ \t]|\(sleep[ \t]|\(sync[ \t]|\(sync/timeout[ \t]|\(thread-wait[ \t]|\(semaphore-wait[ \t]' core services ui lib ffi main.rkt`
      with a `grep -vE '^[^:]+:[0-9]+:\s*;'` comment filter. Zero matches
      across the full runtime tree. Precondition satisfied: guardrail
      ships green from day one.

    - **Worked:**
      - `tests/source-guards.rkt` rewritten. Old API
        `check-no-dead-thread-calls rel-path` dropped entirely; new API
        is a single exported function `check-source-tree roots #:allow
        allow-list` that walks every `.rkt` file under the listed roots.
        Forbidden-form list expanded from two (`thread`, `sleep`) to six
        (plus `sync`, `sync/timeout`, `thread-wait`, `semaphore-wait`) —
        all scheduler-dependent.
      - Regex pattern `\\(NAME[ \t\n]` preserved from the original helper.
        Verified it does not trip on the `"sleep \"$1\" …"` string literal
        inside `shell.rkt`'s `timeout-wrapper-script` (the literal starts
        with `"sleep`, not `(sleep`).
      - **Critical correctness fix over the old helper:** original used
        `rackunit` `check-false` at top level, which prints failures but
        exits 0 — exactly the silent-failure mode this guard is meant to
        prevent. New walker collects all violations into a box and raises
        via `error` at the end. Negative probe confirmed loud failure:
        injecting `(thread (lambda () 42))` into a throwaway
        `lib/bad-guard-probe.rkt` causes `racket tests/test-source-
        guards.rkt` to exit 1 with both the file label and the offending
        form-name in the error message. Multiple violations are listed
        in a single raise, so a multi-module regression shows its full
        blast radius in one run.
      - `tests/test-source-guards.rkt` created as the single entry
        point. Walks `("core" "services" "ui" "lib" "ffi" "main.rkt")`
        with an empty `#:allow` list. **Not wrapped in `test-case`** —
        wrapping would re-introduce the exit-0-on-failure quirk because
        `test-case` catches raised errors and reports them via rackunit's
        reporter rather than the process exit code. Top-level invocation
        is the correct pattern here; the header comment in the file
        records why.
      - Consolidation: removed inline `check-no-dead-thread-calls` calls
        from `test-shell.rkt`, `test-http.rkt`, and `test-window-manager
        .rkt`, plus their `"source-guards.rkt"` requires. Kept the
        `dynamic-require` smoke loads in `test-shell.rkt` and
        `test-http.rkt` — those are module-specific load-time checks
        (memory: "Verify bindings by loading, not grepping") and are
        complementary to the tree walker, not duplicated by it.
        `test-window-manager.rkt`'s Test-13 block became a single-line
        comment pointing at `test-source-guards.rkt`.

    - **Verification:**
      - Positive: `racket tests/test-source-guards.rkt` exits 0, prints
        `test-source-guards: runtime tree is clean`.
      - Negative: with `lib/bad-guard-probe.rkt` containing `(thread
        (lambda () 42))`, `racket tests/test-source-guards.rkt` exits 1
        with message listing `lib/bad-guard-probe.rkt: (thread ...)`.
      - Two-violation negative: adding `(sleep 1)` to the probe produced
        both violations in one raise (confirming the collect-all-then-
        raise behaviour, not short-circuit).
      - `test-shell.rkt`, `test-http.rkt`, `test-window-manager.rkt` all
        still pass after the inline-call removal. (`test-http.rkt`'s
        negative-case URLs produce the usual stderr but final
        `test-http: all checks passed` line confirms success; all four
        exit 0.)

    - **What didn't work:** First iteration used rackunit's `check-false`
      inside `check-file` and wrapped `check-source-tree` in `test-case`
      inside `test-source-guards.rkt`. Negative probe exposed that
      rackunit print-reports the failure but still exits 0 at the
      process level — same silent-failure mode as the original helper.
      Root-caused and switched to `error` + top-level invocation. Worth
      remembering: inside rackunit, `check-*` forms are best thought of
      as reporters, not assertions — if you need a non-zero exit code,
      raise.

    - **Suggests next:** Task #4 (audit ObjC delegate callbacks for
      exception handling) is the next unblocked item in the backlog.
      Latent crash risk, cheap to fix, and memory already records the
      pattern (`with-handlers ([exn:fail? ...])` around every
      `make-delegate` body). Alternatively Task #5 (harden shell timeout
      for pipelines) is available but is a pure edge-case refinement of
      already-shipped work. Task #4 probably better value.

    - **Key learnings:**
      - rackunit's `check-*` forms at top level (or inside a
        `test-case`) report failures but do not affect process exit
        code. For any guardrail that must break CI, use `error` /
        `raise`, not `check-false`.
      - Collecting all violations before raising is strictly more
        useful than short-circuiting: a regression touching three
        modules gets reported in one pass.
      - Static source-text guardrails only work when the forbidden
        patterns are phrased narrowly enough to not catch string
        literals. The `\\(NAME[ \t\n]` pattern handles this for the
        current offender set; any future guardrail on identifiers that
        can legitimately appear inside strings would need escaped-string
        awareness.
      - A guardrail designed to ship in "zero violations" mode from day
        one is much cleaner than one that lands with a migration list:
        the invariant is either true or not, there's no grandfathered
        state to reason about. The prior sessions' discipline of
        eliminating every offender first paid off here.
- id: 2026-04-14-audit-objc-delegate-callbacks-for-exception-handling
  timestamp: 2026-04-14T23:05:37Z
  phase: work
  body: |
    **Audit ObjC delegate callbacks for exception handling**

    - **What was attempted:** Task #4 from the backlog — audit every
      `make-delegate` and dynamic-subclass method body in the runtime tree,
      wrap each in `(with-handlers ([exn:fail? ...]) ...)` at the delegate
      boundary, keep handlers minimal (`eprintf` + safe default). Goal: turn
      latent silent-crash-in-delegate failures into loud-but-survivable
      `eprintf` diagnostics.

    - **Inventory.** Ten delegate bodies across `make-delegate`,
      `class_addMethod`, and FFI `_cprocedure`/`function-ptr` sites:
      - Already guarded (4): `dispatch-script-message` in panel-manager.rkt,
        `tap-callback-proc` in cgevent.rkt, `dispatch-callback-proc` in
        main-thread.rkt, and the WKScriptMessageHandler inline delegate
        (one-liner that only calls `dispatch-script-message`, transitively
        covered).
      - Unguarded, now wrapped (6): `applicationDidFinishLaunching:`,
        `applicationWillTerminate:`, `settingsClicked:`, `relaunchClicked:`,
        `quitClicked:`, `windowDidResignKey:`.
      - Intentionally exempt (1): `returns-yes-proc` — the literal
        `(lambda (self sel) #t)` IMP for `ModaliserKeyablePanel`. No
        subexpression can throw; wrapping it is defensive noise.

    - **What worked.** Three Edit passes (main.rkt, services/lifecycle.rkt,
      ui/panel-manager.rkt). 12 unit tests run green against the edited
      tree: `test-{source-guards,shell,http,main-thread,state-machine,keymap,
      event-dispatch,fuzzy-match,mru-store,dsl,dom,css}.rkt`.
      `test-source-guards.rkt` walks the three edited files and confirms no
      scheduler-forbidden forms crept in, and `test-main-thread.rkt`
      exercises the pre-existing `dispatch-callback-proc` with-handlers
      pathway so the guarding pattern is still load-valid.

    - **What didn't.** `test-lifecycle.rkt` and anything that transitively
      requires `nsmenuitem.rkt` / `nspanel.rkt` cannot currently load —
      APIAnyware's generated bindings blow up at `provide/contract` time
      with an arity mismatch on class-method property setters:

      ```
      nsmenuitem-set-uses-user-key-equivalents!: broke its own contract
        promised: a procedure that accepts 1 non-keyword argument
        produced: #<procedure:...>
        accepts: 2 arguments
        in: (-> boolean? void?)
      ```

      Compared across adjacent setters in the same file, the contract for
      class-method property accessors drops the `objc-object?` self
      position but the generated implementation still takes a receiver —
      so contract arity and impl arity diverge by one. Two concrete
      failures observed: `nsmenuitem-set-uses-user-key-equivalents!` (line
      77 of generated nsmenuitem.rkt) and
      `nspanel-set-allows-automatic-window-tabbing!` (line 26 of generated
      nspanel.rkt). Both are documented Apple class methods. `git stash`
      against clean `main` reproduces the same failure, so the regression
      is upstream — not caused by this task.

      **Blast radius:** this blocks `main.rkt` from launching at all,
      because `main.rkt → ui/overlay.rkt → ui/panel-manager.rkt →
      nspanel.rkt` fails at module load. Modaliser-Racket cannot currently
      start until the upstream fix lands.

    - **Second verification gap.** `tests/test-integration-*.rkt` cannot
      run in any automated flow: they enter the Cocoa run loop and wait
      for physical keyboard input a headless agent can't provide, so
      sequencing the full `tests/test-*.rkt` glob hangs once an
      integration file is reached. The README's current "Run tests"
      snippet does exactly that and is therefore misleading.

    - **What this suggests trying next.**
      1. Pick up the upstream APIAnyware bug — now filed as
         "Class-method property accessors drop self-arg in contract but
         not impl `[emission]`" in
         `../APIAnyware-MacOS/LLM_STATE/targets/racket-oo/backlog.md`.
         Blocks Modaliser launch, so highest-priority follow-up. The fix
         path most likely to succeed is **option 1 in the bug report** —
         emit `(c-> objc-object? value-type void?)` for class-method
         property setters so contract and impl agree, matching the
         existing instance-method setter pattern.
      2. Land the new backlog entry "Integration tests must not hang the
         default test runner". Minimum-viable is env-gating the
         integration files (option 4 in the entry); the real mechanism is
         a headless event-injection shim on `core/event-dispatch` that
         lets tests drive the state machine without the CGEvent tap layer
         (option 3 + option 1 from the entry).

    - **Key learnings or discoveries.**
      - The delegate-boundary wrap pattern already in use (`tap-callback-proc`,
        `dispatch-callback-proc`, `dispatch-script-message`) is the right
        house style; no helper factoring justified at this scale. The
        inline form is the de facto convention and consistency > DRY at
        six call sites.
      - Inner-handler vs boundary-handler: lifecycle.rkt's `open-settings!`
        already had its own `with-handlers` on the subprocess call, but
        the menu delegate lambda that called it was unguarded. The
        boundary handler is the one that matters — inner handlers are
        defensive programming for the callee, boundary handlers are
        crash-prevention for the process.
      - `provide/contract` catches arity mismatches between the contract
        and the wrapped procedure at module LOAD time, which is how the
        APIAnyware class-method bug surfaces as a dynamic-require crash
        rather than a runtime call failure. The failing load site names
        the contract and the actual-arity mismatch directly, making these
        contract-vs-impl bugs very easy to diagnose once the module is
        loaded in isolation.
      - `dynamic-require` from the project root is the fastest way to
        bisect "does this module load cleanly" for a file that can't be
        tested via the normal test-file path. Works even for modules
        with heavy transitive requires — `racket -e '(dynamic-require
        "ui/panel-manager.rkt" #f)'` was what surfaced the upstream
        binding regression in seconds.
- id: 2026-04-15-task-1a-extension-integration-tests-don-t-hang-and-no-silent-failures
  timestamp: 2026-04-15T00:32:55Z
  phase: work
  body: |
    **Task 1a + extension: integration tests don't hang AND no silent failures**

    - Picked up Task 1a (Priority 1a: integration tests hang the default
      test runner). Task description framed it as option 4 (env-gate +
      skip), assuming all 5 `test-integration-*.rkt` files enter the
      Cocoa run loop and wait for keyboard input.

    - **Reality check first.** Ran each `tests/test-*.rkt` file
      individually with `timeout -k 1 5 racket …` to find the actual
      hangers. Result: 25 of 26 files exit cleanly. The single true
      infinite-hanger was `tests/test-keyboard-capture.rkt` — misnamed
      (no `integration-` prefix), called `(nsapplication-run app)` at
      the bottom, header literally said "Stop with: Ctrl+C". The Task 4
      author had run the glob blind, hit this file first, and assumed
      the failure mode was class-wide. Also discovered:
      `test-integration-overlay.rkt` Test 8 silently fails (rackunit
      reports failure but exit 0).

    - **User pivots #1: "I don't want to gate any tests."** Originally
      proposed a surgical env-gate. User rejected: every test should
      run. Replanned to (a) rename and rewrite the misnamed file to
      auto-terminate via the GCD safety-net pattern; (b) write a
      `tests/run-all.sh` runner that walks every file under
      `timeout -k 1 30` and exits non-zero on any hang or failure.
      Verified 26/26 passing, exit 0.

    - **User pivot #2: "We need NO silent failures. Failure must be
      propagated and reported, or the tests are worthless."** Re-opened
      the task. Implemented two additional layers:

      1. **Runner-level grep backstop.** `run-all.sh` now greps each
         file's captured output for rackunit failure markers
         (`^FAILURE$` / `^name:[ \t]+check-`) and treats any hit as
         `[SILENT]` even when rc=0. Catches the silent-failure pattern
         universally without per-file restructuring. Verified by a
         deliberate `(check-equal? 1 2 ...)` probe → reported `[SILENT]`,
         runner exit 1.

      2. **Test-file-level precondition pattern.** Setup checks like
         `(check-true (accessibility-trusted?) "...")` were replaced
         with `(unless (accessibility-trusted?) (eprintf "...") (exit 1))`
         in 6 files. Reasoning: precondition failures are setup issues,
         not test failures, and should never be recorded in the
         rackunit reporter. The exit-1 pattern bypasses any enclosing
         `with-handlers ([exn:fail? ...])` (verified in
         `test-integration-keyboard-capture.rkt`'s delegate body),
         produces an immediate `[FAIL]` with a clear actionable
         diagnostic, and doesn't depend on rackunit. Verified by a
         deliberate `(exit 1)` probe → reported `[FAIL] (rc=1)`,
         runner exit 1.

      Sites converted: `test-window-manager.rkt` (hoisted to file top
      level, redundant per-test-case checks dropped),
      `test-integration-modal.rkt`, `test-integration-services.rkt`,
      `test-integration-window.rkt`,
      `test-integration-keyboard-capture.rkt` (rackunit import
      dropped — no `check-*` or `test-case` forms remain),
      `test-config-loading.rkt`.

    - **Fixed the actual silent failure in
      `test-integration-overlay.rkt` Tests 8 and 9.** They used
      `(sleep 0.2)` to wait for a GCD overlay-show callback that needs
      `nsapplication-run` to drain the main queue — outside the run
      loop, the callback never fires. Test 8 silently failed
      (`actual=0 expected=1`); Test 9 was a false positive. Fix:
      added `set-after-delay-handler!` to `core/state-machine.rkt` so
      tests can install a recording handler in place of
      `call-on-main-thread-after`. Default handler unchanged →
      production behavior identical. Re-routed
      `modal-show-overlay-delayed` and the modal safety watchdog
      through `after-delay` so the hook is actually reachable.
      Rewrote Tests 8 and 9 to install a list-based recording handler
      that captures every scheduled `(seconds . thunk)` pair; tests
      pick the sub-second show callback (the 5 s safety watchdog
      is filtered out by delay threshold). Tests now verify both the
      schedule and the generation-counter staleness logic without
      needing a real Cocoa run loop.

    - **Real-world hit.** Mid-development, macOS revoked the `racket`
      binary's TCC accessibility grant. The upgraded runner immediately
      surfaced 6 silent failures across files whose preconditions had
      been silently passing before (rackunit's exit-0-on-failure
      quirk). This was the silent-failure detector's first real catch
      — exactly the failure mode it exists for. User re-granted
      accessibility, suite returned to 26/26.

    - **Final state:** `./tests/run-all.sh` reports
      `Summary: 26 passed, 0 failed, 0 silent, 0 timed out`, exit 0.
      Two negative-probe verifications of both detection layers.
      Three pre-existing latent bugs (one hanging file, one silent
      test-8 failure, six precondition-pattern files) all fixed.

    - **What worked:**
      - Empirical re-investigation of the original failure premise
        (the "every integration test hangs" claim was wrong).
      - Two-layer defense: runner-level grep catches silent rackunit
        failures, file-level `(exit 1)` catches precondition failures.
        Each layer is independently sufficient for its class.
      - The `set-after-delay-handler!` hook is the smallest possible
        test seam — a single mutable variable behind a setter — and
        leaves production behavior identical.
      - Negative-probe discipline: deliberately failing files
        confirmed both detection paths actually catch what they're
        supposed to. Without this, the detector might have shipped
        broken.

    - **What didn't:**
      - Initial framing assumed the original backlog description was
        empirically grounded. Wasn't — wasted some effort on
        env-gating before the user pivot. Lesson: re-verify the
        failure premise before designing the fix, especially when the
        premise was authored mid-crisis.
      - First recording handler in test-integration-overlay.rkt was
        single-slot; it overwrote the show callback with the
        safety-watchdog callback (modal-enter schedules both). Had to
        rebuild as list-based with a delay-threshold filter.
      - Initial verification used `./run-all.sh | tail` and read
        `$?` from the pipe, which only saw `tail`'s exit code. Had to
        re-verify with `./run-all.sh >/dev/null; echo $?`.

    - **Suggests trying next:**
      - The user has demonstrated a strong preference for "no silent
        failures, no hidden state, structural rather than behavioral
        fixes". Future tests should follow the same pattern: setup
        failures → `(exit 1)`, behavior verification → rackunit
        `check-*` (silent-failure-detector backstops them).
      - `test-integration-overlay.rkt`'s recording-handler pattern is
        a model for any future test that needs to verify GCD-scheduled
        behavior headlessly. Memory documents both the
        `set-after-delay-handler!` hook and the
        capture-all-then-filter-by-delay technique.
      - Two backlog entries created earlier in this session (silent
        Test 8, audit suite for rackunit pattern) were both addressed
        in the same session and removed from the backlog.

    - **Key learnings / discoveries:**
      - The original "every integration test hangs" claim was a
        misdiagnosis of a single misnamed file.
      - rackunit's `check-*` exit-0-on-failure quirk is invisible
        until you trigger it. The runner grep backstop is the only
        reliable structural defense.
      - macOS will spontaneously revoke TCC grants for the bare
        `racket` binary. The bundled `.app` (with the Modaliser Dev
        cert) is more stable. Tests targeting bare `racket` need to
        treat accessibility revocation as a normal failure mode and
        have actionable diagnostics for the user.
      - `exit` in Racket bypasses `with-handlers ([exn:fail? ...])`
        boundaries, so it's the right tool for "abort the process now"
        inside delegate callbacks where exception swallowing would
        otherwise hide the failure.
      - GNU coreutils `timeout` is now an explicit prerequisite for
        the runner; documented in README via `brew install coreutils`.
- id: 2026-04-15-place-backed-async-http-get-os-thread-places-research
  timestamp: 2026-04-15T01:48:07Z
  phase: work
  body: |
    **Place-backed async http-get; os-thread / places research**

    **Task selected:** Task 5, "Add `call-on-background-thread` GCD helper and
    non-blocking `http-get`" (Priority 5). The user asked to first verify the
    upstream APIAnyware class-method property-setter contract fix had landed
    (unblocking UI-layer work and full-app verification), then proceed.

    **Verification of upstream fix.** `dynamic-require` smoke loads of
    `bindings/generated/oo/appkit/nsmenuitem.rkt`, `nspanel.rkt`,
    `ui/panel-manager.rkt`, `ui/overlay.rkt`, `ui/chooser.rkt`, and
    `services/lifecycle.rkt` all loaded clean. Full test suite green
    (26/26). Updated memory.md to mark the contract bug as fixed and
    removed the "Current hard blocker" note from `backlog.md`.

    **Critical pre-task discovery: integration tests were rearranging the
    desktop.** While running `./tests/run-all.sh` for the verification step,
    the user noticed the cmux terminal getting fullscreened. Investigation:
    `tests/test-integration-window.rkt` Tests 1-5 had been calling real
    `(center-window)`, `(move-window …)`, `(toggle-fullscreen)`, and
    `(restore-window)` against whatever window had AX focus, in lambdas
    like `(lambda () (log-cmd! 'center) (center-window))`. The file's own
    header explicitly said "Does NOT actually move windows", but the
    test lambdas contradicted it. The assertions only checked
    `command-log`, so the real-function calls were gratuitous side
    effects. Stripped to log-only stubs; test coverage unchanged.
    Audited the rest of `tests/` — no other test calls write-side
    window-manager functions, `open-url`, `send-keystroke`, or
    `set-pasteboard-string`. The hazard was isolated to one file.

    **Research phase: original Task 5 design proved infeasible.** Wrote
    `call-on-background-thread` exactly as the backlog described:
    `dispatch_get_global_queue(QOS_CLASS_USER_INITIATED, 0)` →
    `dispatch_async_f` with the existing `dispatch-callback-fptr`. Test
    process exited with **SIGILL (132)** the moment the GCD worker
    thread tried to invoke the `_cprocedure`. Racket CS requires foreign
    threads to be registered before they can run Racket code; bare
    pthreads from libdispatch's worker pool are not. `#:async-apply`
    would convert the crash into a permanent deadlock under
    `nsapplication-run` because the async-apply queue can only drain on
    the main Racket thread. `ffi/cgevent.rkt`'s tap callback is NOT a
    counterexample — that callback fires on the main OS thread because
    the tap is installed via `CFRunLoopGetMain`. The primitive and its
    test were reverted.

    **Pivot to Racket-native research (user-requested Option D, then B).**
    Empirical probes of `ffi/unsafe/os-thread`:
    - `os-thread-enabled?` returns `#t` on this Racket CS build.
    - `call-in-os-thread` lands on a non-main pthread (verified via
      `pthread_main_np`).
    - Pure computation, allocation, closures, list ops, file I/O, and
      `parameterize` all work on the os-thread.
    - `tcp-connect` and `subprocess` both segfault with "invalid memory
      reference" — Racket's TCP/process subsystems require the place
      scheduler that os-threads don't have.
    - `make-os-semaphore` / `os-semaphore-post` / `os-semaphore-wait`
      successfully coordinate across OS threads.
    So `call-in-os-thread` is useful for CPU-bound pure Racket work but
    cannot host network I/O.

    Empirical probes of `dynamic-place`:
    - A worker place running `net/url` `get-pure-port` works correctly,
      unlike `call-in-os-thread`. Each place has its own VM with its own
      scheduler.
    - `place-channel-put` is fully buffered on the sender (5 puts
      against a busy worker all returned in 0 ms — verified directly).
    - `sync/timeout 0` on a place-channel is a pure non-blocking
      try-receive: empirically returned `#f` 20 times before the first
      ready response in 250 ms. Scheduler-independent — safe to call
      under `nsapplication-run`.

    **Implementation:**
    - `services/http-worker.rkt` (new, 50 lines) — standalone module
      loaded via `dynamic-place`. Loop: receives `(list id url)`,
      fetches via `net/url`, replies `(cons id body-or-#f)`.
    - `services/http.rkt` (rewritten) — main-thread facade. Lazy
      `ensure-worker-started!`, monotonic request id, pending-callbacks
      hasheqv, single-tick polling guard, drain via
      `place-channel-try-get`. `http-get-sync` preserved unchanged.
    - `lib/place-channel-utils.rkt` (new, 30 lines) — single-function
      module wrapping `(sync/timeout 0 ch)` as `place-channel-try-get`.
      Single-function scope so the source-guard exemption is tightly
      bounded.
    - `tests/source-guards.rkt` — refined `#:allow` from "skip these
      files entirely" to per-(file, form-name) pairs. Per-form
      granularity prevents an exemption from one construct hiding
      regressions for the others in the same file.
    - `tests/test-source-guards.rkt` — added the documented allowlist
      entry `("lib/place-channel-utils.rkt" . "sync/timeout")` with
      inline justification.
    - `tests/test-http.rkt` — rewrote callback-style tests for the new
      async semantics. New `wait-for-drain` helper polls
      `drain-all-ready-responses!` (exposed via
      `(module+ test-hooks)`) on a 20 ms cadence with a 10 s deadline.
      Three new test cases: single GET delivers body, invalid URL
      delivers `#f`, three concurrent requests route correctly.

    **What worked.**
    - The places approach delivered exactly the desired property: main
      thread never blocks during a network fetch, no foreign-thread
      `_cprocedure` reentry, no scheduler dependency at the dispatch site.
    - The `(module+ test-hooks)` pattern lets tests drive the drain
      manually without needing an NSApp run loop, which means the unit
      test layer covers the routing logic deterministically.
    - Per-(file, form) source-guard allowlist is the right granularity
      — a tightly-named single-function helper is the place to scope
      any future "this is a sanctioned exception" exemption.

    **What didn't.**
    - The original Task 5 plan ("call-on-background-thread via GCD
      worker queue") is architecturally impossible in Racket CS. This
      was not knowable from documentation — the SIGILL was the
      empirical signal that pivoted the work.
    - `ffi/unsafe/os-thread` initially looked like the answer until
      `tcp-connect` segfaulted. The "pure Racket only" boundary is
      documented in memory now so this trap doesn't re-bite.

    **Tests.** Full suite via `./tests/run-all.sh` — `26 passed,
    0 failed, 0 silent, 0 timed out`. `test-integration-window.rkt`
    ran cleanly without rearranging the desktop.

    **Memory updates.**
    - New entry: "Racket CS `_cprocedure` is unsafe from truly foreign
      OS threads" — documents the SIGILL finding and why
      `#:async-apply` doesn't help.
    - New entry: "`ffi/unsafe/os-thread`: pure Racket only, NOT I/O" —
      the safe-zone vs segfault-zone for `call-in-os-thread`.
    - New entry: "Places for I/O off the main thread" — the working
      escape hatch, with place-channel semantics and the
      `place-channel-try-get` pattern.
    - New entry: "Async HTTP via place + main-thread polling" — the
      concrete `services/http.rkt` architecture.
    - New entry: "Integration tests must not mutate shared state" —
      the rule discovered by the desktop-rearrangement incident.
    - Updated "Generated binding workarounds" — class-method
      property-setter contract bug marked as fixed upstream.
    - Updated "Source guard" paragraph — documents the per-(file, form)
      allowlist refinement.
    - Updated "Sanctioned concurrency primitives" list — added
      `place-channel-try-get` and `call-in-os-thread`.

    **Backlog updates.**
    - Task 5 marked **done** with detailed Results section (the
      SIGILL pivot, the places architecture, and what was verified).
    - Two new tasks added at the bottom:
      1. **"Eliminate `ffi/*.rkt` in favour of APIAnyware racket-oo
         C-function bindings"** — per the user's note that racket-oo
         now exports C functions, replace each hand-written
         `ffi/*.rkt` (cgevent, cgevent-emitter, main-thread,
         accessibility, permissions) with generated bindings. Listed
         all migration sites and the open question about how
         racket-oo handles `dlsym` for global-variable address-of
         (`_dispatch_main_q`).
      2. **"Propagate concurrency findings to APIAnyware racket-oo
         plan"** — a coordinator task to lift the 5 new memory
         entries into the upstream plan as general Racket-CS+macOS
         facts. Per work-phase rules, this is triage-phase work.

    **What this suggests next.**
    - The FFI-elimination task is the natural follow-up. Now that
      upstream provides the bindings, the maintenance and contract-
      arity hazard of `ffi/*.rkt` can be retired.
    - The propagation task is small but high-leverage — APIAnyware's
      racket-oo plan benefits from the same `_cprocedure`-foreign-
      thread warning, the same os-thread/places guidance, and
      potentially the same `place-channel-try-get` helper as runtime
      support.
    - The shell-timeout pipeline edge case (existing Task at the
      bottom of the backlog) and the FFI-elimination task could be
      worked in parallel — they touch disjoint files.

    **Key learnings.**
    - Racket CS's foreign-thread story: `_cprocedure` callbacks
      require the calling thread to be registered, and there is no
      safe way to register a libdispatch worker from Racket. The
      cgevent tap looks like a counterexample but isn't.
    - `ffi/unsafe/os-thread` is a real native parallelism primitive
      but it's strictly "pure Racket only" — TCP and subprocess
      segfault from the os-thread.
    - Places are the Racket-native I/O escape hatch. They're heavier
      than os-threads (full VM startup) but they're the only thing
      that lets `net/url` work off the main thread under the Cocoa
      loop.
    - `sync/timeout 0` on a place-channel is the one sync-family
      primitive that's safe under `nsapplication-run` — a pure
      non-blocking try-receive with no scheduler dependency.
    - Test files with external side effects have no automated
      backstop. Stub-only command lambdas are the discipline; the
      source-guard family doesn't catch this class of issue.
