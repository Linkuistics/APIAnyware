        the dlsym/RTLD_DEFAULT infrastructure replaced with `only-in` imports from
        `libdispatch/functions.rkt` and `libdispatch/constants.rkt`. Both upstream
        blockers were resolved: `_dispatch_main_q` now emitted via `ffi-obj-ref`
        (symbol address, not dereferenced value), and queue params typed `_pointer`
        not `_id`. The `main-queue` local variable replaced by direct `_dispatch_main_q`
