body: |
  **spec scenarios Tasks 22–24 (modal, chooser, launch, windows)**

  - Attempted Tasks 22, 23, and 24 of app-spec-v1: write scenario files for modal state, chooser UI, quick-launch, and window management.
  - All three tasks completed successfully. Nine new scenario files written across four new directories (`APIAnyware-MacOS/knowledge/apps/modaliser/scenarios/modal/`, `choosers/`, `launch/`, `windows/`). `common-setups.rkt` bug-fixed (Task 23 surfaced pre-existing Task 20 regressions: bare log regexes, wrong selector prompt text, `expect-log` → `wait-for-log`). Total registered scenarios: 12. Spec test suite: 12 OK / 0 fail throughout.
  - Task 24 initially added `(log-event 'window 'move …)` to `services/window-manager.rkt` and ran the impl test suite on host — flagged as a policy violation (`./tests/run-all.sh` is VM-only). The impl change was reverted and filed as the new `impl-window-move-logging-gap` task for a VM-scoped session. The windows scenario (`01-focus-move-restore.rkt`) is contract-correct and will pass once that impl task closes.
  - Key learnings: lib/events.rkt quotes all string values in emitted events, so log regexes must use `tree="global"` not `tree=global`; chooser selector log value is the `'prompt` alist field, not the selector label; `wait-for-log` with a timeout is required throughout because CGEvent-tap → state-machine → flush → tailer-poll has non-zero latency on VM.
  - Next: Task 25 (.gitignore audit — likely verify-only), then Task 26 non-VM steps (success-criteria `rg` guard, null-impl meaningful-failure smoke). Live-VM shake-down (Task 26 Step 6) gated on TestAnyware Task 8 and spec-v1-log-tailer.
